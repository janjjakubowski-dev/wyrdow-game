// ─── ISOMETRIC MATH ─────────────────────────────────────────────────
const TILE_W = 64;
const TILE_H = 32;
function cartToIso(cx, cy) {
  return { x: (cx - cy) * (TILE_W / 2), y: (cx + cy) * (TILE_H / 2) };
}
function isoToCart(ix, iy) {
  return {
    x: (ix / (TILE_W / 2) + iy / (TILE_H / 2)) / 2,
    y: (iy / (TILE_H / 2) - ix / (TILE_W / 2)) / 2
  };
}

  if (x >= 0 && x < MAP_SIZE && y >= 0 && y < MAP_SIZE) {

// ── SAVE SYSTEM ─────────────────────────────────────────────────────
// Persists gameState into localStorage under 'wyrdow_save'.
// Settings live in 'wyrdow_settings' so they survive a New Game.
const SAVE_KEY = 'wyrdow_save';
const SETTINGS_KEY = 'wyrdow_settings';

function saveGame() {
  try {
    const snap = JSON.parse(JSON.stringify(gameState));
    snap._savedAt = Date.now();
    localStorage.setItem(SAVE_KEY, JSON.stringify(snap));
    gameState.hasSave = true;
    return true;
  } catch (e) { console.warn('saveGame failed', e); return false; }
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY); if (!raw) return false;
    const snap = JSON.parse(raw);
    Object.assign(gameState, snap);
    gameState.hasSave = true;
    return true;
  } catch (e) { console.warn('loadGame failed', e); return false; }
}
function hasSavedGame() {
  try { return !!localStorage.getItem(SAVE_KEY); } catch (e) { return false; }
}
function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      musicVolume: gameState.musicVolume,
      ambientVolume: gameState.ambientVolume,
      sfxVolume: gameState.sfxVolume,
    }));
  } catch (e) {}
}
function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY); if (!raw) return;
    const s = JSON.parse(raw);
    if (typeof s.musicVolume === 'number') gameState.musicVolume = s.musicVolume;
    if (typeof s.ambientVolume === 'number') gameState.ambientVolume = s.ambientVolume;
    if (typeof s.sfxVolume === 'number') gameState.sfxVolume = s.sfxVolume;
  } catch (e) {}
}
loadSettings();
gameState.hasSave = hasSavedGame();
window.saveGame = saveGame;
window.loadGame = loadGame;

// ── Game clock constants ───────────────────────────────────────────
// 1 game-hour = 2 real minutes (full day = 48 real minutes)
const GAME_HOUR_MS = 2 * 60 * 1000;
const TIME_WINDOWS = {
  dawn:      { start: 6,  end: 7  },
  morning:   { start: 7,  end: 12 },
  noon:      { start: 12, end: 13 },
  afternoon: { start: 13, end: 19 },
  dusk:      { start: 19, end: 20 },
  night:     { start: 20, end: 24 },
  latenight: { start: 0,  end: 6  },
};
function isTimeWindow(name) {
  const w = TIME_WINDOWS[name];
  if (!w) return false;
  return gameState.gameHour >= w.start && gameState.gameHour < w.end;
}

// ═══════════════════════════════════════════════════════════════════════
//  AMBIENT SOUND ENGINE (Web Audio API)
// ═══════════════════════════════════════════════════════════════════════
class AmbientAudio {
  constructor() {
    this.ctx = null;
    this.started = false;
  }

  // Start audio on first user interaction (browser policy)
  init() {
    if (this.started) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.started = true;
      this.playDrone();
      this.scheduleCrickets();
      this.scheduleWindGusts();
    } catch (e) { /* Audio not supported — fail silently */ }
  }

  // Low continuous drone — eerie village atmosphere
  playDrone() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 55; // low A
    gain.gain.value = 0.03;
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();

    // Second harmonic for richness
    const osc2 = this.ctx.createOscillator();
    const gain2 = this.ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = 82.5;
    gain2.gain.value = 0.015;
    osc2.connect(gain2);
    gain2.connect(this.ctx.destination);
    osc2.start();
  }

  // Periodic cricket-like chirps
  scheduleCrickets() {
    if (!this.ctx) return;
    const chirp = () => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 3800 + Math.random() * 1200;
      gain.gain.value = 0;
      gain.gain.setValueAtTime(0, this.ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.02 + Math.random() * 0.015, this.ctx.currentTime + 0.02);
      gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.08);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start();
      osc.stop(this.ctx.currentTime + 0.1);
    };
    const loop = () => {
      chirp();
      if (Math.random() < 0.4) setTimeout(chirp, 60 + Math.random() * 40);
      setTimeout(loop, 1500 + Math.random() * 4000);
    };
    setTimeout(loop, 2000);
  }

  // Occasional wind gusts — filtered noise bursts
  scheduleWindGusts() {
    if (!this.ctx) return;
    const gust = () => {
      const bufferSize = this.ctx.sampleRate * 2;
      const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
      const source = this.ctx.createBufferSource();
      source.buffer = buffer;
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 300 + Math.random() * 200;
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0, this.ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.025, this.ctx.currentTime + 0.8);
      gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.5);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(this.ctx.destination);
      source.start();
      source.stop(this.ctx.currentTime + 3);
    };
    const loop = () => {
      gust();
      setTimeout(loop, 6000 + Math.random() * 12000);
    };
    setTimeout(loop, 4000);
  }

  // ── Awakening atmosphere — wind through grass + distant crow ───
  // Used by OpeningScene before the player gains control. Doesn't
  // start the village drone — that begins on first input.
  startAwakeningAmbience() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return; }
    }
    const ctx = this.ctx;
    // Long wind bed — filtered noise that swells and fades
    const bufferSize = ctx.sampleRate * 4;
    const buf = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 380;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 1.5);
    src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    src.start();
    this._awakWind = { src, gain };

    // Distant crow caw at ~1.5s
    setTimeout(() => this.crowCall(), 1500);
  }

  crowCall() {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(420, t0);
    osc.frequency.exponentialRampToValueAtTime(220, t0 + 0.35);
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 4;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(0.04, t0 + 0.05);
    gain.gain.linearRampToValueAtTime(0, t0 + 0.4);
    osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + 0.5);
  }

  // Slow folk melody — solo "instrument" (sine + soft bandpass)
  // playing an unresolved minor phrase. Returns a stop() function.
  playFolkMelody(loop) {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return () => {}; }
    }
    const ctx = this.ctx;
    // A minor pentatonic-ish phrase, half-remembered, ends unresolved
    const notes = [
      { f: 220.00, d: 0.6 },  // A3
      { f: 261.63, d: 0.5 },  // C4
      { f: 293.66, d: 0.4 },  // D4
      { f: 329.63, d: 0.9 },  // E4
      { f: 261.63, d: 0.5 },  // C4
      { f: 246.94, d: 1.2 },  // B3 — unresolved
    ];
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.05;
    masterGain.connect(ctx.destination);
    const oscs = [];
    let stopped = false;
    const playPhrase = (startAt) => {
      if (stopped) return;
      let t = startAt;
      notes.forEach(n => {
        const osc = ctx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = n.f;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.7, t + 0.06);
        g.gain.linearRampToValueAtTime(0.4, t + n.d * 0.6);
        g.gain.linearRampToValueAtTime(0, t + n.d);
        osc.connect(g); g.connect(masterGain);
        osc.start(t); osc.stop(t + n.d + 0.05);
        oscs.push(osc);
        t += n.d * 0.95;
      });
      if (loop) setTimeout(() => playPhrase(ctx.currentTime + 0.4), (t - startAt) * 1000 + 800);
    };
    playPhrase(ctx.currentTime + 0.2);
    return () => {
      stopped = true;
      try { masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5); } catch (e) {}
    };
  }

  fadeOutAwakening() {
    if (this._awakWind) {
      try {
        this._awakWind.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.5);
      } catch (e) {}
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  MUSIC MANAGER  —  layered MP3 score on top of the procedural ambience
// ═══════════════════════════════════════════════════════════════════════
// Uses Phaser's WebAudio sound manager so we can pitch-shift via setRate
// without breaking the existing AmbientAudio (Web Audio API) drone.
// All tracks are gated behind the player's first keypress (handled by
// GameScene which calls ambientAudio.init() — we piggyback on the same
// gesture by deferring playback until music.unlock() is called).
class MusicManager {
  constructor() {
    this.scene = null;            // last scene that registered the manager
    this.sounds = {};             // key → Phaser sound object
    this.unlocked = false;        // becomes true on first keypress
    this.muted = false;
    this.baseVolumes = {
      wyrdow_ambient:     0.65,
      theme_awakening:    0.40,
      baba_elzbieta_theme:0.75,
      crossroads_quest:   0.10,
      vision_theme:       0.80,
      poludnica_theme:    0.90,
    };
    // Active duck requests (lowest target wins for ambient)
    this._duckRequests = new Set();
    this._ambientNaturalTarget = 0.65;
    // Track which sources have triggered the awakening theme
    this._awakeningPlays = 0;
    // Pending plays queued before the manager is unlocked
    this._queue = [];
  }

  // Called by each scene's preload — keys cached on the global Phaser cache
  // are shared between scenes, so loading once in OpeningScene is enough.
  preload(scene) {
    const base = 'assets/music/';
    const files = [
      'wyrdow_ambient',
      'theme_awakening',
      'baba_elzbieta_theme',
      'crossroads_quest',
      'vision_theme',
      'poludnica_theme',
    ];
    for (const f of files) {
      try { scene.load.audio(f, base + f + '.mp3'); } catch (e) {}
    }
    // TODO: replace with brel_theme.mp3 when generated.
    // The Wellness Officer scene falls back to procedural cold piano if absent.
    try { scene.load.audio('brel_theme', base + 'brel_theme.mp3'); } catch (e) {}
    // Suppress 404 console noise for the optional brel theme.
    scene.load.on('loaderror', (file) => {
      if (file && file.key === 'brel_theme') {
        // Silent fallback — handled by procedural drone.
      }
    });
  }

  // Bind to the active scene and instantiate sound objects from cache.
  bind(scene) {
    this.scene = scene;
    for (const key of Object.keys(this.baseVolumes)) {
      if (!this.sounds[key] && scene.cache.audio.exists(key)) {
        try {
          this.sounds[key] = scene.sound.add(key, { volume: 0, loop: false });
        } catch (e) {}
      }
    }
  }

  // ── master volume / mute ────────────────────────────────────────
  _master() {
    if (this.muted) return 0;
    return (gameState && typeof gameState.musicVolume === 'number')
      ? gameState.musicVolume : 0.8;
  }
  _applyMaster() {
    for (const key of Object.keys(this.sounds)) {
      const s = this.sounds[key]; if (!s) continue;
      const target = (s._desiredBase != null ? s._desiredBase : 0) * this._master();
      try { s.setVolume(target); } catch (e) {}
    }
  }
  toggleMute() {
    this.muted = !this.muted;
    this._applyMaster();
    return this.muted;
  }

  // Called once on first keypress (gesture unlock).
  unlock() {
    if (this.unlocked) return;
    this.unlocked = true;
    if (this.scene && this.scene.sound && this.scene.sound.unlock) {
      try { this.scene.sound.unlock(); } catch (e) {}
    }
    for (const fn of this._queue) { try { fn(); } catch (e) {} }
    this._queue.length = 0;
  }
  _gated(fn) {
    if (!this.unlocked) { this._queue.push(fn); return; }
    fn();
  }

  // ── set a sound's natural (un-ducked) target volume ─────────────
  // Every legacy caller that used _tweenTo(key, value, ms) to change
  // a track's target volume now goes through _setNatural, which stores
  // the natural target and re-applies the priority-stack duck scalar
  // to every playing sound.
  _tweenTo(key, target, ms) {
    const s = this.sounds[key]; if (!s || !this.scene) return;
    s._natural = target;
    this._applyAll(ms);
  }
  _start(key, { loop = false, base = null } = {}) {
    const s = this.sounds[key]; if (!s) return null;
    s.loop = loop;
    if (!s.isPlaying) {
      s._desiredBase = 0;
      try { s.setVolume(0); s.play(); } catch (e) {}
    }
    return s;
  }
  _stopAfterFade(key, ms) {
    const s = this.sounds[key]; if (!s) return;
    this._tweenTo(key, 0, ms);
    setTimeout(() => { try { if (s.isPlaying) s.stop(); } catch (e) {} }, ms + 60);
  }

  // ── ambient ducking (multi-source, lowest target wins) ──────────
  // NOTE: legacy API kept so older callers still work. New code should
  // use the priority stack via duckAllExcept/restoreAll below.
  _recomputeAmbient(ms) {
    let target = this._ambientNaturalTarget; // 0.65 baseline
    for (const r of this._duckRequests) target = Math.min(target, r);
    // Natural ambient target is the lowest legacy duck request. The
    // priority stack layers on top of this via _applyAll.
    const s = this.sounds['wyrdow_ambient'];
    if (s) s._natural = target;
    this._applyAll(ms);
  }
  _duckAmbient(target, ms) {
    this._duckRequests.add(target);
    this._recomputeAmbient(ms);
  }
  _undoDuck(target, ms) {
    this._duckRequests.delete(target);
    this._recomputeAmbient(ms);
  }

  // ── PRIORITY-BASED DUCK STACK ────────────────────────────────────
  // DUCK_TARGETS from the audio mix spec:
  //   dialogue (NPC themes)     : others → 15% of natural
  //   event    (vision / Poł.)  : others → 20% of natural
  //   quest    (crossroads 1-3) : others → 35% of natural
  // Południca is ceremonial: uses 0.10.
  // wyrdow_ambient and theme_awakening are baseline — they never push
  // onto the stack, they only yield.
  _priorityOf(name) {
    // higher = more authoritative
    if (name === 'poludnica_theme')    return 5;
    if (name === 'baba_elzbieta_theme') return 4;
    if (name === 'vision_theme')       return 3;
    if (name === 'crossroads_quest')   return 2;
    return 0;
  }
  // Set a track's natural (un-ducked) target and re-apply the current
  // duck scalar to every playing sound.
  _setNatural(key, target, ms) {
    const s = this.sounds[key]; if (!s) return;
    s._natural = target;
    this._applyAll(ms);
  }
  // Compute the effective volume for every playing sound based on the
  // top of the priority stack, then tween each over `ms`.
  _applyAll(ms = 1500) {
    const stack = this._stack || (this._stack = []);
    const top = stack.length ? stack[stack.length - 1] : null;
    for (const key of Object.keys(this.sounds)) {
      const s = this.sounds[key]; if (!s) continue;
      if (s._natural == null) s._natural = 0;
      let scalar = 1;
      if (top && key !== top.name) scalar = top.duck;
      const target = s._natural * scalar;
      // Use the existing tween pipeline but bypass natural writeback.
      if (s._desiredBase == null) s._desiredBase = 0;
      const fromBase = s._desiredBase;
      const proxy = { v: fromBase };
      s._desiredBase = target;
      if (!this.scene) continue;
      this.scene.tweens.add({
        targets: proxy, v: target, duration: ms,
        onUpdate: () => { try { s.setVolume(proxy.v * this._master()); } catch (e) {} },
        onComplete: () => { try { s.setVolume(target * this._master()); } catch (e) {} },
      });
    }
  }
  // Push a new focused track onto the duck stack. Non-focused tracks
  // are faded to their natural × duck scalar.
  duckAllExcept(name, duck, ms = 1500) {
    const stack = this._stack || (this._stack = []);
    // Remove any prior entry for the same track so re-entry is idempotent
    for (let i = stack.length - 1; i >= 0; i--) if (stack[i].name === name) stack.splice(i, 1);
    stack.push({ name, duck, priority: this._priorityOf(name) });
    // Keep stack sorted by priority ascending so the top entry is the
    // highest-priority active focus.
    stack.sort((a, b) => a.priority - b.priority);
    this._applyAll(ms);
  }
  // Remove a track from the stack. If a higher-priority track is still
  // active, its scalar continues to apply. Only when the stack empties
  // do we restore to true natural volumes (over `ms`, default 3000).
  restoreAll(name, ms = 3000) {
    const stack = this._stack || (this._stack = []);
    for (let i = stack.length - 1; i >= 0; i--) {
      if (stack[i].name === name) { stack.splice(i, 1); break; }
    }
    this._applyAll(ms);
  }

  // ── trigger API ─────────────────────────────────────────────────
  startAmbient() {
    this._gated(() => {
      const s = this._start('wyrdow_ambient', { loop: true });
      if (s) this._tweenTo('wyrdow_ambient', this._ambientNaturalTarget, 2500);
    });
  }
  stopAmbient(ms = 2000) { this._gated(() => this._stopAfterFade('wyrdow_ambient', ms)); }

  playAwakening(volume = 0.40, fadeOutMs = null) {
    this._gated(() => {
      const s = this._start('theme_awakening', { loop: false });
      if (!s) return;
      this._tweenTo('theme_awakening', volume, 1500);
      if (fadeOutMs != null) {
        setTimeout(() => this._stopAfterFade('theme_awakening', fadeOutMs), 20000);
      }
    });
  }
  fadeOutAwakening(ms = 2000) { this._gated(() => this._stopAfterFade('theme_awakening', ms)); }

  startBaba() {
    this._gated(() => {
      this._start('baba_elzbieta_theme', { loop: true });
      this._tweenTo('baba_elzbieta_theme', 0.75, 1500);
      // LEVEL 1 — focused dialogue: everything else → 15%
      this.duckAllExcept('baba_elzbieta_theme', 0.15, 1500);
    });
  }
  stopBaba() {
    this._gated(() => {
      this.restoreAll('baba_elzbieta_theme', 3000);
      this._stopAfterFade('baba_elzbieta_theme', 2000);
    });
  }

  // Crossroads quest — staged volumes per knot count
  onKnotPlaced(knotsPlaced) {
    this._gated(() => {
      // Lazily start at knot 0 if not already playing
      const s = this.sounds['crossroads_quest'];
      if (s && !s.isPlaying) this._start('crossroads_quest', { loop: true });
      const stages = [
        { base: 0.10, ms: 3000 },
        { base: 0.25, ms: 4000 },
        { base: 0.45, ms: 4000 },
        { base: 0.65, ms: 4000 },
        { base: 0.80, ms: 4000 },
        { base: 1.00, ms: 6000 },
      ];
      const stage = stages[Math.max(0, Math.min(5, knotsPlaced))];
      this._tweenTo('crossroads_quest', stage.base, stage.ms);
      // Push crossroads onto the priority stack. At knots 1-3 it sits
      // at LEVEL 3 (quest, 0.35 duck on ambient); at knots ≥ 4 it
      // escalates to LEVEL 2 (event, 0.20 duck).
      const duckLevel = (knotsPlaced >= 4) ? 0.20 : 0.35;
      this.duckAllExcept('crossroads_quest', duckLevel, stage.ms);
      if (knotsPlaced >= 5) {
        // Hold 10s at full, then fade out 8s
        setTimeout(() => {
          this.restoreAll('crossroads_quest', 8000);
          this._stopAfterFade('crossroads_quest', 8000);
        }, 10000);
      }
    });
  }
  startCrossroadsIfIdle() {
    this._gated(() => {
      const s = this.sounds['crossroads_quest'];
      if (s && !s.isPlaying) this.onKnotPlaced(0);
    });
  }

  playVision(visionIndex /* 0..4 */) {
    this._gated(() => {
      const s = this._start('vision_theme', { loop: false });
      if (!s) return;
      // Pitch shift via setRate: rate = 2^(semitones/12)
      const semis = Math.max(0, Math.min(4, visionIndex));
      try { s.setRate(Math.pow(2, semis / 12)); } catch (e) {}
      this._tweenTo('vision_theme', 0.80, 1200);
      // LEVEL 2 — event track: everything else → 20%
      this.duckAllExcept('vision_theme', 0.20, 1500);
    });
  }
  stopVision() {
    this._gated(() => {
      this.restoreAll('vision_theme', 3000);
      this._stopAfterFade('vision_theme', 1500);
    });
  }

  playPoludnica(onFinished) {
    this._gated(() => {
      const s = this._start('poludnica_theme', { loop: false });
      if (!s) {
        if (onFinished) onFinished();
        return;
      }
      this._tweenTo('poludnica_theme', 0.90, 2000);
      // SACRED MOMENT — everything else ducks to 10% over 2s (ceremonial)
      this.duckAllExcept('poludnica_theme', 0.10, 2000);
      const dur = (s.duration && s.duration > 0) ? s.duration * 1000 : 18000;
      setTimeout(() => {
        this.restoreAll('poludnica_theme', 4000);
        try { s.stop(); } catch (e) {}
        if (onFinished) onFinished();
      }, dur);
    });
  }

  // Comfort wisp aftermath
  playComfortAwakening() {
    this._gated(() => {
      const s = this._start('theme_awakening', { loop: false });
      if (!s) return;
      this._tweenTo('theme_awakening', 0.35, 1200);
      setTimeout(() => this._stopAfterFade('theme_awakening', 4000), 16000);
    });
  }
}
const music = new MusicManager();
window.music = music;

// ═══════════════════════════════════════════════════════════════════════
//  SFX MANAGER — 18 one-shot / looped .wav files
//  Layered on top of existing procedural audio (does not replace
//  ambientAudio drones, the chimney crackle, the bell tone, etc. — it
//  simply adds sampled sounds for specific triggers).
// ═══════════════════════════════════════════════════════════════════════
class SfxManager {
  constructor() {
    this.scene = null;
    this.sounds = {};
    this.unlocked = false;
    this.muted = false;
    this._queue = [];
    // Per-trigger base volumes as specified in the integration brief.
    // These are multiplied by gameState.sfxVolume (master SFX slider).
    this.base = {
      dialogue_advance:   0.70,
      dialogue_open:      0.65,
      choice_select:      0.75,
      thread_knot:        0.85,
      shrine_glow:        0.60,
      door_baba:          0.80,
      knock_brel:         0.85,
      footsteps_dirt:     0.50,
      footsteps_grass:    0.45,
      firefly_jar:        0.80,
      codex_reveal:       0.85,
      quest_complete:     0.90,
      perimeter_complete: 0.55,
      observation_breath: 0.40,
      domovoi_crackle:    0.50,
      vision_whoosh:      0.70,
      idol_eyes:          0.95,
      crow_caw:           0.65,
    };
    this._keys = Object.keys(this.base);
  }
  preload(scene) {
    for (const key of this._keys) {
      try {
        if (!scene.cache.audio.exists(key)) {
          scene.load.audio(key, 'assets/sfx/' + key + '.wav');
        }
      } catch (e) {}
    }
    // Any loaderror is silently ignored (game continues without that SFX).
    scene.load.on('loaderror', (file) => {
      if (file && file.key && this.base[file.key] != null) {
        console.warn('[sfx] failed to load', file.key);
      }
    });
  }
  bind(scene) {
    this.scene = scene;
    for (const key of this._keys) {
      try {
        if (scene.cache.audio.exists(key) && !this.sounds[key]) {
          this.sounds[key] = scene.sound.add(key, { volume: 0, loop: false });
        }
      } catch (e) {}
    }
  }
  unlock() {
    if (this.unlocked) return;
    this.unlocked = true;
    const q = this._queue.slice(); this._queue.length = 0;
    for (const fn of q) { try { fn(); } catch (e) {} }
  }
  _gated(fn) {
    if (!this.unlocked) { this._queue.push(fn); return; }
    fn();
  }
  _master() {
    if (this.muted) return 0;
    const v = (gameState && typeof gameState.sfxVolume === 'number')
      ? gameState.sfxVolume : 0.85;
    return v;
  }
  // Play a one-shot sample at its base volume × master.
  play(key, opts = {}) {
    this._gated(() => {
      const s = this.sounds[key]; if (!s) return;
      const base = (opts.volume != null ? opts.volume : this.base[key]) || 0.5;
      const vol = base * this._master();
      try {
        if (s.isPlaying && !opts.overlap) s.stop();
        s.setVolume(vol);
        s.setLoop(false);
        s.play();
      } catch (e) {}
    });
  }
  // Start a looped sample with a fade-in.
  loop(key, targetMul = 1, fadeMs = 250) {
    this._gated(() => {
      const s = this.sounds[key]; if (!s) return;
      const target = this.base[key] * targetMul * this._master();
      try {
        s.setLoop(true);
        if (!s.isPlaying) { s.setVolume(0); s.play(); }
        s._sfxTargetMul = targetMul;
        this._tween(key, target, fadeMs);
      } catch (e) {}
    });
  }
  // Stop a looped sample with a fade-out.
  stopLoop(key, fadeMs = 250) {
    this._gated(() => {
      const s = this.sounds[key]; if (!s || !s.isPlaying) return;
      this._tween(key, 0, fadeMs, () => { try { s.stop(); } catch (e) {} });
    });
  }
  _tween(key, targetVol, ms, onDone) {
    const s = this.sounds[key]; if (!s || !this.scene) return;
    const proxy = { v: s.volume || 0 };
    this.scene.tweens.add({
      targets: proxy, v: targetVol, duration: ms,
      onUpdate: () => { try { s.setVolume(proxy.v); } catch (e) {} },
      onComplete: () => { try { s.setVolume(targetVol); } catch (e) {}
                          if (onDone) onDone(); },
    });
  }
  // Re-apply the master multiplier to any currently playing looped sfx
  // (called when the Settings slider moves or mute toggles).
  applyMaster() {
    for (const key of this._keys) {
      const s = this.sounds[key]; if (!s || !s.isPlaying) continue;
      const mul = s._sfxTargetMul != null ? s._sfxTargetMul : 1;
      const target = this.base[key] * mul * this._master();
      try { s.setVolume(target); } catch (e) {}
    }
  }
  toggleMute() { this.muted = !this.muted; this.applyMaster(); return this.muted; }
}
const sfx = new SfxManager();
window.sfx = sfx;

// ═══════════════════════════════════════════════════════════════════════
//  MAIN GAME SCENE
// ═══════════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init(data) {
    this.firstVisit = !!(data && data.firstVisit);
  }

  preload() {
    music.preload(this);
    sfx.preload(this);
    // Generate ground tile variants procedurally — 4 variants each so no
    // two tiles look identical. No strokes/symbols on the diamonds.
    for (let i = 0; i < 4; i++) {
      this.makeGrassTileVariant('tile_grass_' + i, i);
      this.makeDirtTileVariant('tile_dirt_' + i, i);
      this.makeBlendTileVariant('tile_blend_' + i, i);
    }
    // Special tiles (kept for compatibility — used at the crossroads centre,
    // house pads, mud, and eerie road).
    this.makeDirtTileVariant('tile_cross', 0, { warm: true });
    this.makeIsoTileFlat('tile_house', PAL.stoneDark);
    this.makeDirtTileVariant('tile_mud',  0, { dark: true });
    this.makeDirtTileVariant('tile_eerie',0, { eerie: true });
  }

  makeFilmGrainTexture(key, size) {
    const g = this.make.graphics({ add: false });
    // Neutral grey base so additive grain reads both up and down.
    g.fillStyle(0x808080, 1);
    g.fillRect(0, 0, size, size);
    // Random speckles — black and white pixels at varying density.
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const r = Math.random();
        if (r < 0.18) {
          g.fillStyle(0x000000, Math.random() * 0.7 + 0.3);
          g.fillRect(x, y, 1, 1);
        } else if (r > 0.82) {
          g.fillStyle(0xffffff, Math.random() * 0.7 + 0.3);
          g.fillRect(x, y, 1, 1);
        }
      }
    }
    g.generateTexture(key, size, size);
    g.destroy();
  }

  // Plain flat-fill diamond (used for house pads only).
  makeIsoTileFlat(key, color) {
    const g = this.make.graphics({ add: false });
    const w = TILE_W, h = TILE_H;
    g.fillStyle(color, 1);
    g.beginPath();
    g.moveTo(w/2, 0); g.lineTo(w, h/2); g.lineTo(w/2, h); g.lineTo(0, h/2);
    g.closePath(); g.fillPath();
    g.generateTexture(key, w, h);
    g.destroy();
  }

  // Helper — fill the iso diamond with the given colour.
  _fillIsoDiamond(g, color, alpha) {
    const w = TILE_W, h = TILE_H;
    g.fillStyle(color, alpha == null ? 1 : alpha);
    g.beginPath();
    g.moveTo(w/2, 0); g.lineTo(w, h/2); g.lineTo(w/2, h); g.lineTo(0, h/2);
    g.closePath(); g.fillPath();
  }

  // Test whether a point lies inside the iso diamond (so blotches don't
  // bleed past tile edges).
  _insideDiamond(x, y) {
    const w = TILE_W, h = TILE_H;
    return Math.abs(x - w/2) / (w/2) + Math.abs(y - h/2) / (h/2) <= 0.95;
  }

  // ── GRASS TILE VARIANT ────────────────────────────────────────────
  // A richer ground texture: deep moss base, mottled with earthy brown
  // and muted ochre patches. Each of the 4 variants has slightly
  // different base hue and patch placement so no two tiles look alike.
  makeGrassTileVariant(key, variant) {
    const g = this.make.graphics({ add: false });
    const w = TILE_W, h = TILE_H;

    // Slightly different base hue per variant — all moss-green family.
    const bases = [0x35421f, 0x3d4a25, 0x2f3d1c, 0x42502b];
    this._fillIsoDiamond(g, bases[variant % 4], 1);

    // A second moss layer — irregular cluster of small blobs instead of
    // one big ellipse, so tiles don't all share the same polka-dot.
    const moss2 = [0x445428, 0x394722, 0x4a5a30, 0x35411e][variant % 4];
    const blobSets = [
      [[20, 14, 6, 3], [28, 18, 5, 2], [38, 13, 7, 3], [16, 19, 4, 2]],
      [[24, 12, 5, 2], [34, 16, 6, 3], [42, 20, 4, 2], [18, 16, 5, 2]],
      [[22, 18, 7, 3], [32, 13, 5, 2], [40, 17, 6, 2], [14, 14, 4, 2]],
      [[26, 16, 6, 3], [36, 19, 4, 2], [44, 14, 5, 2], [20, 12, 5, 2]],
    ];
    g.fillStyle(moss2, 0.4);
    blobSets[variant % 4].forEach(([bx, by, bw, bh]) => {
      if (this._insideDiamond(bx, by)) g.fillEllipse(bx, by, bw, bh);
    });

    // Earth-brown patches — visible bare-soil bites through the grass.
    const earth = [0x4a3826, 0x3e2e1d, 0x55402a, 0x44321f][variant % 4];
    const earthSpots = [
      [w/2 - 14, h/2 - 4, 6, 3],
      [w/2 + 12, h/2 + 5, 7, 3],
      [w/2 + 2,  h/2 + 8, 5, 2],
    ];
    earthSpots.forEach(([ex, ey, ew, eh], i) => {
      // Rotate which spots show per variant
      if ((i + variant) % 4 === 3) return;
      if (this._insideDiamond(ex, ey)) {
        g.fillStyle(earth, 0.55);
        g.fillEllipse(ex, ey, ew, eh);
      }
    });

    // Muted ochre patches — sun-dried grass clumps.
    const ochre = [0x6a5a30, 0x7a6838, 0x5e4f2a, 0x685628][variant % 4];
    const ochreSpots = [
      [w/2 + 9,  h/2 - 5, 4, 2],
      [w/2 - 10, h/2 + 6, 5, 2],
      [w/2 - 4,  h/2 - 7, 3, 2],
    ];
    ochreSpots.forEach(([ox, oy, ow, oh], i) => {
      if ((i + variant) % 3 === 2) return;
      if (this._insideDiamond(ox, oy)) {
        g.fillStyle(ochre, 0.5);
        g.fillEllipse(ox, oy, ow, oh);
      }
    });

    // Tiny darker speckles — tonal noise so the surface reads as organic.
    g.fillStyle(0x1f2810, 0.35);
    const speckCount = 5 + variant;
    for (let i = 0; i < speckCount; i++) {
      // Deterministic per variant — pseudo-random from index.
      const sx = ((i * 17 + variant * 7) % 50) + 6;
      const sy = ((i * 11 + variant * 13) % 22) + 4;
      if (this._insideDiamond(sx, sy)) g.fillRect(sx, sy, 1, 1);
    }

    g.generateTexture(key, w, h);
    g.destroy();
  }

  // ── DIRT ROAD TILE VARIANT ────────────────────────────────────────
  // Deep ochre-brown packed earth. Mottled with darker ruts and a faint
  // lighter highlight along the centre suggesting a worn footpath.
  makeDirtTileVariant(key, variant, opts) {
    opts = opts || {};
    const g = this.make.graphics({ add: false });
    const w = TILE_W, h = TILE_H;

    // Base packed-earth ochre (warm for crossroads, dark for mud, blue
    // for the eerie road).
    let base = [0x5a4128, 0x4f3822, 0x624a2c, 0x533c25][variant % 4];
    if (opts.warm)  base = 0x6e5030;
    if (opts.dark)  base = 0x352519;
    if (opts.eerie) base = 0x3a4452;
    this._fillIsoDiamond(g, base, 1);

    // Subtle worn path texture — a slightly lighter band along the
    // diamond's long axis suggesting countless footfalls.
    const wear = opts.eerie ? 0x556678
               : opts.dark  ? 0x443223
               : 0x7a5a36;
    g.fillStyle(wear, 0.35);
    g.fillEllipse(w/2, h/2, 30, 6);
    g.fillStyle(wear, 0.22);
    g.fillEllipse(w/2, h/2, 44, 4);

    // Dark ruts — small irregular patches.
    const rut = opts.eerie ? 0x222a36
              : opts.dark  ? 0x1f1610
              : 0x3a2818;
    const ruts = [
      [w/2 - 12, h/2 + 2, 6, 2],
      [w/2 + 10, h/2 - 3, 5, 2],
      [w/2 + 4,  h/2 + 6, 4, 2],
    ];
    ruts.forEach(([rx, ry, rw, rh], i) => {
      if ((i + variant) % 4 === 3) return;
      if (this._insideDiamond(rx, ry)) {
        g.fillStyle(rut, 0.5);
        g.fillEllipse(rx, ry, rw, rh);
      }
    });

    // Pebble specks — tiny lighter dots.
    const pebble = opts.eerie ? 0x8899aa : 0x8a7050;
    for (let i = 0; i < 4 + variant; i++) {
      const sx = ((i * 13 + variant * 5) % 50) + 6;
      const sy = ((i * 9 + variant * 11) % 22) + 4;
      if (this._insideDiamond(sx, sy)) {
        g.fillStyle(pebble, 0.4);
        g.fillRect(sx, sy, 1, 1);
      }
    }

    g.generateTexture(key, w, h);
    g.destroy();
  }

  // ── BLEND TILE VARIANT ────────────────────────────────────────────
  // A transition tile — half mossy grass, half packed earth — used to
  // soften the boundary between green and brown patches and to break
  // the checkerboard feel when sprinkled randomly through grass.
  makeBlendTileVariant(key, variant) {
    const g = this.make.graphics({ add: false });
    const w = TILE_W, h = TILE_H;

    // Mid base — slightly desaturated, between grass and earth so the
    // contrast feels softer.
    const bases = [0x3e3a20, 0x423c22, 0x39351c, 0x453f24];
    this._fillIsoDiamond(g, bases[variant % 4], 1);

    // Patches of mossy green
    const moss = [0x445428, 0x394722, 0x4a5a30, 0x3c4922][variant % 4];
    g.fillStyle(moss, 0.55);
    const mossSpots = [
      [w/2 - 10, h/2 - 3, 8, 4],
      [w/2 + 8,  h/2 + 4, 7, 3],
      [w/2 - 2,  h/2 - 6, 5, 2],
    ];
    mossSpots.forEach(([x, y, ww, hh]) => {
      if (this._insideDiamond(x, y)) g.fillEllipse(x, y, ww, hh);
    });

    // Patches of bare earth
    const earth = [0x4a3826, 0x3e2e1d, 0x55402a, 0x44321f][variant % 4];
    g.fillStyle(earth, 0.55);
    const earthSpots = [
      [w/2 + 12, h/2 - 2, 7, 3],
      [w/2 - 12, h/2 + 6, 6, 3],
      [w/2 + 4,  h/2 + 7, 5, 2],
    ];
    earthSpots.forEach(([x, y, ww, hh]) => {
      if (this._insideDiamond(x, y)) g.fillEllipse(x, y, ww, hh);
    });

    // Pixel speckles
    g.fillStyle(0x1f2810, 0.35);
    for (let i = 0; i < 6; i++) {
      const sx = ((i * 17 + variant * 7) % 50) + 6;
      const sy = ((i * 11 + variant * 13) % 22) + 4;
      if (this._insideDiamond(sx, sy)) g.fillRect(sx, sy, 1, 1);
    }

    g.generateTexture(key, w, h);
    g.destroy();
  }

  // ── THREAD KNOT INVENTORY HUD ─────────────────────────────────────
  // Five small blue glowing knots in the top-right corner. They disappear
  // one by one as the player places knots at markers.
  createThreadKnotHUD() {
    const cam = this.cameras.main;
    this.knotHudIcons = [];
    const startX = cam.width - 30;
    const y = 30;
    for (let i = 0; i < 5; i++) {
      const g = this.add.graphics();
      g.setScrollFactor(0).setDepth(1003).setVisible(false);
      const x = startX - i * 22;
      // Soft blue glow
      g.fillStyle(0x4466aa, 0.25);
      g.fillCircle(x, y, 9);
      g.fillStyle(0x5577cc, 0.4);
      g.fillCircle(x, y, 6);
      // Knot core
      g.fillStyle(0x3a5598, 1);
      g.fillCircle(x, y, 4);
      // Tiny highlight
      g.fillStyle(0xa8c0ff, 0.9);
      g.fillRect(x - 1, y - 1, 1, 1);
      // Two short thread tails
      g.lineStyle(1, 0x3a5598, 0.95);
      g.beginPath(); g.moveTo(x - 3, y + 3); g.lineTo(x - 5, y + 6); g.strokePath();
      g.beginPath(); g.moveTo(x + 3, y + 3); g.lineTo(x + 5, y + 6); g.strokePath();
      this.knotHudIcons.push({ g, baseAlpha: 1, phase: i * 0.6 });
    }
  }

  showThreadKnotHUD() {
    if (!this.knotHudIcons) return;
    this.knotHudIcons.forEach(k => { k.g.setVisible(true); k.g.setAlpha(0); });
    this.tweens.add({
      targets: this.knotHudIcons.map(k => k.g),
      alpha: 1, duration: 900,
    });
  }

  removeThreadKnotFromHUD() {
    if (!this.knotHudIcons) return;
    // Remove the rightmost still-visible icon (last in placed order)
    for (let i = this.knotHudIcons.length - 1; i >= 0; i--) {
      const k = this.knotHudIcons[i];
      if (k.g.visible && k.g.alpha > 0.05) {
        this.tweens.add({
          targets: k.g, alpha: 0, duration: 600,
          onComplete: () => k.g.setVisible(false),
        });
        return;
      }
    }
  }

  // ── GROUND TILES ──────────────────────────────────────────────────
  drawGround() {
    // Pick a tile texture key for a given map cell — randomises grass and
    // dirt across the 4 procedural variants so no two tiles look the same.
    const pickKey = (cellType, x, y) => {
      // Deterministic per-tile hash so variants don't reshuffle on
      // re-renders. We derive two independent values: one for the
      // weighted pool roll, one for the variant index.
      const v = ((x * 73856093) ^ (y * 19349663)) >>> 0;
      const roll = (v % 1000) / 1000;     // 0..1
      const idx  = (v >>> 8) % 4;         // 0..3
      switch (cellType) {
        case 0: {
          // Grass cells: 70% pure grass, 20% blend transition,
          // 10% bare-earth — genuine random distribution, no
          // alternation, breaks the checkerboard.
          if (roll < 0.70) return 'tile_grass_' + idx;
          if (roll < 0.90) return 'tile_blend_' + idx;
          return 'tile_dirt_' + idx;
        }
        case 1: return 'tile_dirt_'  + idx;
        case 2: return 'tile_cross';
        case 3: return 'tile_house';
        case 4: return 'tile_mud';
        case 5: return 'tile_eerie';
        default: return 'tile_grass_0';
      }
    };

    // Map centre (in cells) used for radial darkening.
    const cxCell = CENTER, cyCell = CENTER;
    const maxDist = Math.sqrt(2) * (MAP_SIZE * 0.5);

    for (let y = 0; y < MAP_SIZE; y++) {
      for (let x = 0; x < MAP_SIZE; x++) {
        const iso = cartToIso(x, y);
        const px = iso.x + this.worldOffset.x;
        const py = iso.y + this.worldOffset.y;
        const cell = map[y][x];
        const key = pickKey(cell, x, y);
        const tile = this.add.image(px, py, key).setOrigin(0.5, 0.5);
        // Radial darkening: tiles further from the idol read ~20%
        // darker so the centre feels like the focal hot-spot.
        // Within ~3 tiles of the idol, leave fully bright.
        const dCell = Math.sqrt((x - cxCell) * (x - cxCell) + (y - cyCell) * (y - cyCell));
        if (dCell > 3) {
          const t = Math.min(1, (dCell - 3) / (maxDist - 3));
          const tint = 1 - t * 0.20;
          const c = Math.round(tint * 255);
          tile.setTint((c << 16) | (c << 8) | c);
        } else {
          // Inside the warm ring — slight amber tint for extra warmth.
          tile.setTint(0xfff0d8);
        }
        this.groundLayer.add(tile);

        // ── Worn edges where dirt road meets grass ─────────────────
        // Draw a small ragged ochre lip on the grass-side of road tiles
        // so the path looks trodden and broken at the verge.
        if (cell === 1 || cell === 2 || cell === 5) {
          const adj = [[0,-1],[0,1],[-1,0],[1,0]];
          adj.forEach(([dx, dy]) => {
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || nx >= MAP_SIZE || ny < 0 || ny >= MAP_SIZE) return;
            if (map[ny][nx] !== 0) return;
            const niso = cartToIso(x + dx * 0.42, y + dy * 0.42);
            const ex = niso.x + this.worldOffset.x;
            const ey = niso.y + this.worldOffset.y;
            const edge = this.add.graphics();
            edge.fillStyle(0x4a3520, 0.5);
            edge.fillEllipse(ex, ey, 9, 4);
            edge.fillStyle(0x6a4a28, 0.35);
            edge.fillEllipse(ex + 1, ey - 1, 6, 3);
            this.groundLayer.add(edge);
          });
        }

        // ── Scatter details (~1 in 8 grass tiles) ──────────────────
        // Dried leaf, small stone, or darker grass tuft. Variety keeps
        // the ground feeling natural without becoming busy.
        if (cell === 0 && Math.random() < 0.125) {
          this.drawScatterDetail(px, py);
        }

        // Animated grass on grass tiles
        if (cell === 0 && Math.random() < 0.4) {
          this.drawAnimatedGrass(px, py - 2);
        }
        // Overgrown edges on paths next to grass
        if (map[y][x] === 1 || map[y][x] === 5) {
          const adj = [[0,-1],[0,1],[-1,0],[1,0]];
          const nearGrass = adj.some(([dx,dy]) => {
            const nx = x+dx, ny = y+dy;
            return nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE && map[ny][nx] === 0;
          });
          if (nearGrass && Math.random() < 0.45) {
            this.drawAnimatedGrass(px + (Math.random()-0.5)*20, py - 1);
          }
        }
        // Eerie glow spots along fifth road
        if (map[y][x] === 5 && Math.random() < 0.15) {
          const glow = this.add.graphics();
          glow.fillStyle(PAL.eerieGlow, 0.08);
          glow.fillCircle(px, py, 10 + Math.random() * 8);
          this.groundLayer.add(glow);
        }
      }
    }
  }

  // Animated grass blade that sways with wind
  drawAnimatedGrass(x, y) {
    const g = this.add.graphics();
    const ox = (Math.random() - 0.5) * 14;
    const oy = (Math.random() - 0.5) * 5;
    const blades = [];
    const numBlades = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < numBlades; i++) {
      blades.push({
        bx: ox + i * 2.5 + (Math.random()-0.5)*2,
        height: 4 + Math.random() * 5,
        phase: Math.random() * Math.PI * 2,
        speed: 0.8 + Math.random() * 0.6,
      });
    }
    this.grassBlades.push({ g, x, y, blades, color: Math.random() < 0.3 ? PAL.grassBright : PAL.grassLight });
    this.groundLayer.add(g);
  }

  // ── SCATTER DETAILS ───────────────────────────────────────────────
  // Tiny ground objects sprinkled occasionally on grass tiles to break
  // texture monotony — a dried leaf, a stone, or a darker grass tuft.
  drawScatterDetail(px, py) {
    const g = this.add.graphics();
    const ox = (Math.random() - 0.5) * 14;
    const oy = (Math.random() - 0.5) * 4 + 2;
    const kind = Math.floor(Math.random() * 3);

    if (kind === 0) {
      // Dried leaf — small ochre/copper crescent
      const leafCol = [0x6a4a22, 0x7a5028, 0x8a5a30][Math.floor(Math.random() * 3)];
      g.fillStyle(leafCol, 0.8);
      g.fillEllipse(px + ox, py + oy, 4, 2);
      g.lineStyle(1, 0x3a2a12, 0.6);
      g.beginPath();
      g.moveTo(px + ox - 2, py + oy);
      g.lineTo(px + ox + 2, py + oy);
      g.strokePath();
    } else if (kind === 1) {
      // Small stone — grey ellipse with a darker base
      g.fillStyle(0x2a2a2e, 0.5);
      g.fillEllipse(px + ox, py + oy + 1, 4, 2); // shadow
      g.fillStyle(0x6a6a6a, 1);
      g.fillEllipse(px + ox, py + oy, 3, 2);
      g.fillStyle(0x8a8a8a, 0.7);
      g.fillEllipse(px + ox - 0.5, py + oy - 0.5, 2, 1);
    } else {
      // Tuft of darker grass — a few short dark blades
      g.fillStyle(0x1f2810, 0.7);
      g.fillEllipse(px + ox, py + oy + 0.5, 5, 1.5);
      g.lineStyle(1, 0x2f3a18, 0.8);
      for (let i = -2; i <= 2; i++) {
        g.beginPath();
        g.moveTo(px + ox + i, py + oy);
        g.lineTo(px + ox + i + (Math.random() - 0.5), py + oy - 2 - Math.random());
        g.strokePath();
      }
    }

    this.groundLayer.add(g);
  }

  // Redraw all grass blades with current wind sway
  updateGrass(time) {
    const windBase = Math.sin(time * 0.0008) * 2;
    this.grassBlades.forEach(gb => {
      gb.g.clear();
      gb.g.lineStyle(1, gb.color, 0.55);
      gb.blades.forEach(b => {
        const sway = Math.sin(time * 0.001 * b.speed + b.phase) * 2.5 + windBase;
        gb.g.beginPath();
        gb.g.moveTo(gb.x + b.bx, gb.y);
        gb.g.lineTo(gb.x + b.bx + sway, gb.y - b.height);
        gb.g.strokePath();
      });
    });
  }

  // ── HOUSES (Enhanced) ─────────────────────────────────────────────
  drawAllHouses() { houses.forEach(h => this.drawHouse(h)); }

  // ── ABANDONED INN DETAILS ────────────────────────────────────────
  // The Elder house at (6,9) becomes the Domovoi's inn. We overlay
  // decrepit details on top of the base house sprite: boarded window
  // with one fresh plank, a door nailed shut with two crossed planks,
  // a small ceramic offering bowl on the doorstep, and a timer-driven
  // smoke puff emitter above the chimney.
  drawAbandonedInnDetails() {
    // Doorstep position matches _domovoiZone (7, 9)
    const doorIso = cartToIso(7, 9);
    const dx = doorIso.x + this.worldOffset.x;
    const dy = doorIso.y + this.worldOffset.y;

    const g = this.add.graphics();
    g.setDepth(460);
    // Darker wash over the Elder house footprint — two tiles (7,9) and (6,9)
    // just lightly dims the near side.
    // ── Nailed-shut door: two crossed planks ─────────────
    const doorX = dx;
    const doorY = dy - 22;
    g.lineStyle(3, 0x3a2414, 1);
    g.beginPath();
    g.moveTo(doorX - 7, doorY - 10);
    g.lineTo(doorX + 7, doorY + 10);
    g.strokePath();
    g.beginPath();
    g.moveTo(doorX - 7, doorY + 10);
    g.lineTo(doorX + 7, doorY - 10);
    g.strokePath();
    // Rusty nails at plank ends
    g.fillStyle(0x6a3a1a, 1);
    g.fillRect(doorX - 8, doorY - 11, 2, 2);
    g.fillRect(doorX + 6, doorY + 9, 2, 2);
    g.fillRect(doorX - 8, doorY + 9, 2, 2);
    g.fillRect(doorX + 6, doorY - 11, 2, 2);

    // ── Boarded window — one board lighter (recently replaced) ──
    const winX = doorX - 18;
    const winY = doorY - 6;
    g.fillStyle(0x2a1810, 1);
    g.fillRect(winX, winY, 10, 10);
    g.fillStyle(0x4a2e18, 1);
    g.fillRect(winX, winY + 1, 10, 2);     // top board
    g.fillRect(winX, winY + 5, 10, 2);     // middle board
    g.fillStyle(0x6a4a28, 1);              // ← fresher board
    g.fillRect(winX, winY + 9, 10, 2);

    // ── Offering bowl on the doorstep ───────────────────
    g.fillStyle(0x000000, 0.35);
    g.fillEllipse(doorX, doorY + 16, 10, 3);
    g.fillStyle(0x8a6a4a, 1);
    g.fillEllipse(doorX, doorY + 14, 9, 4);
    g.fillStyle(0x5a3a24, 1);
    g.fillEllipse(doorX, doorY + 13, 7, 2);

    this._innDetailsGfx = g;

    // ── Chimney smoke: slow irregular dark puffs ───────
    // Chimney is roughly above the Elder house roof peak.
    this._innSmoke = [];
    this._innSmokeGfx = this.add.graphics().setDepth(700);
    this._innSmokeNextPuff = 0;
    // Anchor chimney position approx — above the door, offset up & left.
    this._innChimneyX = doorX - 6;
    this._innChimneyY = doorY - 60;
  }

  updateInnSmoke(time, delta) {
    if (!this._innSmokeGfx) return;
    this._innSmokeNextPuff -= delta;
    if (this._innSmokeNextPuff <= 0) {
      // Randomised spacing 3–8 seconds, tighter while the domovoi speaks
      const speaking = this._domovoiSpeaking ? 0.4 : 1.0;
      this._innSmokeNextPuff = (3000 + Math.random() * 5000) * speaking;
      this._innSmoke.push({
        x: this._innChimneyX + (Math.random() - 0.5) * 2,
        y: this._innChimneyY,
        vy: -0.015 - Math.random() * 0.01,
        vx: (Math.random() - 0.5) * 0.01,
        r: 2 + Math.random() * 1.5,
        life: 1.0,
      });
    }
    const g = this._innSmokeGfx;
    g.clear();
    for (let i = this._innSmoke.length - 1; i >= 0; i--) {
      const p = this._innSmoke[i];
      p.x += p.vx * delta;
      p.y += p.vy * delta;
      p.r += 0.003 * delta;
      p.life -= 0.00025 * delta;
      if (p.life <= 0) { this._innSmoke.splice(i, 1); continue; }
      g.fillStyle(0x2a2420, p.life * 0.55);
      g.fillCircle(p.x, p.y, p.r);
    }
  }

  // ── REGENCY DOCUMENT READER ──────────────────────────────────────
  // Full-screen cold-serif memorandum used for the signpost fragment.
  showRegencyDocument(title, body, onClose) {
    if (this._regencyDocOpen) return;
    this._regencyDocOpen = true;
    const cam = this.cameras.main;
    const W = cam.width, H = cam.height;

    const bg = this.add.graphics().setScrollFactor(0).setDepth(1600);
    bg.fillStyle(0x000000, 0.85); bg.fillRect(0, 0, W, H);
    // Paper
    const paperW = Math.min(560, W * 0.78);
    const paperH = Math.min(640, H * 0.82);
    const px = (W - paperW) / 2, py = (H - paperH) / 2;
    bg.fillStyle(0xf4f2ec, 1); bg.fillRect(px, py, paperW, paperH);
    bg.lineStyle(1, 0x888888, 1); bg.strokeRect(px, py, paperW, paperH);
    // Header bar
    bg.fillStyle(0xe4e2dc, 1); bg.fillRect(px, py, paperW, 34);
    bg.lineStyle(1, 0x888888, 1); bg.strokeRect(px, py, paperW, 34);

    const header = this.add.text(px + 16, py + 10, title, {
      fontFamily: '"Times New Roman", Times, serif',
      fontSize: '13px',
      color: '#1a1a1a',
      fontStyle: 'normal',
    }).setScrollFactor(0).setDepth(1601);

    const txt = this.add.text(px + 30, py + 60, body, {
      fontFamily: '"Times New Roman", Times, serif',
      fontSize: '14px',
      color: '#1a1a1a',
      lineSpacing: 6,
      wordWrap: { width: paperW - 60 },
    }).setScrollFactor(0).setDepth(1601);

    // Observation (italic, amber) beneath the paper
    const obs = this.add.text(W / 2, py + paperH + 18,
      'This copy was not destroyed. Someone kept this deliberately. Someone wanted it found.',
      {
        fontFamily: 'Georgia, serif', fontSize: '14px',
        color: '#e8c88a', fontStyle: 'italic',
        stroke: '#0a0810', strokeThickness: 2,
        align: 'center', wordWrap: { width: W * 0.7 },
      }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(1601);

    const hint = this.add.text(W / 2, H - 26, 'Press ESC or E to close', {
      fontFamily: 'Georgia, serif', fontSize: '12px', color: '#8a8474',
    }).setOrigin(0.5).setScrollFactor(0).setDepth(1601);

    // Player's mark pulses hard once
    this._markProximityBoost = 1.0;
    setTimeout(() => { this._markProximityBoost = 0; }, 1200);

    const cleanup = () => {
      bg.destroy(); header.destroy(); txt.destroy(); obs.destroy(); hint.destroy();
      this._regencyDocOpen = false;
      document.removeEventListener('keydown', keyHandler, true);
      if (onClose) onClose();
    };
    const keyHandler = (e) => {
      if (e.key === 'Escape' || e.key === 'e' || e.key === 'E' || e.key === 'Enter') {
        e.preventDefault(); e.stopPropagation();
        cleanup();
      }
    };
    document.addEventListener('keydown', keyHandler, true);
  }

  drawHouse(h) {
    const g = this.add.graphics();
    const cx = h.x + h.w / 2, cy = h.y + h.h / 2;
    const iso = cartToIso(cx, cy);
    const sx = iso.x + this.worldOffset.x;
    const sy = iso.y + this.worldOffset.y;
    const bw = h.w * TILE_W * 0.38;
    const bh = h.h * TILE_H * 0.8;
    const wallH = 34 + Math.random() * 6;
    const roofPeak = wallH + 31; // +30% steeper for stronger silhouette
    const lean = h.lean || 0;
    const leanPx = lean * wallH;

    // ── Soft drop shadow ────────────────────────────────────────────
    // Two layered ellipses — wider/softer outer + tighter darker inner.
    g.fillStyle(0x000000, 0.18);
    g.fillEllipse(sx + 10, sy + 7, bw * 1.7, bh * 0.7);
    g.fillStyle(0x000000, 0.32);
    g.fillEllipse(sx + 8, sy + 5, bw * 1.35, bh * 0.55);

    // ── Foundation stones ───────────────────────────────────────────
    g.fillStyle(PAL.stoneDark, 0.7);
    g.beginPath();
    g.moveTo(sx - bw/2 - 2, sy + 2); g.lineTo(sx, sy - bh/4 + 2);
    g.lineTo(sx + bw/2 + 2, sy + 2); g.lineTo(sx, sy + bh/4 + 2);
    g.closePath(); g.fillPath();

    // ── Left wall — log cabin texture ───────────────────────────────
    g.fillStyle(PAL.woodDark, 1);
    g.beginPath();
    g.moveTo(sx - bw/2, sy);
    g.lineTo(sx - bw/2 + leanPx, sy - wallH);
    g.lineTo(sx + leanPx, sy - wallH - bh/4);
    g.lineTo(sx, sy - bh/4);
    g.closePath(); g.fillPath();

    // Log lines on left wall — slight per-line variation so the timber
    // reads as rough-hewn rather than machine-cut.
    for (let i = 1; i <= 7; i++) {
      const t = i / 8;
      const wobble = Math.sin(i * 1.7 + h.x * 0.3) * 0.6;
      const ly = sy - wallH * t + wobble;
      const lx = leanPx * t;
      const col = (i % 2 === 0) ? PAL.logLight : PAL.logDark;
      const a = 0.35 + (i % 3) * 0.08;
      g.lineStyle(1, col, a);
      g.beginPath();
      g.moveTo(sx - bw/2 + lx, ly);
      g.lineTo(sx + lx, ly - bh/4);
      g.strokePath();
      // Tiny knothole on every third line
      if (i % 3 === 0) {
        g.fillStyle(PAL.logDark, 0.6);
        g.fillCircle(sx - bw/3 + lx, ly - bh/8, 0.8);
      }
    }

    // ── Right wall ──────────────────────────────────────────────────
    g.fillStyle(PAL.wood, 1);
    g.beginPath();
    g.moveTo(sx + bw/2, sy);
    g.lineTo(sx + bw/2 + leanPx, sy - wallH);
    g.lineTo(sx + leanPx, sy - wallH - bh/4);
    g.lineTo(sx, sy - bh/4);
    g.closePath(); g.fillPath();

    // Log lines on right wall — same slight wobble for rough-hewn feel.
    for (let i = 1; i <= 7; i++) {
      const t = i / 8;
      const wobble = Math.sin(i * 1.3 + h.y * 0.3) * 0.6;
      const ly = sy - wallH * t + wobble;
      const lx = leanPx * t;
      const col = (i % 2 === 0) ? PAL.logDark : PAL.logLight;
      const a = 0.3 + (i % 3) * 0.08;
      g.lineStyle(1, col, a);
      g.beginPath();
      g.moveTo(sx + bw/2 + lx, ly);
      g.lineTo(sx + lx, ly - bh/4);
      g.strokePath();
      if (i % 3 === 0) {
        g.fillStyle(PAL.logDark, 0.5);
        g.fillCircle(sx + bw/3 + lx, ly - bh/8, 0.8);
      }
    }

    // ── Log ends protruding at corners ──────────────────────────────
    for (let i = 1; i <= 4; i++) {
      const t = i / 5;
      const ly = sy - wallH * t;
      g.fillStyle(PAL.log, 0.8);
      g.fillCircle(sx - bw/2 + leanPx * t - 2, ly, 2);
      g.fillCircle(sx + bw/2 + leanPx * t + 2, ly, 2);
    }

    // ── Windows — equal on both sides, with warm glow ───────────────
    const winY = sy - wallH * 0.55;
    const winW = 6, winH = 7;
    for (const wx of [-bw/3, bw/3]) {
      // Window frame
      g.fillStyle(PAL.woodDark, 1);
      g.fillRect(sx + wx + leanPx*0.55 - winW/2 - 1, winY - winH/2 - 1, winW + 2, winH + 2);
      // Glass (dark)
      g.fillStyle(PAL.dusk, 0.7);
      g.fillRect(sx + wx + leanPx*0.55 - winW/2, winY - winH/2, winW, winH);
      // Warm candlelight glow from inside — bumped brighter
      g.fillStyle(PAL.candleLight, 0.55);
      g.fillRect(sx + wx + leanPx*0.55 - winW/2 + 1, winY - winH/2 + 1, winW - 2, winH - 2);
      // Brighter inner core suggesting candle flame
      g.fillStyle(0xffe0a0, 0.5);
      g.fillRect(sx + wx + leanPx*0.55 - winW/2 + 2, winY - winH/2 + 2, winW - 4, winH - 4);
      // Window cross-bar
      g.lineStyle(1, PAL.woodDark, 0.6);
      g.beginPath(); g.moveTo(sx + wx + leanPx*0.55, winY - winH/2); g.lineTo(sx + wx + leanPx*0.55, winY + winH/2); g.strokePath();

      // Store window position for light pool and curtain animation
      const winPx = sx + wx + leanPx*0.55;
      this.windowPositions.push({ x: winPx, y: winY, w: winW, h: winH });
      this.lightPools.push({
        x: winPx,
        y: sy + 4,
        radius: 20,
        intensity: 0.06,
        color: PAL.warmLight,
      });
    }

    // ── Door — wooden planks with visible grain & iron hinges ───────
    const doorX = sx - 3 + bw/8;
    const doorY = sy - 14;
    const doorW = 7, doorH = 13;
    // Door body — slightly varied dark wood
    g.fillStyle(PAL.woodDark, 1);
    g.fillRect(doorX, doorY, doorW, doorH);
    g.fillStyle(PAL.logDark, 0.35);
    g.fillRect(doorX, doorY, doorW, doorH);
    // Three vertical planks with seams
    g.lineStyle(1, 0x1a1006, 0.7);
    g.beginPath(); g.moveTo(doorX + 2.3, doorY); g.lineTo(doorX + 2.3, doorY + doorH); g.strokePath();
    g.beginPath(); g.moveTo(doorX + 4.6, doorY); g.lineTo(doorX + 4.6, doorY + doorH); g.strokePath();
    // Wood grain — short irregular streaks down each plank
    g.lineStyle(1, PAL.logLight, 0.18);
    for (let i = 0; i < 3; i++) {
      const px = doorX + 1.1 + i * 2.3;
      g.beginPath(); g.moveTo(px, doorY + 1); g.lineTo(px + 0.3, doorY + 5);  g.strokePath();
      g.beginPath(); g.moveTo(px - 0.2, doorY + 6); g.lineTo(px + 0.2, doorY + 11); g.strokePath();
    }
    // Iron hinges — top and bottom strap hinges
    g.fillStyle(0x2a2a30, 1);
    g.fillRect(doorX, doorY + 1, doorW, 1.4);
    g.fillRect(doorX, doorY + doorH - 2.4, doorW, 1.4);
    // Hinge bolts (small dots at strap ends)
    g.fillStyle(0x111114, 1);
    g.fillCircle(doorX + 0.6, doorY + 1.7, 0.6);
    g.fillCircle(doorX + doorW - 0.6, doorY + 1.7, 0.6);
    g.fillCircle(doorX + 0.6, doorY + doorH - 1.7, 0.6);
    g.fillCircle(doorX + doorW - 0.6, doorY + doorH - 1.7, 0.6);
    // Highlight catching dusk light on the iron
    g.fillStyle(0x6a6a72, 0.5);
    g.fillRect(doorX, doorY + 1, doorW, 0.4);
    // Copper door handle
    g.fillStyle(PAL.copper, 1);
    g.fillCircle(sx + bw/8 + 3, sy - 8, 1.3);
    g.fillStyle(PAL.copperLight, 0.7);
    g.fillCircle(sx + bw/8 + 2.7, sy - 8.3, 0.6);

    // ── Thatched roof ───────────────────────────────────────────────
    const roofOverhang = 10;
    // Left slope
    g.fillStyle(PAL.thatch, 1);
    g.beginPath();
    g.moveTo(sx - bw/2 - roofOverhang + leanPx, sy - wallH + 2);
    g.lineTo(sx + leanPx, sy - roofPeak - bh/4);
    g.lineTo(sx + leanPx, sy - wallH - bh/4);
    g.closePath(); g.fillPath();
    // Right slope
    g.fillStyle(PAL.thatchDark, 1);
    g.beginPath();
    g.moveTo(sx + bw/2 + roofOverhang + leanPx, sy - wallH + 2);
    g.lineTo(sx + leanPx, sy - roofPeak - bh/4);
    g.lineTo(sx + leanPx, sy - wallH - bh/4);
    g.closePath(); g.fillPath();

    // Thatch texture — many horizontal lines
    for (let i = 1; i <= 6; i++) {
      const t = i / 7;
      const col = (i % 2 === 0) ? PAL.thatchLight : PAL.strawDark;
      g.lineStyle(1, col, 0.2);
      const topY = Phaser.Math.Linear(sy - wallH - bh/4, sy - roofPeak - bh/4, t);
      const lx = Phaser.Math.Linear(sx - bw/2 - roofOverhang + leanPx, sx + leanPx, t);
      const rx = Phaser.Math.Linear(sx + bw/2 + roofOverhang + leanPx, sx + leanPx, t);
      g.beginPath(); g.moveTo(lx, Phaser.Math.Linear(sy - wallH + 2, sy - roofPeak - bh/4, t)); g.lineTo(sx + leanPx, topY); g.strokePath();
      g.beginPath(); g.moveTo(rx, Phaser.Math.Linear(sy - wallH + 2, sy - roofPeak - bh/4, t)); g.lineTo(sx + leanPx, topY); g.strokePath();
    }

    // Ridge line
    g.lineStyle(2, PAL.thatchDark, 0.5);
    g.beginPath();
    g.moveTo(sx + leanPx, sy - roofPeak - bh/4);
    g.lineTo(sx + leanPx, sy - wallH - bh/4);
    g.strokePath();

    // Dark outline along the top edges of both roof slopes —
    // gives the silhouette definition against the sky.
    g.lineStyle(2, 0x14100a, 0.95);
    g.beginPath();
    g.moveTo(sx - bw/2 - roofOverhang + leanPx, sy - wallH + 2);
    g.lineTo(sx + leanPx, sy - roofPeak - bh/4);
    g.lineTo(sx + bw/2 + roofOverhang + leanPx, sy - wallH + 2);
    g.strokePath();

    // ── Chimney with smoke ──────────────────────────────────────────
    if (h.chimney) {
      const chimX = sx + bw/4 + leanPx;
      const chimY = sy - roofPeak - bh/4 + 8;
      // Stone chimney
      g.fillStyle(PAL.stone, 0.9);
      g.fillRect(chimX - 3, chimY - 10, 7, 12);
      g.fillStyle(PAL.stoneDark, 0.7);
      g.fillRect(chimX - 4, chimY - 12, 9, 3);
      // Chimney cap
      g.fillStyle(PAL.iron, 0.6);
      g.fillRect(chimX - 4, chimY - 13, 9, 2);

      // Register smoke emitter
      this.smokeEmitters.push({
        x: chimX, y: chimY - 14,
        particles: [],
      });
    }

    // ── Blue thread soaked in wine — tied to 3 doorframes ─────────
    // Folk protection against the rearranging roads. Visible as a thin
    // blue-grey pixel line tied across the door lintel.
    const threadHouseIdx = houses.indexOf(h);
    if (threadHouseIdx === 0 || threadHouseIdx === 3 || threadHouseIdx === 5) {
      g.lineStyle(1, 0x6e84a8, 0.95);
      g.beginPath();
      g.moveTo(doorX - 1, doorY - 1);
      g.lineTo(doorX + doorW + 1, doorY - 1);
      g.strokePath();
      // Tied knot dots at each end
      g.fillStyle(0x4a5e7a, 1);
      g.fillCircle(doorX - 1, doorY - 1, 0.9);
      g.fillCircle(doorX + doorW + 1, doorY - 1, 0.9);
      // A short tail dangling
      g.lineStyle(1, 0x6e84a8, 0.7);
      g.beginPath();
      g.moveTo(doorX + doorW + 1, doorY - 1);
      g.lineTo(doorX + doorW + 2, doorY + 2);
      g.strokePath();
    }

    // ── Charm of broken glass & poppy seeds ─────────────────────────
    g.lineStyle(1, PAL.stoneDark, 0.6);
    g.beginPath(); g.moveTo(sx + bw/8 + 8, sy - wallH * 0.65); g.lineTo(sx + bw/8 + 8, sy - wallH * 0.65 + 9); g.strokePath();
    g.fillStyle(PAL.shrineGlow, 0.35);
    g.fillTriangle(sx + bw/8 + 6, sy - wallH*0.65 + 9, sx + bw/8 + 10, sy - wallH*0.65 + 9, sx + bw/8 + 8, sy - wallH*0.65 + 14);
    g.fillStyle(PAL.deepRed, 0.6);
    g.fillCircle(sx + bw/8 + 5, sy - wallH*0.65 + 11, 1);
    g.fillCircle(sx + bw/8 + 11, sy - wallH*0.65 + 11, 1);

    // ── Wycinanki folk-art patterns on right wall ──────────────────
    // Only on a few selected houses — Weaver, Healer, Elder — so the
    // motif feels precious rather than universal. Painted in faded
    // deep-red and ash-white.
    const houseIdxForArt = houses.indexOf(h);
    if (houseIdxForArt === 1 || houseIdxForArt === 2 || houseIdxForArt === 4) {
      const wcX = sx + bw/4 + leanPx * 0.45;
      const wcY = sy - wallH * 0.38;
      // Pick paint colour per house — Weaver: white, Healer/Elder: red
      const paint = (houseIdxForArt === 1) ? 0xd8c8a8 : PAL.deepRed;
      const paintAlpha = (houseIdxForArt === 1) ? 0.4 : 0.45;
      // Central rosette diamond
      g.fillStyle(paint, paintAlpha);
      g.fillTriangle(wcX, wcY - 7, wcX - 6, wcY, wcX + 6, wcY);
      g.fillTriangle(wcX, wcY + 7, wcX - 6, wcY, wcX + 6, wcY);
      // Smaller flanking diamonds
      for (const side of [-9, 9]) {
        g.fillStyle(paint, paintAlpha * 0.7);
        g.fillTriangle(wcX + side, wcY - 4, wcX + side - 3, wcY, wcX + side + 3, wcY);
        g.fillTriangle(wcX + side, wcY + 4, wcX + side - 3, wcY, wcX + side + 3, wcY);
      }
      // Floral dot accents — characteristic of wycinanki
      g.fillStyle(paint, paintAlpha);
      g.fillCircle(wcX, wcY, 1.2);
      g.fillCircle(wcX - 9, wcY, 0.9);
      g.fillCircle(wcX + 9, wcY, 0.9);
      g.fillCircle(wcX - 4, wcY - 4, 0.6);
      g.fillCircle(wcX + 4, wcY - 4, 0.6);
      g.fillCircle(wcX - 4, wcY + 4, 0.6);
      g.fillCircle(wcX + 4, wcY + 4, 0.6);
      // Faint outline so the paint reads as worn pigment, not a sticker
      g.lineStyle(1, 0x110008, 0.2);
      g.beginPath();
      g.moveTo(wcX, wcY - 7); g.lineTo(wcX - 6, wcY); g.lineTo(wcX, wcY + 7); g.lineTo(wcX + 6, wcY); g.closePath();
      g.strokePath();
    }

    // ── Baba Elzbieta's house — hanging dried herbs & copper bells ──
    if (h.name === 'Baba Elzbieta') {
      // A wooden lintel beam above the door
      const lintelX = doorX - 2;
      const lintelY = doorY - 3;
      g.fillStyle(PAL.logDark, 1);
      g.fillRect(lintelX, lintelY, doorW + 4, 2);
      g.lineStyle(1, PAL.logLight, 0.4);
      g.beginPath(); g.moveTo(lintelX, lintelY + 0.5); g.lineTo(lintelX + doorW + 4, lintelY + 0.5); g.strokePath();

      // Three bunches of dried herbs hanging upside-down by twine
      const bunchXs = [lintelX + 1.5, lintelX + 5.5, lintelX + 9.5];
      bunchXs.forEach((bx, i) => {
        // Twine
        g.lineStyle(1, 0xa89060, 0.7);
        g.beginPath(); g.moveTo(bx, lintelY + 2); g.lineTo(bx, lintelY + 4); g.strokePath();
        // Herb stems — short ochre/sage lines fanning down
        const stemCol = i === 1 ? 0x5a6a3a : 0x4a5028;
        g.lineStyle(1, stemCol, 0.85);
        for (let j = -2; j <= 2; j++) {
          g.beginPath();
          g.moveTo(bx, lintelY + 4);
          g.lineTo(bx + j * 0.7, lintelY + 4 + 4 + Math.abs(j) * 0.3);
          g.strokePath();
        }
        // Tiny dried leaves/flower heads at the tips
        g.fillStyle(i === 1 ? 0x8a5530 : 0x6a4a22, 0.85);
        g.fillCircle(bx, lintelY + 8.5, 0.9);
        g.fillCircle(bx - 1.4, lintelY + 8.2, 0.7);
        g.fillCircle(bx + 1.4, lintelY + 8.2, 0.7);
      });

      // Two copper bells hanging from the lintel ends
      // Track them for the babaBellSwing animation already in update()
      this._babaBellGfx = g;
      const bellLY = lintelY + 2;
      for (const bxOff of [-1, doorW + 5]) {
        const bbx = lintelX + bxOff;
        // Hanging wire
        g.lineStyle(1, 0x5a4028, 0.7);
        g.beginPath(); g.moveTo(bbx, bellLY); g.lineTo(bbx, bellLY + 3); g.strokePath();
        // Bell body — small copper trapezoid
        g.fillStyle(PAL.copper, 1);
        g.fillTriangle(bbx - 1.6, bellLY + 6, bbx + 1.6, bellLY + 6, bbx, bellLY + 3);
        g.fillRect(bbx - 1.6, bellLY + 5.5, 3.2, 1);
        // Bell highlight
        g.fillStyle(PAL.copperLight, 0.7);
        g.fillRect(bbx - 1.2, bellLY + 4, 0.6, 2);
        // Clapper
        g.fillStyle(0x2a1a10, 0.9);
        g.fillCircle(bbx, bellLY + 6.5, 0.6);
      }
    }

    // ── Blue thread on doorframe (on some houses) ──────────────────
    const houseIdx = houses.indexOf(h);
    if (houseIdx === 0 || houseIdx === 2 || houseIdx === 5) {
      // Blue thread draped around door frame
      const dx = sx - 3 + bw/8;
      const dy = sy - 14;
      g.lineStyle(1, 0x4466aa, 0.45);
      // Left side
      g.beginPath(); g.moveTo(dx - 1, dy); g.lineTo(dx - 1, dy + 13); g.strokePath();
      // Top
      g.beginPath(); g.moveTo(dx - 1, dy); g.lineTo(dx + 8, dy); g.strokePath();
      // Right side
      g.beginPath(); g.moveTo(dx + 8, dy); g.lineTo(dx + 8, dy + 13); g.strokePath();
      // Small knot at top-left corner
      g.fillStyle(0x4466aa, 0.5);
      g.fillCircle(dx - 1, dy, 1.5);
      // Dangling end
      g.lineStyle(1, 0x4466aa, 0.3);
      g.beginPath(); g.moveTo(dx - 1, dy); g.lineTo(dx - 3, dy + 5); g.strokePath();
    }

    g._sortY = sy;
    this.objectLayer.add(g);
  }

  // ── CHIMNEY SMOKE ─────────────────────────────────────────────────
  updateSmoke() {
    this.smokeEmitters.forEach(em => {
      // Spawn new particle
      if (Math.random() < 0.6) {
        em.particles.push({
          x: em.x + (Math.random()-0.5) * 3,
          y: em.y,
          vx: (Math.random()-0.5) * 0.3 + 0.2, // slight rightward drift (wind)
          vy: -0.4 - Math.random() * 0.3,
          life: 1.0,
          size: 2 + Math.random() * 2,
        });
      }
      // Update existing
      em.particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.015;
        p.size += 0.1;
        p.vx += (Math.random()-0.5) * 0.05;
      });
      em.particles = em.particles.filter(p => p.life > 0);
    });

    // Redraw all smoke
    if (!this.smokeGfx) {
      this.smokeGfx = this.add.graphics();
      this.smokeGfx.setDepth(997);
    }
    this.smokeGfx.clear();
    this.smokeEmitters.forEach(em => {
      em.particles.forEach(p => {
        const alpha = p.life * 0.25;
        this.smokeGfx.fillStyle(PAL.smoke, alpha);
        this.smokeGfx.fillCircle(p.x, p.y, p.size);
      });
    });
  }

  // ── STRAW-AND-IRON IDOL ───────────────────────────────────────────
  drawStrawIronIdol() {
    const iso = cartToIso(CENTER - 0.5, CENTER - 0.5);
    const sx = iso.x + this.worldOffset.x;
    const sy = iso.y + this.worldOffset.y;
    const g = this.add.graphics();

    // Stone base
    g.fillStyle(PAL.stoneLight, 1);
    g.fillEllipse(sx, sy + 4, 50, 19);
    g.fillStyle(PAL.stoneDark, 1);
    g.fillEllipse(sx, sy + 4, 40, 15);
    g.lineStyle(1, PAL.copper, 0.4);
    g.strokeEllipse(sx, sy + 4, 46, 17);

    // Iron-banded straw pole
    g.fillStyle(PAL.straw, 1);
    g.fillRect(sx - 3, sy - 58, 6, 60);
    g.fillStyle(PAL.iron, 0.8);
    for (const by of [-53, -38, -23]) {
      g.fillRect(sx - 4, sy + by, 8, 3);
      g.lineStyle(1, PAL.ironLight, 0.3);
      g.beginPath(); g.moveTo(sx - 4, sy + by + 1); g.lineTo(sx + 4, sy + by + 1); g.strokePath();
    }

    // Cross-beam arms with iron caps
    g.fillStyle(PAL.straw, 1);
    g.fillRect(sx - 22, sy - 47, 44, 5);
    g.fillStyle(PAL.iron, 0.9);
    g.fillRect(sx - 24, sy - 48, 4, 7);
    g.fillRect(sx + 20, sy - 48, 4, 7);

    // Head with iron crown
    g.fillStyle(PAL.strawLight, 1);
    g.fillCircle(sx, sy - 64, 10);
    g.fillStyle(PAL.strawDark, 1);
    g.fillCircle(sx, sy - 64, 7);
    g.lineStyle(2, PAL.iron, 0.8);
    g.beginPath(); g.arc(sx, sy - 66, 13, Math.PI * 1.12, Math.PI * 1.88); g.strokePath();
    for (const angle of [-0.3, 0, 0.3]) {
      const px = sx + Math.sin(angle) * 13;
      const py = sy - 66 - Math.cos(angle) * 13;
      g.fillStyle(PAL.iron, 0.8);
      g.fillTriangle(px - 2, py + 2, px + 2, py + 2, px, py - 4);
    }

    // Eyes
    g.fillStyle(0x220011, 1);
    g.fillCircle(sx - 3, sy - 65, 1.5);
    g.fillCircle(sx + 3, sy - 65, 1.5);
    g.fillStyle(PAL.deepRed, 0.3);
    g.fillCircle(sx - 3, sy - 65, 3);
    g.fillCircle(sx + 3, sy - 65, 3);

    // Ribbons
    g.lineStyle(1, PAL.ribbon, 0.7);
    for (const dx of [-20, -13, 13, 20]) {
      g.beginPath(); g.moveTo(sx + dx, sy - 43);
      const sw = Math.sin(dx * 0.5) * 3;
      g.lineTo(sx + dx + sw, sy - 30); g.lineTo(sx + dx + sw * 0.6, sy - 18);
      g.strokePath();
    }
    g.lineStyle(2, PAL.deepRed, 0.8);
    g.beginPath(); g.moveTo(sx, sy - 43); g.lineTo(sx + 2, sy - 28); g.lineTo(sx - 1, sy - 14); g.strokePath();

    // Straw skirt
    g.lineStyle(1, PAL.straw, 0.5);
    for (let i = -10; i <= 10; i += 2) {
      g.beginPath(); g.moveTo(sx + i, sy - 2);
      g.lineTo(sx + i + (Math.random()-0.5)*4, sy + 5); g.strokePath();
    }

    // ── Copper wire details around the stone base ──────────────────
    // Wrapped wire bands
    g.lineStyle(1, PAL.copper, 0.5);
    g.strokeEllipse(sx, sy + 4, 44, 16);
    g.lineStyle(1, PAL.copperLight, 0.3);
    g.strokeEllipse(sx, sy + 2, 38, 14);
    // Twisted wire spirals at base corners
    for (const side of [-18, 18]) {
      g.lineStyle(1, PAL.copper, 0.4);
      g.beginPath();
      g.arc(sx + side, sy + 3, 3, 0, Math.PI * 1.5);
      g.strokePath();
      // Tiny copper knot
      g.fillStyle(PAL.copperLight, 0.5);
      g.fillCircle(sx + side, sy + 3, 1.2);
    }
    // Vertical wire wrapping up the pole at intervals
    g.lineStyle(1, PAL.copper, 0.25);
    for (const wy of [-8, -18, -28]) {
      g.beginPath(); g.moveTo(sx - 4, sy + wy); g.lineTo(sx + 4, sy + wy - 2); g.strokePath();
    }

    g._sortY = sy;
    this.objectLayer.add(g);

    // Braziers with light pools
    this.fireGraphics = [];
    for (const side of [-28, 28]) {
      const fg = this.add.graphics();
      fg.fillStyle(PAL.copperDark, 1);
      fg.fillEllipse(sx + side, sy + 3, 13, 7);
      fg.fillStyle(PAL.copper, 1);
      fg.fillEllipse(sx + side, sy + 2, 11, 5);
      fg.fillStyle(PAL.iron, 0.7);
      fg.fillRect(sx + side - 1, sy + 3, 3, 6);
      fg._fireX = sx + side;
      fg._fireY = sy - 3;
      fg._sortY = sy + 5;
      this.fireGraphics.push(fg);
      this.objectLayer.add(fg);
      // Light pool
      this.lightPools.push({ x: sx + side, y: sy + 6, radius: 35, intensity: 0.10, color: PAL.warmLight });
    }
    // Central idol glow — breathing light pool (pulsed in update loop)
    this.idolLightPool = { x: sx, y: sy + 4, radius: 50, intensity: 0.05, color: PAL.warmLightDim };
    this.lightPools.push(this.idolLightPool);
    this.idolScreenX = sx;
    this.idolScreenY = sy;
  }

  // ── WAYSIDE SHRINES ───────────────────────────────────────────────
  drawWaysideShrines() {
    this.shrineGraphics = [];
    shrines.forEach(s => {
      const iso = cartToIso(s.x, s.y);
      const px = iso.x + this.worldOffset.x;
      const py = iso.y + this.worldOffset.y;
      const g = this.add.graphics();

      // Mossy stone base
      g.fillStyle(PAL.stoneDark, 0.8);
      g.fillEllipse(px, py + 2, 18, 8);
      g.fillStyle(PAL.grassDark, 0.3);
      g.fillEllipse(px + 2, py + 1, 8, 4);

      // Stone pillar with weathered texture
      g.fillStyle(PAL.stone, 0.9);
      g.fillRect(px - 5, py - 26, 10, 28);
      g.fillStyle(PAL.stoneLight, 0.4);
      g.fillRect(px - 4, py - 26, 2, 28);
      // Cracks
      g.lineStyle(1, PAL.stoneDark, 0.3);
      g.beginPath(); g.moveTo(px + 1, py - 20); g.lineTo(px + 3, py - 14); g.lineTo(px + 1, py - 8); g.strokePath();

      // Peaked roof
      g.fillStyle(PAL.stone, 1);
      g.fillTriangle(px - 7, py - 26, px + 7, py - 26, px, py - 34);

      // Carved figure niche — a tiny folk figure
      g.fillStyle(PAL.stoneDark, 0.5);
      g.fillRect(px - 3, py - 20, 6, 8);
      // Tiny carved figure
      g.fillStyle(PAL.stoneLight, 0.6);
      g.fillCircle(px, py - 18, 2); // head
      g.fillRect(px - 1, py - 16, 3, 5); // body

      // Small offering bowl at base
      g.fillStyle(PAL.copperDark, 0.6);
      g.fillEllipse(px, py - 1, 8, 3);
      // Dried flowers in offering
      g.fillStyle(PAL.deepRed, 0.4);
      g.fillCircle(px - 1, py - 2, 1.5);
      g.fillStyle(PAL.straw, 0.4);
      g.fillCircle(px + 2, py - 2, 1);

      // Copper nail at top
      g.fillStyle(PAL.copper, 0.7);
      g.fillCircle(px, py - 30, 1.5);

      g._sortY = py;
      g._glowX = px;
      g._glowY = py - 18;
      this.shrineGraphics.push(g);
      this.objectLayer.add(g);
      // Shrine light pool
      this.lightPools.push({ x: px, y: py, radius: 28, intensity: 0.04, color: PAL.shrineGlow });
    });
  }

  // ── VILLAGE WELL ──────────────────────────────────────────────────
  drawVillageWell() {
    const iso = cartToIso(WELL.x, WELL.y);
    const px = iso.x + this.worldOffset.x;
    const py = iso.y + this.worldOffset.y;
    const g = this.add.graphics();

    // Stone ring base
    g.fillStyle(PAL.stone, 0.9);
    g.fillEllipse(px, py + 2, 24, 12);
    g.fillStyle(PAL.stoneDark, 0.8);
    g.fillEllipse(px, py, 20, 10);
    // Dark water inside
    g.fillStyle(0x111122, 0.8);
    g.fillEllipse(px, py - 1, 14, 6);

    // Stone wall height
    g.fillStyle(PAL.stone, 0.8);
    g.fillRect(px - 12, py - 8, 24, 4);
    g.lineStyle(1, PAL.stoneDark, 0.4);
    g.beginPath(); g.moveTo(px - 12, py - 6); g.lineTo(px + 12, py - 6); g.strokePath();

    // Wooden frame — two posts and crossbar
    g.fillStyle(PAL.wood, 0.9);
    g.fillRect(px - 10, py - 28, 3, 22);
    g.fillRect(px + 7, py - 28, 3, 22);
    // Crossbar
    g.fillRect(px - 11, py - 30, 22, 3);

    // Roof over well
    g.fillStyle(PAL.thatch, 0.8);
    g.fillTriangle(px - 14, py - 30, px + 14, py - 30, px, py - 40);
    g.fillStyle(PAL.thatchDark, 0.7);
    g.fillTriangle(px, py - 40, px + 14, py - 30, px + 2, py - 30);

    // Bucket on rope
    g.lineStyle(1, PAL.woodDark, 0.6);
    g.beginPath(); g.moveTo(px, py - 28); g.lineTo(px, py - 12); g.strokePath();
    // Bucket
    g.fillStyle(PAL.woodDark, 0.8);
    g.fillRect(px - 3, py - 14, 6, 5);
    g.fillStyle(PAL.iron, 0.5);
    g.fillRect(px - 3, py - 14, 6, 1);

    g._sortY = py;
    this.objectLayer.add(g);
  }

  // ── SIGNPOSTS ─────────────────────────────────────────────────────
  drawSignposts() {
    signposts.forEach(sp => {
      const iso = cartToIso(sp.x, sp.y);
      const px = iso.x + this.worldOffset.x;
      const py = iso.y + this.worldOffset.y;
      const g = this.add.graphics();

      // Post
      g.fillStyle(PAL.wood, 0.85);
      g.fillRect(px - 2, py - 24, 4, 26);

      // Sign plank
      g.fillStyle(PAL.woodLight, 0.8);
      g.fillRect(px - 16, py - 22, 32, 10);
      g.fillStyle(PAL.woodDark, 0.3);
      g.fillRect(px - 16, py - 22, 32, 1);
      g.fillRect(px - 16, py - 13, 32, 1);

      g._sortY = py;
      this.objectLayer.add(g);

      // Sign text — folk/runic style
      const txt = this.add.text(px, py - 17, sp.text, {
        fontFamily: 'Georgia, serif',
        fontSize: '8px',
        color: '#3a2a1a',
        stroke: '#6e5540',
        strokeThickness: 0.5,
        align: 'center',
      }).setOrigin(0.5, 0.5);
      txt._sortY = py;
      this.objectLayer.add(txt);
    });
  }

  // ── SCATTER DETAILS ───────────────────────────────────────────────
  drawScatterDetails() {
    // Fences
    const fencePairs = [
      [[4,7],[5,7],[6,7]], [[18,9],[18,10]], [[4,14],[5,14]], [[15,17],[16,17],[17,17]],
    ];
    fencePairs.forEach(posts => {
      posts.forEach(([fx, fy]) => {
        if (map[fy] && map[fy][fx] === 0) {
          const iso = cartToIso(fx, fy);
          const g = this.add.graphics();
          const px = iso.x + this.worldOffset.x;
          const py = iso.y + this.worldOffset.y;
          g.fillStyle(PAL.woodDark, 0.8);
          g.fillRect(px - 1, py - 14, 3, 16);
          g.fillRect(px + 8, py - 12, 3, 14);
          g.lineStyle(1, PAL.wood, 0.5);
          g.beginPath(); g.moveTo(px, py - 10); g.lineTo(px + 9, py - 8); g.strokePath();
          g.beginPath(); g.moveTo(px, py - 5); g.lineTo(px + 9, py - 3); g.strokePath();
          g._sortY = py;
          this.objectLayer.add(g);
        }
      });
    });

    // Rocks
    for (let i = 0; i < 18; i++) {
      const rx = Math.floor(Math.random() * MAP_SIZE);
      const ry = Math.floor(Math.random() * MAP_SIZE);
      if (map[ry][rx] === 0) {
        const iso = cartToIso(rx + Math.random() * 0.6, ry + Math.random() * 0.6);
        const g = this.add.graphics();
        const px = iso.x + this.worldOffset.x;
        const py = iso.y + this.worldOffset.y;
        const size = 2 + Math.random() * 4;
        g.fillStyle(PAL.stoneDark, 0.4 + Math.random() * 0.2);
        g.fillEllipse(px, py, size, size * 0.5);
        // Slight 3D highlight
        g.fillStyle(PAL.stoneLight, 0.15);
        g.fillEllipse(px - 1, py - 1, size * 0.5, size * 0.25);
        this.groundLayer.add(g);
      }
    }

    // Dead trees
    [[1,3],[21,4],[2,20],[22,19],[0,10]].forEach(([tx, ty]) => {
      const iso = cartToIso(tx, ty);
      const g = this.add.graphics();
      const px = iso.x + this.worldOffset.x;
