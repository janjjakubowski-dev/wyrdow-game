  // ── Nocnica peripheral silhouette ─────────────────────────────────
  // A tall, thin shadow that appears anchored to one edge of the
  // screen — never the centre. She's always to the side of vision,
  // implied more than seen, drawn in pure black with a faint silver hem.
  spawnNocnicaPeripheral(zone) {
    if (this._nocnicaPeripheralActive) return;
    this._nocnicaPeripheralActive = true;
    this._nocnicaZoneAnchor = zone;
    const cam = this.cameras.main;
    const g = this.add.graphics();
    g.setScrollFactor(0).setDepth(945);
    // She's drawn at the world origin of the graphics object — we
    // reposition the whole graphics each frame in updateNocnicaPeripheral.
    // Body — tall narrow shadow, ~14px wide × 80px tall
    g.fillStyle(0x05060a, 1);
    g.fillRect(-7, -80, 14, 80);
    // Head — slightly bulbous, no features
    g.fillStyle(0x05060a, 1);
    g.fillCircle(0, -84, 8);
    // Faint silver-grey hem along one edge — moonlight catching cloth
    g.fillStyle(0x8a92a8, 0.35);
    g.fillRect(-7, -80, 1, 80);
    g.fillRect(-7, -2, 14, 1);
    // Hint of trailing hair
    g.fillStyle(0x05060a, 0.7);
    g.fillRect(-9, -80, 1, 22);
    g.fillRect(8, -82, 1, 18);
    g.setAlpha(0);
    this._nocnicaGfx = g;
    // Fade in over 4s — slow enough that you doubt she's there
    this.tweens.add({ targets: g, alpha: 0.85, duration: 4000 });

    // Whispered noise SFX, very quiet
    if (ambientAudio.ctx) {
      const ctx = ambientAudio.ctx;
      const buf = ctx.createBuffer(1, ctx.sampleRate * 6, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        d[i] = (Math.random() * 2 - 1) * 0.6;
      }
      const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 180; f.Q.value = 8;
      const gn = ctx.createGain(); gn.gain.value = 0;
      src.connect(f); f.connect(gn); gn.connect(ctx.destination);
      gn.gain.linearRampToValueAtTime(0.025, ctx.currentTime + 4);
      src.start();
      this._nocnicaAudio = { src, gn };
    }
  }

  updateNocnicaPeripheral(delta) {
    if (!this._nocnicaGfx || !this._nocnicaZoneAnchor) return;
    const cam = this.cameras.main;
    const z = this._nocnicaZoneAnchor;
    // Determine which screen edge she should haunt — based on the
    // direction from the player to the zone, but pushed all the way
    // to the screen border so she's always peripheral.
    const dx = z.x - this.playerCartX;
    const dy = z.y - this.playerCartY;
    // Convert to screen-space angle via the iso projection
    const sx = (dx - dy) * (TILE_W / 2);
    const sy = (dx + dy) * (TILE_H / 2);
    const ang = Math.atan2(sy, sx);
    const margin = 60;
    // Place along an ellipse that hugs the screen border
    const rx = cam.width / 2 - margin;
    const ry = cam.height / 2 - margin;
    let tx = cam.width / 2 + Math.cos(ang) * rx;
    let ty = cam.height / 2 + Math.sin(ang) * ry;
    // Lerp toward target so motion is faint, drifting
    this._nocnicaGfx.x += ((tx - this._nocnicaGfx.x) * 0.04);
    this._nocnicaGfx.y += ((ty - this._nocnicaGfx.y) * 0.04);
    // Subtle vertical sway
    this._nocnicaGfx.y += Math.sin((this.animTime || 0) * 0.0009) * 0.15;
  }

  hideNocnicaPeripheral() {
    if (!this._nocnicaPeripheralActive) return;
    this._nocnicaPeripheralActive = false;
    if (this._nocnicaGfx) {
      const g = this._nocnicaGfx;
      this._nocnicaGfx = null;
      this.tweens.add({
        targets: g, alpha: 0, duration: 600,
        onComplete: () => g.destroy(),
      });
    }
    if (this._nocnicaAudio) {
      const a = this._nocnicaAudio;
      this._nocnicaAudio = null;
      try {
        a.gn.gain.linearRampToValueAtTime(0, ambientAudio.ctx.currentTime + 0.6);
        setTimeout(() => { try { a.src.stop(); } catch (e) {} }, 700);
      } catch (e) {}
    }
  }

  // ── Wisps near the marsh road ────────────────────────────────────
  spawnWisps() {
    if (!this._wispGfx) {
      this._wispGfx = this.add.graphics();
      this._wispGfx.setDepth(700);
    }
    const center = { x: CENTER - 0.5, y: MAP_SIZE - 4 };
    this._wisps = [
      { x: center.x - 0.4, y: center.y, vx: 0, vy: 0, branch: null },
      { x: center.x,       y: center.y, vx: 0, vy: 0, branch: null },
      { x: center.x + 0.4, y: center.y, vx: 0, vy: 0, branch: null },
    ];
    if (!this._wispUpdater) {
      this._wispUpdater = setInterval(() => this.drawWisps(), 60);
    }
  }
  splitWisps() {
    // Two paths form: left toward dead tree, right toward hidden grove
    this._wisps[0].branch = 'left';
    this._wisps[1].branch = 'left';
    this._wisps[2].branch = 'right';
    // After 8s of split, lock the player's choice based on which side
    // they were nearest to.
    setTimeout(() => {
      if (gameState.ritualState.wisp_choice != null) return;
      const px = this.playerCartX, py = this.playerCartY;
      const leftAnchor  = { x: MAP_SIZE - 5, y: 4 };
      const rightAnchor = { x: 18, y: 18 };
      const dl = Math.hypot(px - leftAnchor.x,  py - leftAnchor.y);
      const dr = Math.hypot(px - rightAnchor.x, py - rightAnchor.y);
      if (Math.min(dl, dr) > 8) gameState.ritualState.wisp_choice = 'ignored';
      else gameState.ritualState.wisp_choice = (dl < dr) ? 'truth' : 'comfort';
      // Awakening theme — Play 4: after the comfort vision concludes
      if (gameState.ritualState.wisp_choice === 'comfort'
          && typeof music !== 'undefined') {
        setTimeout(() => music.playComfortAwakening(), 4000);
      }
      if (!gameState.regencyFired.wisp_choice) {
        gameState.regencyFired.wisp_choice = true;
        if (gameState.ritualState.wisp_choice === 'truth')   adjustAttention(+2, 'wisp_truth');
        else if (gameState.ritualState.wisp_choice === 'ignored') adjustAttention(-1, 'wisp_ignored');
        // 'comfort' is 0
      }
    }, 8000);
  }
  drawWisps() {
    if (!this._wisps || !this._wispGfx) return;
    const g = this._wispGfx;
    g.clear();
    const t = this.animTime || 0;
    for (let i = 0; i < this._wisps.length; i++) {
      const w = this._wisps[i];
      // Drift slowly along their branch
      if (w.branch === 'left')  { w.x -= 0.005; w.y -= 0.003; }
      if (w.branch === 'right') { w.x += 0.005; w.y += 0.004; }
      const iso = cartToIso(w.x, w.y);
      const sx = iso.x + this.worldOffset.x;
      const sy = iso.y + this.worldOffset.y - 14 + Math.sin(t * 0.003 + i) * 2;
      // Soft pale-blue glow
      for (let r = 14; r > 0; r -= 3) {
        const a = (1 - r / 14) * 0.18;
        g.fillStyle(0xa8d4ff, a);
        g.fillCircle(sx, sy, r);
      }
      g.fillStyle(0xe8f4ff, 0.95);
      g.fillCircle(sx, sy, 2);
    }
  }

  startObservation() {
    if (this._obsActive) return;
    this._obsActive = true;
    // Subtle zoom in (20%) over 0.5s
    this.tweens.add({
      targets: this.cameras.main,
      zoom: 1.2,
      duration: 500,
      ease: 'Sine.easeOut',
    });
    // Vignette fade in
    this.tweens.add({ targets: this._obsVignette, alpha: 1, duration: 500 });
    // Faint held-breath ambience
    this.startObservationBreath();
    try { sfx.loop('observation_breath', 1, 500); } catch (e) {}
    // Trigger any zone the player is currently inside (one-shot per session)
    const px = this.playerCartX, py = this.playerCartY;
    let matched = null;
    for (const z of this.observationZones) {
      if (gameState.observedZones.includes(z.id)) continue;
      if (z.requires && !z.requires()) continue;
      const d = Math.hypot(px - z.x, py - z.y);
      if (d <= z.r) { matched = z; break; }
    }
    if (matched) {
      gameState.observedZones.push(matched.id);
      this._obsText.setText(matched.text);
      this._obsText.setAlpha(0);
      this.tweens.add({ targets: this._obsText, alpha: 1, duration: 800 });
      this._obsTextHoldTimer = 6000;
    }
  }

  endObservation() {
    if (!this._obsActive) return;
    this._obsActive = false;
    this.tweens.add({
      targets: this.cameras.main, zoom: 1,
      duration: 300, ease: 'Sine.easeIn',
    });
    this.tweens.add({ targets: this._obsVignette, alpha: 0, duration: 400 });
    // Stop held-breath audio
    this.stopObservationBreath();
    try { sfx.stopLoop('observation_breath', 500); } catch (e) {}
  }

  startObservationBreath() {
    if (!ambientAudio.ctx) {
      try { ambientAudio.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return; }
    }
    if (this._obsBreath) return;
    const ctx = ambientAudio.ctx;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 280;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.018, ctx.currentTime + 0.6);
    src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    src.start();
    this._obsBreath = { src, gain };
  }

  stopObservationBreath() {
    if (!this._obsBreath || !ambientAudio.ctx) return;
    const ctx = ambientAudio.ctx;
    try {
      this._obsBreath.gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
      const src = this._obsBreath.src;
      setTimeout(() => { try { src.stop(); } catch (e) {} }, 400);
    } catch (e) {}
    this._obsBreath = null;
  }

  updateObservation(delta) {
    if (!this.observeKey) return;
    const moving = this.cursors && (this.cursors.up.isDown || this.cursors.down.isDown
      || this.cursors.left.isDown || this.cursors.right.isDown);

    if (this._obsActive && (moving || !this.observeKey.isDown)) {
      this.endObservation();
      // Fade text out if visible
      if (this._obsText.alpha > 0) {
        this.tweens.add({ targets: this._obsText, alpha: 0, duration: 400 });
        this._obsTextHoldTimer = 0;
      }
      this._obsHoldTime = 0;
      return;
    }

    if (this.observeKey.isDown && !moving && !this.dialogueActive && !this.visionActive) {
      this._obsHoldTime += delta;
      if (this._obsHoldTime >= 1500 && !this._obsActive) {
        this.startObservation();
      }
    } else {
      this._obsHoldTime = 0;
    }

    // Hold the detail text for 6s, then fade out
    if (this._obsTextHoldTimer > 0) {
      this._obsTextHoldTimer -= delta;
      if (this._obsTextHoldTimer <= 0 && this._obsText.alpha > 0) {
        this.tweens.add({ targets: this._obsText, alpha: 0, duration: 800 });
      }
    }
  }

  // ── MARKER GLOW UPDATE ────────────────────────────────────────────
  // Once the quest is active, draw a slow pulsing blue halo around each
  // unplaced marker. Completed markers fade their halo to warm amber.
  updateMarkerGlows(time) {
    if (!gameState.questActive) return;
    if (!this._markerGlowGfx) {
      this._markerGlowGfx = this.add.graphics();
      this._markerGlowGfx.setDepth(450);
    }
    const g = this._markerGlowGfx;
    g.clear();
    MARKERS.forEach((m, idx) => {
      const iso = cartToIso(m.x, m.y);
      const px = iso.x + this.worldOffset.x;
      const py = iso.y + this.worldOffset.y;
      const mg = this.markerGraphics[idx];
      const completed = m.placed;
      if (!completed) {
        // Slow pulsing blue (0.5–1.0 alpha)
        const pulse = 0.55 + 0.35 * (Math.sin(time * 0.0022 + idx * 0.7) * 0.5 + 0.5);
        for (let r = 22; r > 4; r -= 4) {
          const a = (1 - r / 22) * 0.18 * pulse;
          g.fillStyle(0x4466cc, a);
          g.fillCircle(px, py - 1, r);
        }
        g.fillStyle(0x88aaff, 0.35 * pulse);
        g.fillCircle(px, py - 2, 4);
      } else {
        // Warm amber halo (with brief blue→amber tween via _glowProgress)
        const t = mg && mg._glowProgress != null ? mg._glowProgress : 1;
        const r1 = Math.round(0x44 + (0xff - 0x44) * t);
        const g1 = Math.round(0x66 + (0xb0 - 0x66) * t);
        const b1 = Math.round(0xcc + (0x40 - 0xcc) * t);
        const col = (r1 << 16) | (g1 << 8) | b1;
        const pulse = 0.7 + 0.2 * Math.sin(time * 0.0015 + idx);
        for (let r = 18; r > 4; r -= 3) {
          const a = (1 - r / 18) * 0.16 * pulse;
          g.fillStyle(col, a);
          g.fillCircle(px, py - 1, r);
        }
      }
    });
  }

  updateAwakeningHooks(delta) {
    if (!this.firstVisit) return;
    const moving = (this.cursors && (this.cursors.up.isDown || this.cursors.down.isDown ||
                                     this.cursors.left.isDown || this.cursors.right.isDown));
    if (moving && !this._awakMoved) {
      this._awakMoved = true;
      if (this._awakPrompt) {
        this.tweens.add({
          targets: this._awakPrompt, alpha: 0, duration: 800,
          onComplete: () => { this._awakPrompt && this._awakPrompt.destroy(); this._awakPrompt = null; },
        });
      }
      if (!this._awakMeloStarted) {
        this._awakMeloStarted = true;
        ambientAudio.playFolkMelody(false);
      }
    }
    if (!moving) {
      this._awakIdleTimer += delta;
      if (this._awakIdleTimer > 30000 && !this._awakVoiceShown) {
        this._awakVoiceShown = true;
        this.showAwakeningVoice("The road brought you here.\nIt doesn't do that for everyone.");
      }
    } else {
      this._awakIdleTimer = 0;
    }
  }

  updateCamera() {
    const iso = cartToIso(this.playerCartX, this.playerCartY);
    const targetX = iso.x + this.worldOffset.x - this.cameras.main.width / 2;
    const targetY = iso.y + this.worldOffset.y - this.cameras.main.height / 2;
    this.cameras.main.scrollX += (targetX - this.cameras.main.scrollX) * 0.08;
    this.cameras.main.scrollY += (targetY - this.cameras.main.scrollY) * 0.08;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// OPENING AWAKENING SCENE
// ═══════════════════════════════════════════════════════════════════════
class OpeningScene extends Phaser.Scene {
  constructor() { super('OpeningScene'); }

  preload() {
    music.preload(this);
    sfx.preload(this);
  }

  create() {
    music.bind(this);
    sfx.bind(this);
    this.input.keyboard.on('keydown', () => { music.unlock(); sfx.unlock(); }, { once: false });
    // M — global music + sfx mute toggle (does not affect procedural ambience)
    this.input.keyboard.on('keydown-M', () => { music.toggleMute(); sfx.toggleMute(); });
    const cam = this.cameras.main;
    const W = cam.width, H = cam.height;
    cam.setBackgroundColor(0x000000);

    // Stage 1 — black hold + audio
    ambientAudio.startAwakeningAmbience();

    // ── Rich close-up ground scene ────────────────────────────────
    // Ground occupies bottom ~35% of the screen.
    const groundTop = H * 0.65;
    const groundH = H - groundTop;
    const ground = this.add.graphics().setAlpha(0);

    // Tiny seeded RNG so the ground is the same every play
    let _seed = 9173;
    const rnd = () => { _seed = (_seed * 9301 + 49297) % 233280; return _seed / 233280; };

    // ── SKY: faint vertical gradient + stars + horizon mist ────────
    // The sky sits behind everything else so it's drawn first.
    const sky = this.add.graphics().setDepth(-12);
    // Gradient — pure black at the top, extremely dark blue-black at horizon.
    // We bake it as a series of 1px-tall horizontal slabs.
    const skyTopY = 0;
    const skyBotY = Math.floor(H * 0.65);
    const skySteps = 64;
    for (let i = 0; i < skySteps; i++) {
      const t = i / (skySteps - 1);
      // Lerp from #000000 to #050810
      const r = Math.round(0 + t * 5);
      const gC = Math.round(0 + t * 8);
      const b = Math.round(0 + t * 16);
      const col = (r << 16) | (gC << 8) | b;
      const y0 = Math.floor(skyTopY + t * (skyBotY - skyTopY));
      const y1 = Math.floor(skyTopY + ((i + 1) / (skySteps - 1)) * (skyBotY - skyTopY));
      sky.fillStyle(col, 1);
      sky.fillRect(0, y0, W, Math.max(1, y1 - y0));
    }
    // Stars — 25–35, weighted toward upper portion of sky.
    const starCount = 25 + Math.floor(rnd() * 11);
    for (let i = 0; i < starCount; i++) {
      // Bias upward — square the random value
      const ty = rnd() * rnd();
      const sy = Math.floor(ty * (skyBotY * 0.78));
      const sx = Math.floor(rnd() * W);
      const r = rnd();
      if (r < 0.12) {
        // 2x2 slightly blue-tinted brighter star
        sky.fillStyle(0xc8d8ff, 0.5);
        sky.fillRect(sx, sy, 2, 2);
      } else if (r < 0.30) {
        // brighter single pixel
        sky.fillStyle(0xffffff, 0.7);
        sky.fillRect(sx, sy, 1, 1);
      } else {
        // faint single pixel
        sky.fillStyle(0xffffff, 0.4);
        sky.fillRect(sx, sy, 1, 1);
      }
    }
    // Horizon haze — 3-4 px band of dark green-grey just above the grass line
    sky.fillStyle(0x0a1208, 0.30);
    sky.fillRect(0, skyBotY - 4, W, 4);
    sky.fillStyle(0x0a1208, 0.18);
    sky.fillRect(0, skyBotY - 6, W, 2);
    this._awakeningSky = sky;

    // ── Base earth: 6 brown tones in COMPLETELY irregular organic patches.
    // The base wash is the second-darkest tone so individual patches read
    // either as shadow or highlight against it.
    ground.fillStyle(0x2a1a0e, 1);
    ground.fillRect(0, groundTop, W, groundH);
    // 6 distinct earth tones — near-black soil → pale sandy ochre
    const earthTones = [0x1a1008, 0x2a1a0e, 0x3d2410, 0x4a2e18, 0x6b4020, 0x8b6040];
    // Track the dominant tone of each cell so adjacent patches don't repeat.
    const cellSize = 18;
    const cellsX = Math.ceil(W / cellSize) + 2;
    const cellsY = Math.ceil(groundH / cellSize) + 2;
    const cellTone = new Array(cellsX * cellsY).fill(-1);
    const idx = (cx, cy) => cy * cellsX + cx;
    // ~340 patches — denser, varied size, irregular shapes
    for (let i = 0; i < 340; i++) {
      const px2 = Math.floor(rnd() * W);
      const py2 = Math.floor(groundTop + 4 + rnd() * (groundH - 8));
      // Pick a tone that isn't the same as the cell's previous tone
      const cx = Math.floor(px2 / cellSize);
      const cy = Math.floor((py2 - groundTop) / cellSize);
      let toneIdx;
      let attempts = 0;
      do {
        toneIdx = Math.floor(rnd() * 6);
        attempts++;
      } while (attempts < 4 && cellTone[idx(cx, cy)] === toneIdx);
      cellTone[idx(cx, cy)] = toneIdx;
      const tone = earthTones[toneIdx];
      // Irregular shape: blob with per-row varying widths and random insets
      const pw = 4 + Math.floor(rnd() * 28);   // wider range — some narrow some wide
      const ph = 2 + Math.floor(rnd() * 12);
      const alpha = 0.45 + rnd() * 0.45;
      ground.fillStyle(tone, alpha);
      let curW = pw;
      for (let yy = 0; yy < ph; yy++) {
        // Per-row organic wobble — width drifts up and down each row
        curW += Math.round((rnd() - 0.5) * 3);
        if (curW < 2) curW = 2;
        if (curW > pw + 5) curW = pw + 5;
        const insetL = Math.floor(rnd() * 3);
        const insetR = Math.floor(rnd() * 3);
        ground.fillRect(px2 + insetL, py2 + yy, curW - insetL - insetR, 1);
      }
    }
    // A second sparse pass of the lightest sandy ochre — barely-visible warm flecks
    for (let i = 0; i < 90; i++) {
      const x = Math.floor(rnd() * W);
      const y = Math.floor(groundTop + 6 + rnd() * (groundH - 12));
      ground.fillStyle(0x8b6040, 0.35 + rnd() * 0.25);
      ground.fillRect(x, y, 2 + Math.floor(rnd() * 4), 1);
    }
    // Fine soil speckle
    for (let i = 0; i < 520; i++) {
      const x = rnd() * W;
      const y = groundTop + 6 + rnd() * (groundH - 6);
      const t = rnd();
      if (t < 0.5)      ground.fillStyle(0x140c04, 0.85);
      else if (t < 0.8) ground.fillStyle(0x4a3620, 0.7);
      else              ground.fillStyle(0x5a4022, 0.6);
      ground.fillRect(x, y, 1, 1);
    }

    // ── Blurred dirt road edge at the very top of the ground ──────
    // Slightly lighter ochre strip ~18px tall with soft irregular bottom edge.
    const roadBaseY = groundTop;
    const roadH = 18;
    // Per-column height noise for the bottom edge
    const roadEdge = [];
    for (let x = 0; x < W; x++) {
      roadEdge[x] = Math.floor(
        Math.sin(x * 0.035) * 2 + Math.sin(x * 0.11) * 1.4 + rnd() * 2
      );
    }
    for (let x = 0; x < W; x++) {
      const h = roadH + roadEdge[x];
      // road body — slightly lighter ochre
      for (let yy = 0; yy < h; yy++) {
        // gradient: lighter at top, blending into earth at bottom
        const t = yy / h;
        const a = 0.55 - t * 0.4;
        ground.fillStyle(0x7a5a2c, a);
        ground.fillRect(x, roadBaseY - h + yy, 1, 1);
      }
      // soft bleed line just below the bottom edge
      ground.fillStyle(0x5a4220, 0.35);
      ground.fillRect(x, roadBaseY + (roadEdge[x] > 0 ? 0 : 1), 1, 1);
    }
    // Road dust highlight
    for (let i = 0; i < 30; i++) {
      const x = rnd() * W;
      const y = roadBaseY - roadH + 2 + rnd() * (roadH - 6);
      ground.fillStyle(0x9a7a40, 0.5);
      ground.fillRect(x, y, 1 + Math.floor(rnd() * 2), 1);
    }

    // ── Small stones (3x2 grey-brown irregular shapes) ────────────
    for (let i = 0; i < 8; i++) {
      const x = 20 + rnd() * (W - 40);
      const y = groundTop + 10 + rnd() * (groundH - 16);
      ground.fillStyle(0x6a5a44, 0.95);
      ground.fillRect(x, y, 3, 2);
      ground.fillStyle(0x4a3a26, 0.95);
      ground.fillRect(x + 2, y + 1, 1, 1);
      ground.fillStyle(0x8a7a5a, 0.9);
      ground.fillRect(x, y, 1, 1);
    }

    // ── Small lighter pebbles (2x2 grey dots) ─────────────────────
    for (let i = 0; i < 10; i++) {
      const x = rnd() * W;
      const y = groundTop + 8 + rnd() * (groundH - 12);
      ground.fillStyle(0x7a6a50, 0.9);
      ground.fillRect(x, y, 2, 2);
      ground.fillStyle(0x9a8a6c, 0.9);
      ground.fillRect(x, y, 1, 1);
    }

    // ── Soil cracks: thin 1px dark lines, irregular short segments
    for (let i = 0; i < 5; i++) {
      const x0 = rnd() * W;
      const y0 = groundTop + 12 + rnd() * (groundH - 20);
      const len = 6 + Math.floor(rnd() * 14);
      const angle = (rnd() - 0.5) * 1.6;
      ground.fillStyle(0x0a0604, 0.9);
      let cx2 = x0, cy2 = y0;
      for (let s = 0; s < len; s++) {
        ground.fillRect(Math.floor(cx2), Math.floor(cy2), 1, 1);
        cx2 += Math.cos(angle) + (rnd() - 0.5) * 0.4;
        cy2 += Math.sin(angle) + (rnd() - 0.5) * 0.4;
      }
    }

    // ── Bare root fragments: thin dark curved lines ───────────────
    for (let i = 0; i < 3; i++) {
      const x0 = rnd() * W;
      const y0 = groundTop + 4 + rnd() * 8; // near surface
      const len = 14 + Math.floor(rnd() * 10);
      ground.fillStyle(0x1c1208, 1);
      let cx2 = x0, cy2 = y0;
      let dir = (rnd() - 0.5) * 0.8;
      for (let s = 0; s < len; s++) {
        ground.fillRect(Math.floor(cx2), Math.floor(cy2), 1, 1);
        // slight thickness on alternating pixels
        if (s % 3 === 0) ground.fillRect(Math.floor(cx2), Math.floor(cy2) + 1, 1, 1);
        cx2 += 1 + (rnd() - 0.5) * 0.3;
        cy2 += dir;
        dir += (rnd() - 0.5) * 0.25;
        dir = Math.max(-1, Math.min(1, dir));
      }
    }

    // ── Three-layer grass silhouette ───────────────────────────────
    // Layer order: background (dense, short, very dark) → middle (medium,
    // dark, some gaps) → foreground (sparse, taller, lighter, individual).
    // The combined silhouette rises and falls irregularly with grouped
    // clumps and clear gaps between groups.
    const grassBaseY = groundTop;

    // Background — very dark, dense, short blades
    for (let x = 0; x < W; x += 1) {
      if (rnd() > 0.65) continue; // very dense
      const bh = 6 + Math.floor(rnd() * 5); // 6..10
      const lean = (rnd() - 0.5) * 1.5;
      ground.fillStyle(0x1a3010, 1);
      for (let yy = 0; yy < bh; yy++) {
        const t = yy / bh;
        const ox = t * lean;
        ground.fillRect(Math.floor(x + ox), grassBaseY - yy, 1, 1);
      }
    }

    // Middle — medium dark, 10-18 px, slightly less dense, some gaps
    let gap = 0;
    for (let x = 0; x < W; x += 1) {
      if (gap > 0) { gap--; continue; }
      // Occasionally open a clear gap (1-4 px) to expose the background
      if (rnd() < 0.04) { gap = 1 + Math.floor(rnd() * 4); continue; }
      if (rnd() > 0.42) continue;
      const bh = 10 + Math.floor(rnd() * 9); // 10..18
      const lean = (rnd() - 0.5) * 2.4;
      ground.fillStyle(0x2a4a18, 1);
      for (let yy = 0; yy < bh; yy++) {
        const t = yy / bh;
        const ox = t * lean;
        ground.fillRect(Math.floor(x + ox), grassBaseY - yy, 1, 1);
      }
      // Occasional brighter tip
      if (rnd() < 0.25) {
        ground.fillStyle(0x4a7028, 0.75);
        ground.fillRect(Math.floor(x + lean), grassBaseY - bh, 1, 1);
      }
    }

    // Foreground — taller, lighter, sparse, individual blades clearly distinguishable
    for (let x = 0; x < W; x += 1) {
      if (rnd() > 0.18) continue; // sparse
      const bh = 18 + Math.floor(rnd() * 13); // 18..30
      const lean = (rnd() - 0.5) * 4;
      ground.fillStyle(0x3a5a20, 1);
      for (let yy = 0; yy < bh; yy++) {
        const t = yy / bh;
        const ox = t * lean;
        ground.fillRect(Math.floor(x + ox), grassBaseY - yy, 1, 1);
      }
      // Lighter tip on most foreground blades
      ground.fillStyle(0x4a7028, 1);
      ground.fillRect(Math.floor(x + lean), grassBaseY - bh, 1, 1);
      ground.fillStyle(0x4a7028, 0.6);
      ground.fillRect(Math.floor(x + lean), grassBaseY - bh + 1, 1, 1);
    }

    // Grouped foreground clumps — 3-4 blades close together with varied heights
    for (let c = 0; c < 14; c++) {
      const cxg = rnd() * W;
      const blades = 3 + Math.floor(rnd() * 2);
      for (let b = 0; b < blades; b++) {
        const bh = 18 + Math.floor(rnd() * 14);
        const ox0 = b - blades / 2;
        const lean = (rnd() - 0.5) * 2.5;
        ground.fillStyle(0x2a4a18, 1);
        for (let yy = 0; yy < bh; yy++) {
          const t = yy / bh;
          ground.fillRect(Math.floor(cxg + ox0 + t * lean), grassBaseY - yy, 1, 1);
        }
        ground.fillStyle(0x4a7028, 1);
        ground.fillRect(Math.floor(cxg + ox0 + lean), grassBaseY - bh, 1, 1);
      }
    }

    // ── Foreground grass blades (close to camera, larger, soft edges)
    const fgBlades = [
      { x: W * 0.07, h: 22, lean:  3, col: 0x1a2610 },
      { x: W * 0.16, h: 18, lean: -2, col: 0x223018 },
      { x: W * 0.27, h: 25, lean:  4, col: 0x1c2812 },
      { x: W * 0.74, h: 20, lean: -3, col: 0x223018 },
      { x: W * 0.86, h: 24, lean:  2, col: 0x1a2610 },
      { x: W * 0.95, h: 17, lean: -4, col: 0x243218 },
    ];
    fgBlades.forEach(b => {
      const baseY = H - 4;
      for (let yy = 0; yy < b.h; yy++) {
        const t = yy / b.h;
        const ox = t * b.lean;
        // 2px wide at base tapering to 1 at tip
        const w = t < 0.7 ? 2 : 1;
        ground.fillStyle(b.col, 1);
        ground.fillRect(b.x + ox, baseY - yy, w, 1);
        // soft blur edge — faint pixel left/right
        ground.fillStyle(b.col, 0.35);
        ground.fillRect(b.x + ox - 1, baseY - yy, 1, 1);
        ground.fillRect(b.x + ox + w, baseY - yy, 1, 1);
      }
      // tip highlight
      ground.fillStyle(0x3e5a22, 0.85);
      ground.fillRect(b.x + b.lean, baseY - b.h, 1, 1);
    });

    // ── Beetle: 8x5, blue-black sheen, visible legs ───────────────
    this.beetle = this.add.graphics().setAlpha(0);
    this.beetleX = W * 0.30;
    this.beetleY = groundTop + groundH * 0.55;
    this.beetleDir = 1;
    this.beetleLegPhase = 0;
    const drawBeetle = () => {
      const b = this.beetle;
      const bx = this.beetleX, by = this.beetleY, f = this.beetleDir;
      b.clear();
      // Soft shadow
      b.fillStyle(0x000000, 0.6);
      b.fillEllipse(bx, by + 4, 12, 3);
      // Body — 10x6
      b.fillStyle(0x080a14, 1);
      b.fillRect(bx - 5, by - 3, 10, 6);
      // Carapace iridescent sheen — 2-3 lighter blue pixels on wing cases
      b.fillStyle(0x1c2848, 1);
      b.fillRect(bx - 4, by - 3, 8, 1);
      b.fillStyle(0x2c3e6a, 1);
      b.fillRect(bx - 3, by - 2, 2, 1);
      b.fillRect(bx + 1, by - 2, 2, 1);
      b.fillStyle(0x4a5e8a, 1);
      b.fillRect(bx - 2, by - 2, 1, 1);
      b.fillRect(bx + 2, by - 2, 1, 1);
      // Wing seam down the middle
      b.fillStyle(0x000000, 1);
      b.fillRect(bx, by - 3, 1, 6);
      // Head
      b.fillStyle(0x000000, 1);
      b.fillRect(bx + f * 5, by - 2, 2, 4);
      // Tiny antennae
      b.fillStyle(0x1a1a22, 1);
      b.fillRect(bx + f * 6, by - 3, 1, 1);
      b.fillRect(bx + f * 7, by - 4, 1, 1);
      // Legs — 3 pairs, single-pixel lines, alternating step
      const step = Math.sin(this.beetleLegPhase) > 0 ? 1 : 0;
      b.fillStyle(0x000000, 1);
      // top side legs
      b.fillRect(bx - 4, by - 4 - step, 1, 1);
      b.fillRect(bx - 1, by - 4 - (1 - step), 1, 1);
      b.fillRect(bx + 3, by - 4 - step, 1, 1);
      // bottom side legs
      b.fillRect(bx - 4, by + 3 + step, 1, 1);
      b.fillRect(bx - 1, by + 3 + (1 - step), 1, 1);
      b.fillRect(bx + 3, by + 3 + step, 1, 1);
    };
    drawBeetle();
    this._beetleDraw = drawBeetle;

    // ── Subtle ambient dust motes / pollen ────────────────────────
    this.motes = [];
    for (let i = 0; i < 16; i++) {
      this.motes.push({
        x: Math.random() * W,
        y: groundTop + Math.random() * (H - groundTop),
        v: 0.05 + Math.random() * 0.12,
        sway: Math.random() * Math.PI * 2,
        col: Math.random() < 0.5 ? 0xc8b890 : 0xb0a070,
      });
    }
    this.moteGfx = this.add.graphics().setAlpha(0);
    this.moteGfx.setDepth(8);

    // Vignette overlay
    const vign = this.add.graphics();
    vign.fillStyle(0x000000, 0.55);
    vign.fillRect(0, 0, W, H * 0.32);
    vign.fillStyle(0x000000, 0.35);
    vign.fillRect(0, H * 0.32, W, H * 0.08);

    // Distant village silhouette (revealed during rise)
    this.village = this.add.graphics().setAlpha(0);
    this.village.fillStyle(0x1a1422, 1);
    // rolling horizon
    for (let x = 0; x < W; x += 2) {
      const h = 8 + Math.sin(x * 0.012) * 4 + Math.sin(x * 0.04) * 2;
      this.village.fillRect(x, H * 0.42 - h, 2, h + 4);
    }
    // crooked house silhouettes
    const houseSpec = [
      { x: W * 0.30, w: 26, h: 30 }, { x: W * 0.42, w: 22, h: 26 },
      { x: W * 0.52, w: 30, h: 34 }, { x: W * 0.63, w: 24, h: 28 },
      { x: W * 0.74, w: 20, h: 24 },
    ];
    houseSpec.forEach(hs => {
      this.village.fillStyle(0x0e0a14, 1);
      this.village.fillRect(hs.x - hs.w / 2, H * 0.42 - hs.h, hs.w, hs.h);
      // roof
      this.village.fillTriangle(
        hs.x - hs.w / 2 - 2, H * 0.42 - hs.h,
        hs.x + hs.w / 2 + 2, H * 0.42 - hs.h,
        hs.x, H * 0.42 - hs.h - hs.h * 0.45
      );
      // window glow
      this.village.fillStyle(0xd9a14a, 0.7);
      this.village.fillRect(hs.x - 1, H * 0.42 - hs.h * 0.55, 2, 2);
    });
    // central idol speck
    this.village.fillStyle(0xe8b060, 0.9);
    this.village.fillRect(W * 0.5 - 1, H * 0.42 - 16, 2, 4);

    // Hand reveal (built later)
    this.handGfx = this.add.graphics().setAlpha(0).setDepth(10);

    // Press-any-key prompt — sits centred in the upper portion of the
    // ground area (between the grass line and the bottom of the screen)
    // with a soft dark backdrop so it has a place to rest.
    const promptY = H * 0.79;
    this.pressPromptBg = this.add.graphics().setDepth(19).setAlpha(0);
    // Rounded rectangle backdrop ~ text width + padding
    const promptW = 280, promptH = 42;
    this.pressPromptBg.fillStyle(0x000000, 0.40);
    this.pressPromptBg.fillRoundedRect(W / 2 - promptW / 2, promptY - promptH / 2,
                                       promptW, promptH, 10);
    this.pressPrompt = this.add.text(W / 2, promptY,
      '[ Press any key ]', {
        fontFamily: 'Georgia, serif', fontSize: '25px', // 40% larger than 18
        color: '#c8b078', fontStyle: 'italic',
        stroke: '#0a0808', strokeThickness: 3,
      }).setOrigin(0.5).setAlpha(0).setDepth(20);

    // Sequence
    // Stage 1: 3s black
    this.time.delayedCall(3000, () => {
      // Stage 2: 4s ground rise (light up)
      this.tweens.add({ targets: ground, alpha: 1, duration: 4000 });
      this.tweens.add({ targets: this.beetle, alpha: 1, duration: 4000 });
      this.tweens.add({ targets: this.moteGfx, alpha: 1, duration: 4000 });
      this.time.delayedCall(4000, () => {
        // Stage 3: prompt + backdrop together
        this.tweens.add({ targets: [this.pressPrompt, this.pressPromptBg], alpha: 1, duration: 1200 });
        const onKey = () => {
          this.input.keyboard.off('keydown', onKey);
          this.tweens.add({ targets: [this.pressPrompt, this.pressPromptBg], alpha: 0, duration: 400 });
          this.startStandUp(ground);
        };
        this.input.keyboard.on('keydown', onKey);
      });
    });

    // Beetle crawl animation
    this._beetleTimer = 0;
  }

  startStandUp(ground) {
    const cam = this.cameras.main;
    const W = cam.width, H = cam.height;

    // Stage 4: 2s rise — pan ground down slightly, reveal village
    this.tweens.add({
      targets: ground, y: H * 0.12, alpha: 0.5, duration: 2000, ease: 'Sine.easeInOut',
    });
    this.tweens.add({
      targets: this.beetle, y: H * 0.12, alpha: 0.5, duration: 2000,
    });
    this.tweens.add({
      targets: this.village, alpha: 1, duration: 2000,
    });

    this.time.delayedCall(2000, () => this.handReveal());
  }

  handReveal() {
    const cam = this.cameras.main;
    const W = cam.width, H = cam.height;
    // Same horizon line used when the ground was originally drawn.
    const grassBaseY = H * 0.65;

    // Fade ground/village to dim during hand reveal
    this.tweens.add({ targets: [this.village], alpha: 0.25, duration: 600 });

    // Stage 5: hand reveal — left hand normal, right hand glowing
    const g = this.handGfx;
    g.setAlpha(0);
    // High-detail pixel-art hand renderer (PASS 1 REBUILD).
    // Logical-pixel grid is ~20 wide × 22 tall, scaled by `px`.
    // At px=10 each hand is ~200×220 pixels — fills the lower frame.
    // Origin (cx,cy) = top-left of the bounding box.
    // flip = mirror horizontally so the thumb sits on the outer edge.
    // opts.dirty = soil + diagonal palm scar (left hand)
    // opts.mark  = 0..1 pulse value for amber rune glow (right hand)
    // opts.tilt  = small rotation in radians (~15° natural)
    const drawPxHand = (cx, cy, px, flip, opts) => {
      // 3-tone warm skin
      const skinBase  = 0xc89878;
      const skinHi    = 0xe0b894; // ~20% lighter
      const skinShade = 0x956c4a; // ~25% darker
      const skinEdge  = 0x6e4830;
      const dirt      = 0x2c1c0e;
      const scarColor = 0x8a3a2a;

      // Helpers — flip x around the bounding box center (10)
      const fx = (x) => flip ? (20 - x) : x;
      const dot = (x, y, color, alpha = 1) => {
        g.fillStyle(color, alpha);
        g.fillRect(cx + fx(x) * px, cy + y * px, px, px);
      };
      const rect = (x0, y0, w, h, color, alpha = 1) => {
        for (let yy = 0; yy < h; yy++) {
          for (let xx = 0; xx < w; xx++) {
            dot(x0 + xx, y0 + yy, color, alpha);
          }
        }
      };

      // ── Palm: rectangle slightly wider at the knuckles than wrist.
      // Knuckle line at y=8, palm bottom at y=17.
      // Outline columns (4..15), trimmed corners.
      const palmTop = 8, palmBot = 17;
      for (let y = palmTop; y <= palmBot; y++) {
        // taper: wrist (bottom) narrower than knuckles (top)
        const t = (y - palmTop) / (palmBot - palmTop); // 0 at top, 1 at bottom
        const inset = Math.round(t * 1.2);
        for (let x = 4 + inset; x <= 15 - inset; x++) {
          dot(x, y, skinBase);
        }
      }
      // Palm shading — soft highlight in the center, darker at edges
      for (let y = palmTop + 1; y <= palmBot - 1; y++) {
        for (let x = 4; x <= 15; x++) {
          const cxn = (x - 9.5) / 5.5;
          const cyn = (y - 12.5) / 4.5;
          const d2 = cxn * cxn + cyn * cyn;
          if (d2 < 0.25) dot(x, y, skinHi, 0.55);
        }
      }
      // Edge shadow on right side (palm's outer side)
      for (let y = palmTop; y <= palmBot; y++) {
        dot(15 - Math.round((y - palmTop) / 9 * 1.2), y, skinShade, 0.85);
      }
      // Bottom edge shadow into wrist
      for (let x = 5; x <= 14; x++) dot(x, palmBot, skinShade, 0.7);

      // ── Wrist (narrower than palm, fades into darkness)
      const wristTop = 18, wristBot = 21;
      for (let y = wristTop; y <= wristBot; y++) {
        for (let x = 6; x <= 13; x++) {
          dot(x, y, skinBase, 1 - (y - wristTop) * 0.18);
        }
        dot(13, y, skinShade, 0.7);
        dot(6, y, skinShade, 0.5);
      }
      // Wrist crease — single darker line at top of wrist
      for (let x = 6; x <= 13; x++) dot(x, wristTop, skinEdge, 0.6);

      // ── Four fingers above palm (y=0..7), curving slightly inward.
      // index longest, then middle, ring, pinky.
      // Each finger 2 logical px wide with 1 px gap.
      // Columns: index 4-5, middle 7-8, ring 10-11, pinky 13-14
      const fingers = [
        { col: 4,  len: 8, name: 'index'  },
        { col: 7,  len: 7, name: 'middle' },
        { col: 10, len: 6, name: 'ring'   },
        { col: 13, len: 5, name: 'pinky'  },
      ];
      fingers.forEach(f => {
        const top = palmTop - f.len; // y where finger starts
        // very slight inward curve — bend the column toward palm center
        for (let yy = 0; yy < f.len; yy++) {
          const y = palmTop - 1 - yy;
          const curve = Math.round((yy / f.len) * (f.col < 9 ? 0.6 : -0.6));
          const c0 = f.col + curve;
          const c1 = c0 + 1;
          dot(c0, y, skinBase);
          dot(c1, y, skinBase);
          // STRONGER side shading — left edge of each finger 15% darker
          dot(c0, y, skinShade, 0.55);
          // Soft highlight stripe down the center
          if (yy > 0 && yy < f.len - 1) dot(c1, y, skinHi, 0.4);
          // Right edge — light shadow for roundness
          dot(c1, y, skinShade, 0.35);
          // Glow-side warm reflection on right hand (lit from below by the mark)
          if (opts && opts.mark != null) {
            const warm = 0xffd28a;
            dot(c0, y, warm, 0.18 + (1 - yy / f.len) * 0.12);
          }
        }
        // Knuckle joint lines — now 2 pixels WIDE (full finger width) and full alpha
        const k1y = palmTop - 1 - Math.floor(f.len / 3);
        const k2y = palmTop - 1 - Math.floor(f.len * 2 / 3);
        const curve1 = Math.round((Math.floor(f.len/3) / f.len) * (f.col < 9 ? 0.6 : -0.6));
        const curve2 = Math.round((Math.floor(f.len*2/3) / f.len) * (f.col < 9 ? 0.6 : -0.6));
        dot(f.col + curve1, k1y, skinEdge, 1.0);
        dot(f.col + 1 + curve1, k1y, skinEdge, 1.0);
        dot(f.col + curve2, k2y, skinEdge, 1.0);
        dot(f.col + 1 + curve2, k2y, skinEdge, 1.0);
        // Tip rounding
        const tipY = palmTop - f.len;
        dot(f.col + (f.col < 9 ? 1 : -1), tipY, skinShade, 0.6);
      });
      // Top-of-palm knuckle ridge
      for (let x = 4; x <= 15; x++) dot(x, palmTop, skinEdge, 0.55);

      // ── Thumb on the outer (left when not flipped) edge, ~45° outward.
      // Thumb base attaches to palm around y=10..13, x=3
      // Diagonal upward-out
      const thumbCells = [
        [3, 13], [3, 12], [2, 12], [2, 11], [1, 11], [1, 10], [0, 10], [0, 9],
      ];
      thumbCells.forEach(([x, y]) => {
        dot(x, y, skinBase);
        dot(x, y + 1, skinBase);
      });
      // Thumb shading
      thumbCells.forEach(([x, y]) => dot(x, y + 1, skinShade, 0.55));
      // Thumb tip
      dot(0, 9, skinShade, 0.7);
      // Thenar (fleshy base of thumb) — wider, with a clear separating crease
      // so the thumb reads as DISTINCT from the palm.
      rect(2, 10, 3, 5, skinBase);
      dot(2, 10, skinHi, 0.5);
      dot(3, 11, skinHi, 0.45);
      // Crease separating thumb base from palm
      dot(4, 11, skinEdge, 0.95);
      dot(4, 12, skinEdge, 0.95);
      dot(4, 13, skinEdge, 0.85);
      dot(5, 12, skinShade, 0.55);

      // ── Dirt smudges + scar (left hand) — REBUILT
      if (opts && opts.dirty) {
        // Patches on the palm body
        const smudges = [
          [4, 4], [5, 5], [7, 3], [10, 5], [11, 6],
          [5, 16], [6, 17], [13, 16], [14, 15],
          [4, 12], [12, 11],
        ];
        smudges.forEach(([x, y]) => dot(x, y, dirt, 0.9));
        // Single dark pixel under each fingernail (at the very tip of each finger)
        const fingerCols = [4, 7, 10, 13];
        const fingerLens = [8, 7, 6, 5];
        fingerCols.forEach((c, i) => {
          const tipY = 8 - fingerLens[i];
          dot(c, tipY, 0x150a04, 0.95);
          dot(c + 1, tipY, 0x150a04, 0.95);
        });
        // Dirt along the creases between the fingers (vertical thin lines)
        for (let yy = 1; yy < 7; yy++) {
          dot(6, yy, dirt, 0.6);  // crease between index/middle
          dot(9, yy, dirt, 0.5);  // crease between middle/ring
          dot(12, yy, dirt, 0.5); // crease between ring/pinky
        }
        // Diagonal scar from between index/middle (top) down to heel of palm
        // 3 pixels wide at the thickest with a darker red shadow beneath.
        const scarPath = [
          [6, 9], [6, 10], [7, 11], [7, 12], [8, 13], [8, 14], [9, 15], [9, 16],
        ];
        scarPath.forEach(([x, y], i) => {
          // Darker red shadow underneath
          dot(x, y + 1, 0x4a1810, 0.85);
          dot(x + 1, y + 1, 0x4a1810, 0.7);
          // Main scar — full alpha center, softer edges
          dot(x, y, scarColor, 1.0);
          dot(x + 1, y, scarColor, 0.95);
          // Third pixel — gives the thickest part 3px width
          if (i >= 2 && i <= 5) dot(x + 2, y, scarColor, 0.7);
        });
        // Brighter healed-tissue specks along the scar
        dot(7, 10, 0xa04030, 0.8);
        dot(8, 12, 0xa04030, 0.8);
        dot(9, 14, 0xb84838, 0.85);
      }

      // ── Right-hand glowing rune (REBUILT — layered glow + breathing)
      if (opts && opts.mark != null) {
        const pulse = opts.mark; // 0..1
        const alpha = 0.85 + pulse * 0.15;
        const mcx = cx + fx(9.5) * px;
        const mcy = cy + 12.5 * px;

        // ── Layered radial glow with proper falloff stops ────────
        // Pulse breathing: outermost ring extends 25% further at peak.
        const breath = 1.0 + pulse * 0.25;
        const baseR  = 4 * px;
        const ring2R = 8 * px * breath;
        const ring3R = 14 * px * breath;
        const hazeR  = 22 * px * breath;
        // Outermost haze (10%)
        g.fillStyle(0xc06820, 0.10 * alpha);
        g.fillCircle(mcx, mcy, hazeR);
        // Third ring (30%)
        g.fillStyle(0xffb050, 0.30 * alpha);
        g.fillCircle(mcx, mcy, ring3R);
        // Second ring (60%)
        g.fillStyle(0xffd070, 0.60 * alpha);
        g.fillCircle(mcx, mcy, ring2R);
        // Innermost (100%)
        g.fillStyle(0xffe8a8, 1.0 * alpha);
        g.fillCircle(mcx, mcy, baseR);

        // Outer pixel ring of the rune itself
        const ringPts = [
          [9.5, 7.5], [11, 8], [12, 9.5], [12.5, 11], [12.5, 12.5], [12.5, 14],
          [12, 15.5], [11, 16.5], [9.5, 17], [8, 16.5], [7, 15.5], [6.5, 14],
          [6.5, 12.5], [6.5, 11], [7, 9.5], [8, 8],
        ];
        ringPts.forEach(([x, y]) => {
          g.fillStyle(0xffd070, alpha);
          g.fillRect(cx + fx(x) * px, cy + y * px, px, px);
        });

        // Inner ring
        const innerR = 2.2;
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
          const ix = 9.5 + Math.cos(a) * innerR;
          const iy = 12.5 + Math.sin(a) * innerR;
          g.fillStyle(0xffe8a8, alpha);
          g.fillRect(cx + fx(ix) * px, cy + iy * px, px, px);
        }

        // 4 cardinal radiating lines
        const radial = [[0, -1], [0, 1], [-1, 0], [1, 0]];
        radial.forEach(([dx, dy]) => {
          for (let s = 3; s <= 4.5; s += 0.6) {
            g.fillStyle(0xfff0c0, alpha);
            g.fillRect(cx + fx(9.5 + dx * s) * px, cy + (12.5 + dy * s) * px, px, px);
          }
        });

        // 4 INTERCARDINAL secondary marks (NE/NW/SE/SW) — compass-rose style
        const inter = [
          [ 0.707, -0.707], [-0.707, -0.707],
          [ 0.707,  0.707], [-0.707,  0.707],
        ];
        inter.forEach(([dx, dy]) => {
          // Short radial dashes between inner and outer ring
          for (let s = 2.6; s <= 3.8; s += 0.6) {
            g.fillStyle(0xffc070, alpha * 0.95);
            g.fillRect(cx + fx(9.5 + dx * s) * px, cy + (12.5 + dy * s) * px, px, px);
          }
          // Tiny secondary mark pixel between cardinal points on the outer ring
          const ox = 9.5 + dx * 4.0;
          const oy = 12.5 + dy * 4.0;
          g.fillStyle(0xffe8a8, alpha);
          g.fillRect(cx + fx(ox) * px, cy + oy * px, px, px);
        });

        // 4 additional small "tick" marks halfway between cardinals (8 total
        // secondary marks per the spec when combined with the 4 above)
        const tickAngles = [Math.PI / 8, 3 * Math.PI / 8, 5 * Math.PI / 8, 7 * Math.PI / 8];
        tickAngles.forEach(a => {
          [a, a + Math.PI].forEach(aa => {
            const tx = 9.5 + Math.cos(aa) * 3.5;
            const ty = 12.5 + Math.sin(aa) * 3.5;
            g.fillStyle(0xffd890, alpha * 0.8);
            g.fillRect(cx + fx(tx) * px, cy + ty * px, px, px);
          });
        });

        // Center point — brightest pixel
        g.fillStyle(0xffffe0, alpha);
        g.fillRect(mcx - px / 2, mcy - px / 2, px, px);
        g.fillStyle(0xffffff, alpha * 0.85);
        g.fillRect(mcx - px / 4, mcy - px / 4, px / 2, px / 2);
      }
    };

    const drawHands = (pulse) => {
      g.clear();
      // PASS 1: ~2.5x larger hands — px went from 4 → 10.
      // Each hand bounding box ≈ 20×22 logical px × 10 = 200×220 actual px.
      // The wrists deliberately fall BELOW the screen edge so the hands
      // appear to be pushing up from the earth.
      const px = 10;
      const handLogicalW = 20 * px;            // 200
      const gap = handLogicalW * 1.0;          // ~one hand-width gap
      const totalW = handLogicalW * 2 + gap;
      const startX = (W - totalW) / 2;
      // Position: wrist (logical y=21) should land just below the bottom of
      // the screen — the hand TOP sits well above the grass line.
      // top-left y = H - (logical 22) * px - small overhang
      const topY = H - 19 * px;
      // Drop shadows beneath each hand on the grass — soft dark ovals
      // (drawn first so the hands sit on top of them).
      const shadowY = grassBaseY - 2;
      g.fillStyle(0x000000, 0.40);
      g.fillEllipse(startX + handLogicalW / 2,                     shadowY, handLogicalW * 0.85, 18);
      g.fillEllipse(startX + handLogicalW + gap + handLogicalW / 2, shadowY, handLogicalW * 0.85, 18);
      g.fillStyle(0x000000, 0.20);
      g.fillEllipse(startX + handLogicalW / 2,                     shadowY + 2, handLogicalW * 1.05, 24);
      g.fillEllipse(startX + handLogicalW + gap + handLogicalW / 2, shadowY + 2, handLogicalW * 1.05, 24);

      // Left hand — slightly raised, dirt + scar
      // (note: tilt is suggested visually by the slight Y offset between hands)
      drawPxHand(startX,                       topY - 4, px, false, { dirty: true });
      // Right hand — glowing rune, slightly forward/closer
      drawPxHand(startX + handLogicalW + gap,  topY,     px, true,  { mark: pulse });
    };
    drawHands(0);

    this.tweens.add({ targets: g, alpha: 1, duration: 800 });

    // Pulse twice over ~3s
    let pulseT = 0;
    const pulseEvent = this.time.addEvent({
      delay: 16, loop: true,
      callback: () => {
        pulseT += 0.016;
        const p = Math.sin(pulseT * 2.1) * 0.5 + 0.5;
        drawHands(p);
      },
    });
    this._handPulse = pulseEvent;

    // Stage 6: voice text after 1.2s
    this.time.delayedCall(1200, () => {
      const voice = this.add.text(this.cameras.main.width / 2, this.cameras.main.height * 0.42,
        "Don't show anyone your hand. Not yet.", {
          fontFamily: 'Georgia, serif', fontSize: '22px',
          color: '#e8d8a8', fontStyle: 'italic',
          stroke: '#0a0810', strokeThickness: 2, align: 'center',
        }).setOrigin(0.5).setAlpha(0).setDepth(30);
      this.tweens.add({
        targets: voice, alpha: 1, duration: 900,
        hold: 2400, yoyo: true,
        onComplete: () => {
          voice.destroy();
          // Awakening theme — Play 1: after the voice line fades, 40%, no loop
          music.playAwakening(0.40);
        },
      });
    });

    // Stage 7: pull back to iso, transition to GameScene
    this.time.delayedCall(5200, () => {
      pulseEvent.remove();
      const fade = this.add.graphics().setDepth(100);
      fade.fillStyle(0x000000, 0).fillRect(0, 0, this.cameras.main.width, this.cameras.main.height);
      this.tweens.add({
        targets: fade, alpha: 1, duration: 1500,
        onUpdate: (tw) => {
          fade.clear();
          fade.fillStyle(0x000000, tw.getValue());
          fade.fillRect(0, 0, this.cameras.main.width, this.cameras.main.height);
        },
        onComplete: () => {
          this.scene.start('GameScene', { firstVisit: true });
        },
      });
    });
  }

  update(time, delta) {
    this._beetleTimer = (this._beetleTimer || 0) + delta;
    if (this._beetleTimer > 110 && this.beetle && this._beetleDraw) {
      this._beetleTimer = 0;
      this.beetleX += this.beetleDir * 0.9;
      this.beetleLegPhase += 0.9;
      if (this.beetleX > this.cameras.main.width * 0.75) this.beetleDir = -1;
      if (this.beetleX < this.cameras.main.width * 0.25) this.beetleDir = 1;
      this._beetleDraw();
    }
    // Drift dust motes upward, gentle sway
    if (this.motes && this.moteGfx && this.moteGfx.alpha > 0.01) {
      const W = this.cameras.main.width, H = this.cameras.main.height;
      this.moteGfx.clear();
      for (const m of this.motes) {
        m.y -= m.v * (delta / 16);
        m.sway += 0.02;
        const xx = m.x + Math.sin(m.sway) * 0.6;
        if (m.y < H * 0.32) { m.y = H - 8; m.x = Math.random() * W; }
        this.moteGfx.fillStyle(m.col, 0.55);
        this.moteGfx.fillRect(xx, m.y, 1, 1);
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────
// MAIN MENU SCENE — first scene the player sees
// ─────────────────────────────────────────────────────────────────────
class MainMenuScene extends Phaser.Scene {
  constructor() { super('MainMenuScene'); }

  preload() { music.preload(this); sfx.preload(this); }

  create() {
    music.bind(this);
    sfx.bind(this);
    const cam = this.cameras.main;
    const W = cam.width, H = cam.height;
    cam.setBackgroundColor(0x0d0818);
    this._W = W; this._H = H;

    // Unlock audio on first input
    this.input.keyboard.on('keydown', () => { music.unlock(); sfx.unlock(); }, { once: false });
    this.input.on('pointerdown',     () => { music.unlock(); sfx.unlock(); }, { once: false });

    // ── LAYER 1: SKY ───────────────────────────────────────────────
    const sky = this.add.graphics().setDepth(-20);
    const steps = 48;
    for (let i = 0; i < steps; i++) {
      const t = i / (steps - 1);
      // #0d0818 → #1a1030
      const r = Math.round(13 + t * (26 - 13));
      const g = Math.round(8  + t * (16 - 8));
      const b = Math.round(24 + t * (48 - 24));
      sky.fillStyle((r << 16) | (g << 8) | b, 1);
      sky.fillRect(0, Math.floor(i / steps * H * 0.7), W, Math.ceil(H * 0.7 / steps) + 1);
    }
    // Stars (40–50)
    let seed = 4519;
    const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    const starCount = 40 + Math.floor(rnd() * 11);
    for (let i = 0; i < starCount; i++) {
      const sx = Math.floor(rnd() * W);
      const sy = Math.floor(rnd() * rnd() * H * 0.62);
      const r = rnd();
      if (r < 0.18) {
        sky.fillStyle(0xc8d8ff, 0.65); sky.fillRect(sx, sy, 2, 2);
      } else {
        sky.fillStyle(0xeeeeff, 0.30 + rnd() * 0.55); sky.fillRect(sx, sy, 1, 1);
      }
    }
    // Faint aurora streaks at the very top
    for (let i = 0; i < 6; i++) {
      sky.fillStyle(0x3a2858, 0.06);
      sky.fillRect(0, 10 + i * 12, W, 2);
    }

    // ── LAYER 2: FOREST SILHOUETTE ────────────────────────────────
    const forest = this.add.graphics().setDepth(-15);
    const drawTree = (x, baseY, h) => {
      forest.fillStyle(0x0a1208, 1);
      // pyramid-ish irregular pixel tree
      for (let yy = 0; yy < h; yy++) {
        const w = Math.max(2, Math.floor((1 - yy / h) * 14) + Math.floor(rnd() * 3));
        forest.fillRect(x - w, baseY - yy, w * 2, 1);
      }
      // moonlight tip
      forest.fillStyle(0x2a3828, 0.45);
      forest.fillRect(x - 1, baseY - h, 2, 2);
    };
    const treeBaseY = H * 0.68;
    for (let x = 0; x < 220; x += 10 + Math.floor(rnd() * 8)) {
      drawTree(x, treeBaseY + (rnd() * 12 - 6), 22 + Math.floor(rnd() * 30));
    }
    for (let x = W - 220; x < W + 10; x += 10 + Math.floor(rnd() * 8)) {
      drawTree(x, treeBaseY + (rnd() * 12 - 6), 22 + Math.floor(rnd() * 30));
    }

    // ── LAYER 3: GROUND + ROADS ───────────────────────────────────
    const ground = this.add.graphics().setDepth(-12);
    ground.fillStyle(0x1a2a10, 1);
    ground.fillRect(0, H * 0.62, W, H * 0.38);
    // earth dapples
    for (let i = 0; i < 220; i++) {
      const gx = Math.floor(rnd() * W);
      const gy = Math.floor(H * 0.62 + rnd() * H * 0.38);
      const tone = [0x223018, 0x2a3a18, 0x182610][Math.floor(rnd() * 3)];
      ground.fillStyle(tone, 0.7);
      ground.fillRect(gx, gy, 2 + Math.floor(rnd() * 3), 1 + Math.floor(rnd() * 2));
    }
    // Five roads receding to a central crossroads point
    const cx = W / 2;
    const cy = H * 0.58;
    const drawRoad = (angleDeg, length) => {
      const a = angleDeg * Math.PI / 180;
      for (let s = 0; s < length; s += 1) {
        const t = s / length;
        const w = Math.round(2 + (1 - t) * 14); // narrows away from center
        const x = cx + Math.cos(a) * s;
        const y = cy + Math.sin(a) * s * 0.55; // isometric foreshorten
        // amber tint near center, fading to ochre-brown
        const glow = Math.max(0, 1 - s / 80);
        const base = 0x6b4020;
        ground.fillStyle(base, 0.85);
        ground.fillRect(x - w / 2, y, w, 2);
        if (glow > 0) {
          ground.fillStyle(0xc8922a, glow * 0.25);
          ground.fillRect(x - w / 2, y, w, 2);
        }
      }
    };
    drawRoad(-90, H * 0.5);   // up (perspective)
    drawRoad(90,  H * 0.42);  // down
    drawRoad(165, W * 0.45);  // SW
    drawRoad(15,  W * 0.45);  // SE
    drawRoad(195, W * 0.45);  // NW (back-up)
    drawRoad(-15, W * 0.45);  // NE

    // grass tufts
    for (let i = 0; i < 60; i++) {
      const gx = Math.floor(rnd() * W);
      const gy = Math.floor(H * 0.66 + rnd() * H * 0.32);
      ground.fillStyle(0x3a5a20, 0.6);
      ground.fillRect(gx, gy, 1, 2);
      ground.fillStyle(0x4a7028, 0.5);
      ground.fillRect(gx + 1, gy, 1, 1);
    }

    // ── LAYER 4: VILLAGE HOUSES ───────────────────────────────────
    const houses = this.add.graphics().setDepth(-10);
    const drawHouse = (hx, hy, scale, crooked = false) => {
      const w = Math.round(34 * scale);
      const h = Math.round(22 * scale);
      const skew = crooked ? 4 : 0;
      // wall
      houses.fillStyle(0x2a1c14, 1);
      houses.fillRect(hx, hy, w, h);
      // roof (triangle approximation)
      houses.fillStyle(0x14080a, 1);
      for (let i = 0; i < 12; i++) {
        houses.fillRect(hx - 3 + i, hy - 12 + i, w + 6 - i * 2, 1);
      }
      // crooked tilt
      if (crooked) {
        houses.fillStyle(0x14080a, 1);
        houses.fillRect(hx - skew, hy + h - 2, w + skew * 2, 2);
      }
      // window with warm amber glow
      const wx = hx + Math.round(w * 0.32);
      const wy = hy + Math.round(h * 0.4);
      houses.fillStyle(0xffc878, 1);
      houses.fillRect(wx, wy, 4, 4);
      houses.fillStyle(0xffe0a0, 0.85);
      houses.fillRect(wx + 1, wy + 1, 2, 2);
      // soft glow halo
      houses.fillStyle(0xffc878, 0.18);
      houses.fillRect(wx - 4, wy - 4, 12, 12);
      // second window
      houses.fillStyle(0xffc878, 1);
      houses.fillRect(hx + Math.round(w * 0.62), wy, 4, 4);
      return { wx: hx + w / 2, wy: hy - 12, scale };
    };
    // 5 houses around the edges
    const h1 = drawHouse(W * 0.10, H * 0.55, 1.0);
    const h2 = drawHouse(W * 0.20, H * 0.74, 1.1);
    const h3 = drawHouse(W * 0.78, H * 0.55, 1.0, true); // Baba's — crooked
    const h4 = drawHouse(W * 0.86, H * 0.74, 1.1);
    const h5 = drawHouse(W * 0.44, H * 0.80, 0.9);

    // chimney smoke anchors (will be animated)
    this._smokeSources = [
      { x: h2.wx, y: h2.wy, puffs: [] },
      { x: h3.wx, y: h3.wy, puffs: [] },
    ];
    this._smokeGfx = this.add.graphics().setDepth(-9);

    // ── LAYER 5: THE STRAW IDOL ───────────────────────────────────
    this._idolBaseX = cx;
    this._idolBaseY = cy + 4;
    const idol = this.add.graphics().setDepth(-7);
    this._idolGfx = idol;
    this._drawIdol(0);

    // amber glow halo (animated)
    this._idolGlow = this.add.graphics().setDepth(-8).setAlpha(0.85);
    this._drawIdolGlow(1);

    // candles at base
    idol.fillStyle(0xffc878, 1);
    idol.fillRect(cx - 8, cy + 22, 1, 2);
    idol.fillRect(cx + 7, cy + 22, 1, 2);
    idol.fillStyle(0xffe0a0, 0.6);
    idol.fillRect(cx - 8, cy + 21, 1, 1);
    idol.fillRect(cx + 7, cy + 21, 1, 1);

    // ── CROW on idol — still, watching ────────────────────────────
    const crow = this.add.graphics().setDepth(-6);
    const crowX = cx, crowY = cy - 28;
    crow.fillStyle(0x080808, 1);
    crow.fillRect(crowX - 3, crowY, 6, 4);     // body
    crow.fillRect(crowX - 1, crowY - 3, 3, 3); // head
    crow.fillRect(crowX + 2, crowY - 2, 2, 1); // beak
    crow.fillStyle(0xffaa44, 1);
    crow.fillRect(crowX + 2, crowY - 3, 1, 1); // eye

    // ── LAYER 6: ATMOSPHERE ───────────────────────────────────────
    // Vignette
    const vignette = this.add.graphics().setDepth(900);
    for (let i = 0; i < 5; i++) {
      vignette.lineStyle(40 - i * 6, 0x000000, 0.18);
      vignette.strokeRect(i * 6, i * 6, W - i * 12, H - i * 12);
    }
    // Ground mist
    const mist = this.add.graphics().setDepth(-5);
    mist.fillStyle(0xa090b0, 0.10);
    mist.fillRect(0, H * 0.66, W, 8);
    mist.fillStyle(0xa090b0, 0.06);
    mist.fillRect(0, H * 0.70, W, 12);

    // Fireflies
    this._flies = [];
    this._flyGfx = this.add.graphics().setDepth(-4);
    for (let i = 0; i < 10; i++) {
      this._flies.push({
        x: rnd() * W, y: H * 0.4 + rnd() * H * 0.5,
        vx: (rnd() - 0.5) * 0.15, vy: (rnd() - 0.5) * 0.10,
        phase: rnd() * Math.PI * 2,
      });
    }

    // ── TITLE — WYRDÓW ────────────────────────────────────────────
    // Phaser Text has no letter-spacing API, so we space the glyphs manually.
    const titleY = H * 0.18;
    this.titleText = this.add.text(W / 2, titleY, 'W Y R D Ó W', {
      fontFamily: 'Georgia, "Times New Roman", serif',
      fontSize: '88px', fontStyle: 'normal',
      color: '#c8922a',
      stroke: '#1a0e08', strokeThickness: 5,
    }).setOrigin(0.5).setAlpha(0).setDepth(950);
    this.titleText.setResolution(window.devicePixelRatio || 1);
    // soft drop shadow text
    this.titleShadow = this.add.text(W / 2 + 2, titleY + 2, 'W Y R D Ó W', {
      fontFamily: 'Georgia, "Times New Roman", serif',
      fontSize: '88px', color: '#1a0e08',
    }).setOrigin(0.5).setAlpha(0).setDepth(949);
    this.titleShadow.setResolution(window.devicePixelRatio || 1);

    // Decorative diamond rule
    this.titleRule = this.add.graphics().setDepth(950).setAlpha(0);
    const ruleY = titleY + 56;
    const ruleHalf = 180;
    this.titleRule.lineStyle(1, 0xc8922a, 0.6);
    this.titleRule.beginPath();
    this.titleRule.moveTo(W / 2 - ruleHalf, ruleY);
    this.titleRule.lineTo(W / 2 + ruleHalf, ruleY);
    this.titleRule.strokePath();
    for (let i = -3; i <= 3; i++) {
      const dx = W / 2 + i * 30;
      this.titleRule.fillStyle(0xc8922a, 0.6);
      this.titleRule.fillTriangle(dx, ruleY - 4, dx + 4, ruleY, dx, ruleY + 4);
      this.titleRule.fillTriangle(dx, ruleY - 4, dx - 4, ruleY, dx, ruleY + 4);
    }

    // Fade in title
    this.tweens.add({ targets: [this.titleText, this.titleShadow, this.titleRule],
      alpha: 1, duration: 2000, ease: 'Sine.easeOut' });

    // ── MENU OPTIONS ──────────────────────────────────────────────
    const menuStartY = H * 0.62;
    const menuSpacing = 44;
    const labels = ['New Game', 'Continue', 'Settings', 'Credits'];
    this.menuItems = [];
    // Decorative rule above the menu
    const menuRule = this.add.graphics().setDepth(950).setAlpha(0);
    const mrY = menuStartY - 28;
    menuRule.lineStyle(1, 0xc8922a, 0.35);
    menuRule.beginPath();
    menuRule.moveTo(W / 2 - 120, mrY);
    menuRule.lineTo(W / 2 + 120, mrY);
    menuRule.strokePath();
    this.tweens.add({ targets: menuRule, alpha: 1, duration: 1500, delay: 1500 });

    labels.forEach((label, i) => {
      const y = menuStartY + i * menuSpacing;
      const isContinue = (label === 'Continue');
      const greyed = isContinue && !gameState.hasSave;
      const baseColor = greyed ? '#6b5a40' : '#e8dfc0';
      const t = this.add.text(W / 2, y, label, {
        fontFamily: 'Georgia, serif', fontSize: '28px',
        color: baseColor, stroke: '#1a0e08', strokeThickness: 3,
      }).setOrigin(0.5).setDepth(951).setAlpha(0).setInteractive({ useHandCursor: !greyed });
      t.setResolution(window.devicePixelRatio || 1);

      // Diamond marker (hidden until selected)
      const marker = this.add.text(W / 2 - 110, y, '◆', {
        fontFamily: 'Georgia, serif', fontSize: '20px', color: '#c8922a',
      }).setOrigin(0.5).setDepth(951).setAlpha(0);
      marker.setResolution(window.devicePixelRatio || 1);

      const item = { label, text: t, marker, y, greyed };
      this.menuItems.push(item);

      // sequential fade-in: bottom-up — Credits first, New Game last
      const order = (labels.length - 1 - i); // Credits=0, Settings=1, Continue=2, NewGame=3
      const delay = 2200 + order * 300;
      this.tweens.add({ targets: t, alpha: 1, duration: 500, delay });

      t.on('pointerover', () => { if (!item.greyed) this._setSelection(i); });
      t.on('pointerdown', () => { if (!item.greyed) this._activate(i); });
    });

    // Initial selection: New Game (index 0)
    this._selection = 0;
    this._setSelection(0);

    // Keyboard nav
    this.input.keyboard.on('keydown-UP', () => this._move(-1));
    this.input.keyboard.on('keydown-DOWN', () => this._move(+1));
    this.input.keyboard.on('keydown-ENTER', () => this._activate(this._selection));
    this.input.keyboard.on('keydown-E', () => this._activate(this._selection));

    // ── AUDIO ─────────────────────────────────────────────────────
    // Both tracks loop on the menu — theme_awakening loops here only.
    music.startAmbient(); // ambient at its natural target (we set 0.55 below)
    music._ambientNaturalTarget = 0.55;
    music._recomputeAmbient(2000);
    // Force theme_awakening to loop on menu
    music._gated(() => {
      const s = music.sounds.theme_awakening;
      if (s) {
        s.loop = true;
        if (s._desiredBase == null) s._desiredBase = 0;
        if (!s.isPlaying) { try { s.setVolume(0); s.play(); } catch (e) {} }
        music._tweenTo('theme_awakening', 0.40, 2000);
      }
    });

    // "No save" message slot
    this.noSaveMsg = this.add.text(W / 2, menuStartY + 4 * menuSpacing + 16, '', {
      fontFamily: 'Georgia, serif', fontSize: '14px', fontStyle: 'italic',
      color: '#e8dfc0',
    }).setOrigin(0.5).setDepth(951).setAlpha(0);
    this.noSaveMsg.setResolution(window.devicePixelRatio || 1);

    this._t0 = 0;
  }

  _drawIdol(pulseT) {
    const g = this._idolGfx; const cx = this._idolBaseX; const cy = this._idolBaseY;
    g.clear();
    // candles redrawn after
    // Iron base
    g.fillStyle(0x1a1410, 1); g.fillRect(cx - 6, cy + 18, 12, 4);
    // Straw body
    g.fillStyle(0x6b5230, 1); g.fillRect(cx - 5, cy - 18, 10, 36);
    g.fillStyle(0x8a6a3a, 0.9); g.fillRect(cx - 4, cy - 16, 8, 32);
    // bound rings
    g.fillStyle(0x3a2614, 1);
    g.fillRect(cx - 6, cy - 6, 12, 1);
    g.fillRect(cx - 6, cy + 6, 12, 1);
    // Head
    g.fillStyle(0x4a3820, 1); g.fillRect(cx - 5, cy - 26, 10, 8);
    // EYES — always open on title screen
    g.fillStyle(0xffc878, 1); g.fillRect(cx - 3, cy - 23, 1, 2);
    g.fillRect(cx + 2, cy - 23, 1, 2);
    g.fillStyle(0xffe0a0, 0.9);
    g.fillRect(cx - 3, cy - 23, 1, 1);
    g.fillRect(cx + 2, cy - 23, 1, 1);
    // outstretched arms
    g.fillStyle(0x6b5230, 1);
    g.fillRect(cx - 12, cy - 8, 7, 2);
    g.fillRect(cx + 5, cy - 8, 7, 2);
  }

  _drawIdolGlow(intensity) {
    const g = this._idolGlow; const cx = this._idolBaseX; const cy = this._idolBaseY;
    g.clear();
    for (let r = 80; r > 0; r -= 8) {
      const a = (1 - r / 80) * 0.10 * intensity;
      g.fillStyle(0xffc878, a);
      g.fillEllipse(cx, cy + 8, r * 1.6, r * 0.7);
    }
  }

  _setSelection(i) {
    this._selection = i;
    this.menuItems.forEach((it, idx) => {
      const sel = (idx === i);
      const greyed = it.greyed;
      const color = greyed ? '#6b5a40' : (sel ? '#c8922a' : '#e8dfc0');
      it.text.setColor(color);
      it.text.setScale(sel && !greyed ? 1.05 : 1.0);
      it.marker.setAlpha(sel && !greyed ? 1 : 0);
      it.marker.setPosition(this._W / 2 - it.text.displayWidth / 2 - 22, it.y);
    });
  }

  _move(dir) {
    let i = this._selection;
    for (let n = 0; n < this.menuItems.length; n++) {
      i = (i + dir + this.menuItems.length) % this.menuItems.length;
      if (!this.menuItems[i].greyed) break;
    }
    this._setSelection(i);
  }

  _activate(i) {
    if (this._activating) return;
    const item = this.menuItems[i];
    if (!item || item.greyed) {
      if (item && item.label === 'Continue') this._showNoSaveMessage();
      return;
    }
    switch (item.label) {
      case 'New Game':  this._startNewGame(); break;
      case 'Continue':  this._continueGame(); break;
      case 'Settings':  this._openSettings(); break;
      case 'Credits':   this._openCredits();  break;
    }
  }

  _showNoSaveMessage() {
    this.noSaveMsg.setText('No save found.');
    this.noSaveMsg.setAlpha(0);
    this.tweens.add({ targets: this.noSaveMsg, alpha: 1, duration: 400 });
    this.time.delayedCall(2000, () => {
      this.tweens.add({ targets: this.noSaveMsg, alpha: 0, duration: 600 });
    });
  }

  _fadeAudioOut(ms = 3000) {
    music._gated(() => {
      music._tweenTo('wyrdow_ambient', 0, ms);
      music._tweenTo('theme_awakening', 0, ms);
    });
  }

  _startNewGame() {
    this._activating = true;
    this._fadeAudioOut(1500);
    // Reset gameState for a fresh playthrough
    try {
      // Remove existing save so a fresh run starts clean
      // (the player can save again as they progress)
      // Note: settings remain — they live in a different key.
    } catch (e) {}
    this.cameras.main.fadeOut(1500, 0, 0, 0);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      // Reset transient runtime state
      gameState.act = 1;
      gameState.knotsPlaced = 0; gameState.markersFound = [];
      gameState.questActive = false; gameState.questComplete = false;
      gameState.codexFragmentCollected = false;
      gameState.babaMetOnce = false; gameState.knotsGiven = false;
      gameState.zuzkaMetOnce = false; gameState.firstVillageEntry = false;
      gameState.inventory = [];
      gameState.observedZones = [];
      gameState.ritualState = {
        perimeter_walked: false,
        domovoi_offering_correct: false,
        domovoi_offering_attempted: false,
        noon_silence_kept: false,
        nocnica_found: false,
        wisp_choice: null,
      };
      gameState.regencyAttention = 0;
      gameState.regencyFired = {};
      gameState.brelSceneFired = false;
      gameState.gameHour = 8.0;
      this.scene.start('OpeningScene');
    });
  }

  _continueGame() {
    this._activating = true;
    this._fadeAudioOut(1500);
    loadGame();
    this.cameras.main.fadeOut(1500, 0, 0, 0);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.scene.start('GameScene', { firstVisit: false });
    });
  }

  // ── SETTINGS OVERLAY ──────────────────────────────────────────
  _openSettings() {
    if (this._settingsOpen) return;
    this._settingsOpen = true;
    const W = this._W, H = this._H;
    const layer = this.add.container(0, 0).setDepth(2000);
    // dim
    const dim = this.add.rectangle(0, 0, W, H, 0x000000, 0.55).setOrigin(0, 0);
    layer.add(dim);
    // parchment panel
    const pw = 460, ph = 320;
    const px = (W - pw) / 2, py = (H - ph) / 2;
    const panel = this.add.graphics();
    panel.fillStyle(0x1a1410, 0.96); panel.fillRoundedRect(px, py, pw, ph, 6);
    panel.lineStyle(1, 0xc8922a, 0.6); panel.strokeRoundedRect(px, py, pw, ph, 6);
    layer.add(panel);
    const title = this.add.text(W / 2, py + 28, 'Settings', {
      fontFamily: 'Georgia, serif', fontSize: '24px', color: '#c8922a',
    }).setOrigin(0.5);
    layer.add(title);

    const sliders = [
      { label: 'Music',   key: 'musicVolume',
        apply: (v) => { gameState.musicVolume = v; music._applyMaster(); } },
      { label: 'Ambient', key: 'ambientVolume',
        apply: (v) => { gameState.ambientVolume = v;
                        music._ambientNaturalTarget = v;
                        music._recomputeAmbient(200); } },
      { label: 'SFX',     key: 'sfxVolume',
        apply: (v) => { gameState.sfxVolume = v; try { sfx.applyMaster(); } catch (e) {} } },
    ];
    sliders.forEach((sl, idx) => {
      const sy = py + 80 + idx * 56;
      const lbl = this.add.text(px + 30, sy, sl.label, {
        fontFamily: 'Georgia, serif', fontSize: '16px', color: '#e8dfc0',
      });
      layer.add(lbl);
      // slider track
      const tx = px + 130, ty = sy + 12, tw = 280;
      const track = this.add.graphics();
      track.fillStyle(0x3a2a18, 1); track.fillRect(tx, ty, tw, 4);
      layer.add(track);
      // knob
      const knob = this.add.circle(tx + tw * gameState[sl.key], ty + 2, 8, 0xc8922a)
        .setInteractive({ draggable: true, useHandCursor: true });
      this.input.setDraggable(knob);
      layer.add(knob);
      knob.on('drag', (_p, dx) => {
        const nx = Phaser.Math.Clamp(dx, tx, tx + tw);
        knob.x = nx;
        const v = (nx - tx) / tw;
        sl.apply(v);
        saveSettings();
      });
    });

    // Fullscreen toggle
    const fsY = py + ph - 80;
    const fsLabel = this.add.text(px + 30, fsY, 'Fullscreen', {
      fontFamily: 'Georgia, serif', fontSize: '16px', color: '#e8dfc0',
    });
    layer.add(fsLabel);
    const fsBtn = this.add.text(px + pw - 100, fsY, '[ Toggle ]', {
      fontFamily: 'Georgia, serif', fontSize: '16px', color: '#c8922a',
    }).setInteractive({ useHandCursor: true });
    fsBtn.on('pointerdown', () => {
      if (this.scale.isFullscreen) this.scale.stopFullscreen();
      else this.scale.startFullscreen();
    });
    layer.add(fsBtn);

    // Close
    const close = this.add.text(W / 2, py + ph - 28, '[ Close ]', {
      fontFamily: 'Georgia, serif', fontSize: '16px', color: '#c8922a',
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    layer.add(close);
    const doClose = () => {
      layer.destroy(); this._settingsOpen = false;
      this.input.keyboard.off('keydown-ESC', doClose);
    };
    close.on('pointerdown', doClose);
    this.input.keyboard.on('keydown-ESC', doClose);
  }

  // ── CREDITS OVERLAY ───────────────────────────────────────────
  _openCredits() {
    if (this._creditsOpen) return;
    this._creditsOpen = true;
    const W = this._W, H = this._H;
    const layer = this.add.container(0, 0).setDepth(2000);
    const dim = this.add.rectangle(0, 0, W, H, 0x000000, 0.65).setOrigin(0, 0);
    layer.add(dim);
    const pw = 520, ph = 480;
    const px = (W - pw) / 2, py = (H - ph) / 2;
    const panel = this.add.graphics();
    panel.fillStyle(0x1a1410, 0.96); panel.fillRoundedRect(px, py, pw, ph, 6);
    panel.lineStyle(1, 0xc8922a, 0.6); panel.strokeRoundedRect(px, py, pw, ph, 6);
    layer.add(panel);
    const lines = [
      { t: 'WYRDÓW', size: 28, color: '#c8922a', gap: 30 },
      { t: '', size: 6 },
      { t: 'Game Design & Story', size: 14, color: '#a89878' },
      { t: '[Your name here]', size: 16, color: '#e8dfc0', gap: 22 },
      { t: '', size: 6 },
      { t: 'Built with Claude Code', size: 14, color: '#a89878' },
      { t: 'Anthropic', size: 16, color: '#e8dfc0', gap: 22 },
      { t: '', size: 6 },
      { t: 'Music generated with Suno', size: 14, color: '#a89878' },
      { t: '', size: 18 },
      { t: 'A world of Slavic and Chasidic folklore',
        size: 13, color: '#c8b878', italic: true },
      { t: 'reimagined after the Collapse.', size: 13, color: '#c8b878', italic: true },
    ];
    let y = py + 40;
    for (const ln of lines) {
      if (ln.t) {
        const txt = this.add.text(W / 2, y, ln.t, {
          fontFamily: 'Georgia, serif', fontSize: ln.size + 'px',
          fontStyle: ln.italic ? 'italic' : 'normal',
          color: ln.color || '#e8dfc0',
        }).setOrigin(0.5);
        layer.add(txt);
      }
      y += (ln.size || 14) + (ln.gap != null ? ln.gap - ln.size : 8);
    }
    const close = this.add.text(W / 2, py + ph - 28, '[ Close — Esc ]', {
      fontFamily: 'Georgia, serif', fontSize: '14px', color: '#c8922a',
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    layer.add(close);
    const doClose = () => {
      layer.destroy(); this._creditsOpen = false;
      this.input.keyboard.off('keydown-ESC', doClose);
    };
    close.on('pointerdown', doClose);
    this.input.keyboard.on('keydown-ESC', doClose);
  }

  update(time, delta) {
    this._t0 += delta;
    // Idol pulse — 3s cycle, 85% to 100%
    const pulse = 0.925 + 0.075 * Math.sin(this._t0 / 1500 * Math.PI);
    this._drawIdolGlow(pulse);

    // Fireflies
    if (this._flyGfx && this._flies) {
      const g = this._flyGfx; g.clear();
      for (const f of this._flies) {
        f.x += f.vx; f.y += f.vy;
        f.phase += 0.02;
        if (f.x < 0) f.x = this._W; if (f.x > this._W) f.x = 0;
        if (f.y < this._H * 0.35) f.y = this._H * 0.85;
        if (f.y > this._H * 0.92) f.y = this._H * 0.4;
        const a = 0.4 + 0.5 * (Math.sin(f.phase) * 0.5 + 0.5);
        g.fillStyle(0xffc878, a);
        g.fillRect(f.x - 1, f.y - 1, 3, 3);
        g.fillStyle(0xffe0a0, a * 0.6);
        g.fillRect(f.x, f.y, 1, 1);
      }
    }

    // Chimney smoke
    if (this._smokeGfx && this._smokeSources) {
      const g = this._smokeGfx; g.clear();
      for (const src of this._smokeSources) {
        if (Math.random() < 0.04) {
          src.puffs.push({ x: src.x + (Math.random() - 0.5) * 2, y: src.y, life: 0 });
        }
        for (let i = src.puffs.length - 1; i >= 0; i--) {
          const p = src.puffs[i];
          p.life += delta * 0.001;
          p.y -= 0.3;
          p.x += Math.sin(p.life * 2) * 0.15;
          const a = Math.max(0, 0.35 - p.life * 0.12);
          if (a <= 0) { src.puffs.splice(i, 1); continue; }
          g.fillStyle(0x9080a0, a);
          g.fillRect(p.x - 1, p.y - 1, 2 + Math.floor(p.life), 2);
        }
      }
    }
  }
}

const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: 0x000000,
  scene: [MainMenuScene, OpeningScene, GameScene],
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
};
const game = new Phaser.Game(config);
window._game = game; // debug access
// Phaser's Scale.RESIZE handles resizing — no manual listener needed.
</script>
</body>
