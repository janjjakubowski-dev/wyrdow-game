            scene.brelHighSecondaryNotice();
          } else {
            setTimeout(() => scene.brelStraightenNotice(), 800);
          }
        });
      },
    });
  }

  // ── STEP 4b: HIGH mode — secondary notice + door knocks at Baba's
  brelHighSecondaryNotice() {
    const scene = this;
    const officer = this.officerSprite;
    if (!officer) return;
    const baba = cartToIso(BABA.cartX + 0.5, BABA.cartY + 1);
    scene.tweens.add({
      targets: officer, x: baba.x + scene.worldOffset.x, y: baba.y + scene.worldOffset.y,
      duration: 3000, ease: 'Linear',
      onUpdate: () => { officer._sortY = officer.y; },
      onComplete: () => {
        // 3 measured knocks
        let k = 0;
        const knock = () => {
          if (k >= 3) {
            // Long write, no answer
            scene.tweens.add({ targets: officer, y: officer.y - 1, duration: 200, yoyo: true, repeat: 4 });
            setTimeout(() => scene.brelStraightenNotice(), 4000);
            return;
          }
          k++;
          scene.playKnockSFX();
          scene.tweens.add({ targets: officer, x: officer.x + 1, duration: 120, yoyo: true });
          setTimeout(knock, 1100);
        };
        knock();
      },
    });
  }

  // ── STEP 5: Straighten the notice ────────────────────────────────
  brelStraightenNotice() {
    const scene = this;
    const officer = this.officerSprite;
    if (!officer || !scene.brelNoticeSprite) {
      this.brelOldManInteraction();
      return;
    }
    // Tiny precision tween — rotate by a hair, pause, write, tear, pocket
    scene.tweens.add({
      targets: scene.brelNoticeSprite, rotation: 0.02, duration: 600, yoyo: true,
      onComplete: () => {
        scene.tweens.add({ targets: officer, y: officer.y - 1, duration: 150, yoyo: true, repeat: 1 });
        setTimeout(() => scene.brelOldManInteraction(), 1500);
      },
    });
  }

  // ── STEP 6: Old man villager passes by ───────────────────────────
  brelOldManInteraction() {
    const scene = this;
    const officer = this.officerSprite;
    if (!officer) { this.brelKnockDoors(); return; }

    const oldMan = scene.spawnOldManVillager();
    // Walk old man across the idol
    const startIso = cartToIso(MAP_SIZE - 1, CENTER - 0.5);
    const endIso = cartToIso(0, CENTER + 0.5);
    oldMan.x = startIso.x + scene.worldOffset.x;
    oldMan.y = startIso.y + scene.worldOffset.y;
    scene.tweens.add({
      targets: oldMan,
      x: endIso.x + scene.worldOffset.x, y: endIso.y + scene.worldOffset.y,
      duration: 9000, ease: 'Linear',
      onUpdate: () => { oldMan._sortY = oldMan.y; },
      onComplete: () => {
        scene.tweens.add({
          targets: oldMan, alpha: 0, duration: 800,
          onComplete: () => oldMan.destroy(),
        });
      },
    });

    // Halfway: Brel turns and speaks
    setTimeout(() => {
      scene.tweens.add({ targets: officer, scaleX: -1, duration: 200 });
      scene.showColdCenteredText(
        'Good afternoon. Beautiful village.\nThe roads are very straight — someone\'s been busy.',
        5000,
        () => {
          scene.tweens.add({ targets: officer, scaleX: 1, duration: 200 });
          setTimeout(() => scene.brelKnockDoors(), 1000);
        }
      );
    }, 4000);

    // Allow optional player interaction during this beat
    scene._brelInteractable = true;
    scene._brelInteractDeadline = Date.now() + 12000;
  }

  // ── STEP 7: Brel knocks on doors ─────────────────────────────────
  brelKnockDoors() {
    const scene = this;
    const officer = this.officerSprite;
    if (!officer) { this.brelClosingWideShot(); return; }
    const mode = this._brelMode || 'neutral';
    scene._brelInteractable = false;

    const houses = [
      { x: BABA.cartX + 0.5, y: BABA.cartY + 1 },
      { x: 7, y: 9 },
      { x: 17, y: 8 },
    ];
    let h = 0;
    const visit = () => {
      if (!scene.officerSprite || h >= houses.length) {
        setTimeout(() => scene.brelClosingWideShot(), 1500);
        return;
      }
      const target = houses[h++];
      const t = cartToIso(target.x, target.y);
      scene.tweens.add({
        targets: officer, x: t.x + scene.worldOffset.x, y: t.y + scene.worldOffset.y,
        duration: 2800, ease: 'Linear',
        onUpdate: () => { officer._sortY = officer.y; },
        onComplete: () => {
          const knockCount = (mode === 'high' && h === 2) ? 5 : 3;
          let k = 0;
          const knock = () => {
            if (k >= knockCount) {
              setTimeout(visit, 800);
              return;
            }
            k++;
            scene.playKnockSFX();
            scene.tweens.add({ targets: officer, y: officer.y - 1, duration: 100, yoyo: true });
            setTimeout(knock, 900);
          };
          knock();
        },
      });
    };
    visit();
  }

  // ── Optional player interaction with Brel ────────────────────────
  tryBrelDialogue() {
    if (!this._brelInteractable || this.dialogueActive) return false;
    const officer = this.officerSprite;
    if (!officer) return false;
    // Distance check
    const px = this.player.x, py = this.player.y;
    const d = Math.hypot(px - officer.x, py - officer.y);
    if (d > 6 * TILE_W) return false;
    this._brelInteractable = false;
    const scene = this;
    const mode = this._brelMode || 'neutral';
    const extra = mode === 'high'
      ? '\n\n"And the marsh road. And the inn door. We do notice."'
      : '';
    this.openDialogue('Officer Brel', [
      'Officer Brel turns. His pen hovers.',
      '"Good afternoon. A moment of your time?"' + extra,
    ], () => {
      this.showDialogueChoices([
        { text: 'Just passing through.', onSelect: () => { adjustAttention(0, 'brel_passing'); } },
        { text: "I haven't noticed anything unusual.", onSelect: () => { adjustAttention(1, 'brel_lie'); } },
        { text: '... (say nothing)', onSelect: () => {
          adjustAttention(-1, 'brel_silence');
          // 4s pause beat
          setTimeout(() => {}, 4000);
        }},
      ]);
    });
    return true;
  }

  // ── Closing wide shot — idol opens its eyes ──────────────────────
  brelClosingWideShot() {
    const scene = this;
    const cam = this.cameras.main;
    // Zoom out wide
    scene.tweens.add({
      targets: cam, zoom: cam.zoom * 0.7, duration: 3000, ease: 'Sine.easeInOut',
    });
    setTimeout(() => {
      // Idol eyes animation
      scene.drawIdolEyes(true);
      try { sfx.play('idol_eyes'); } catch (e) {}
      scene.playLowBellTone();
      setTimeout(() => {
        scene.drawIdolEyes(false);
        setTimeout(() => scene.showAct1TitleCard(), 1500);
      }, 3000);
    }, 3000);
  }

  // ── HELPERS ──────────────────────────────────────────────────────

  startBrelTheme() {
    if (!ambientAudio.ctx) return;
    const ctx = ambientAudio.ctx;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 87; // low cold drone
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.025, now + 4);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now);
    this._brelThemeOsc = osc;
    this._brelThemeGain = g;
  }

  playKnockSFX() {
    try { sfx.play('knock_brel'); } catch (e) {}
    if (!ambientAudio.ctx) return;
    const ctx = ambientAudio.ctx;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = 90;
    g.gain.setValueAtTime(0.08, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.13);
  }

  playLowBellTone() {
    if (!ambientAudio.ctx) return;
    const ctx = ambientAudio.ctx;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 55;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.06, now + 0.4);
    g.gain.linearRampToValueAtTime(0, now + 4);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now); osc.stop(now + 4);
  }

  showColdCenteredText(text, duration, onDone) {
    const cam = this.cameras.main;
    const t = this.add.text(cam.width / 2, cam.height / 2 - 60, text, {
      fontFamily: 'monospace', fontSize: '13px', color: '#e8e4d8',
      align: 'center', stroke: '#0a0a10', strokeThickness: 2,
      lineSpacing: 4,
    }).setOrigin(0.5, 0.5).setDepth(1250).setScrollFactor(0).setAlpha(0);
    this.tweens.add({ targets: t, alpha: 1, duration: 600 });
    setTimeout(() => {
      this.tweens.add({
        targets: t, alpha: 0, duration: 600,
        onComplete: () => { t.destroy(); if (onDone) onDone(); },
      });
    }, duration);
  }

  spawnOldManVillager() {
    const c = this.add.container(0, 0);
    const g = this.add.graphics();
    // Shadow
    g.fillStyle(0x000000, 0.2); g.fillEllipse(0, 3, 12, 5);
    // Stooped legs
    g.fillStyle(0x4a3a2a, 1);
    g.fillRect(-3, -1, 2, 8); g.fillRect(1, -1, 2, 8);
    // Long brown coat
    g.fillStyle(0x5a4030, 1);
    g.fillRect(-5, -14, 11, 14);
    // Arms — one carrying a basket
    g.fillStyle(0x5a4030, 1);
    g.fillRect(-6, -12, 2, 8);
    g.fillRect(5, -12, 2, 6);
    // Basket
    g.fillStyle(0x8a6a3a, 1);
    g.fillRect(5, -6, 5, 4);
    g.lineStyle(0.5, 0x4a3020, 1); g.strokeRect(5, -6, 5, 4);
    // Hunched neck
    g.fillStyle(0xc8b890, 1); g.fillCircle(0, -17, 3.5);
    // White hair / cap
    g.fillStyle(0xe8e0d0, 1); g.fillRect(-3, -21, 6, 3);
    // Tiny eyes
    g.fillStyle(0x1a1a20, 1);
    g.fillRect(-1.5, -17, 0.8, 0.8); g.fillRect(0.8, -17, 0.8, 0.8);
    c.add(g);
    this.objectLayer.add(c);
    return c;
  }

  drawIdolEyes(open) {
    if (!this.idolEyesGfx) {
      const idolIso = cartToIso(CENTER - 0.5, CENTER + 0.5);
      this.idolEyesGfx = this.add.graphics();
      this.idolEyesGfx.x = idolIso.x + this.worldOffset.x;
      this.idolEyesGfx.y = idolIso.y + this.worldOffset.y - 28;
      this.idolEyesGfx._sortY = this.idolEyesGfx.y + 1000;
      this.objectLayer.add(this.idolEyesGfx);
    }
    const g = this.idolEyesGfx;
    g.clear();
    if (open) {
      g.fillStyle(0xffd060, 1);
      g.fillCircle(-2, 0, 1.2);
      g.fillCircle(2, 0, 1.2);
      g.fillStyle(0xfff0a0, 0.6);
      g.fillCircle(-2, 0, 2.2);
      g.fillCircle(2, 0, 2.2);
    }
  }

  // ── ACT 1 TITLE CARD — "The Unraveling" ──────────────────────────
  showAct1TitleCard() {
    if (this.act1TitleShown) return;
    this.act1TitleShown = true;
    gameState.act = 2;

    // Awakening theme — Play 3: under the title card, begins at +2s, 30%,
    // fades out with the card after the standard 4s hold + 2s fade.
    if (typeof music !== 'undefined') {
      setTimeout(() => music.playAwakening(0.30), 2000);
      setTimeout(() => music.fadeOutAwakening(2000), 2000 + 4000);
    }

    const scene = this;
    const cam = this.cameras.main;
    const w = cam.width, h = cam.height;
    const AMBER = '#ffb050';
    const AMBER_HEX = 0xffb050;

    // ── Black background, fades from black (2s) ──────────────────
    const bg = this.add.graphics().setDepth(1300).setScrollFactor(0);
    bg.fillStyle(0x000000, 1);
    bg.fillRect(0, 0, w, h);
    bg.setAlpha(1); // already black from previous scene

    // Faint static dust — single-pixel particles at 10% opacity
    const dust = this.add.graphics().setDepth(1301).setScrollFactor(0).setAlpha(0);
    for (let i = 0; i < 220; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      dust.fillStyle(0xffffff, 0.10);
      dust.fillRect(x, y, 1, 1);
    }
    this.tweens.add({ targets: dust, alpha: 1, duration: 2000, ease: 'Sine.easeOut' });

    // ── Decorative folk-art rule (top) ───────────────────────────
    const ruleW = w * 0.6;
    const drawRule = (yPos) => {
      const r = scene.add.graphics().setDepth(1302).setScrollFactor(0).setAlpha(0);
      const x0 = (w - ruleW) / 2;
      // 1px line
      r.fillStyle(AMBER_HEX, 0.9);
      r.fillRect(x0, yPos, ruleW, 1);
      // small geometric diamonds spaced evenly
      const diamonds = 9;
      const step = ruleW / (diamonds - 1);
      for (let i = 0; i < diamonds; i++) {
        const dx = x0 + i * step;
        // 4-pixel diamond
        r.fillRect(dx,     yPos - 2, 1, 1);
        r.fillRect(dx - 1, yPos - 1, 3, 1);
        r.fillRect(dx - 2, yPos,     5, 1);
        r.fillRect(dx - 1, yPos + 1, 3, 1);
        r.fillRect(dx,     yPos + 2, 1, 1);
      }
      return r;
    };

    const titleY = h / 2 - 20;
    const subtitleY = titleY + 80;
    const topRuleY = titleY - 60;
    const botRuleY = subtitleY + 40;

    const topRule = drawRule(topRuleY);
    this.tweens.add({ targets: topRule, alpha: 1, duration: 1000, ease: 'Sine.easeOut' });

    // ── Title — letter by letter fade ────────────────────────────
    const titleStr = 'The Unraveling';
    const letterObjs = [];
    // Build all letters first to measure total width
    let totalWidth = 0;
    const tmpStyle = {
      fontFamily: 'Georgia, serif', fontSize: '72px', fontStyle: 'italic',
      color: AMBER, stroke: '#000000', strokeThickness: 2,
    };
    // Use a single text to measure
    const measure = this.add.text(0, 0, titleStr, tmpStyle).setVisible(false);
    totalWidth = measure.width;
    measure.destroy();
    let cursor = (w - totalWidth) / 2;
    for (let i = 0; i < titleStr.length; i++) {
      const ch = titleStr[i];
      const t = this.add.text(cursor, titleY, ch, tmpStyle)
        .setOrigin(0, 0.5).setDepth(1303).setScrollFactor(0).setAlpha(0);
      letterObjs.push(t);
      cursor += t.width;
    }

    setTimeout(() => {
      // ~2s total across all letters
      const perLetter = 2000 / titleStr.length;
      letterObjs.forEach((t, i) => {
        scene.tweens.add({
          targets: t, alpha: 1, duration: 600, delay: i * perLetter, ease: 'Sine.easeOut',
        });
      });
    }, 1000);

    // ── Subtitle — appears 1.5s after title completes ────────────
    const titleCompleteAt = 1000 + 2000 + 600; // delay + spread + fade
    const subtitleAt = titleCompleteAt + 1500;
    const subtitle = this.add.text(w / 2, subtitleY, 'Act I', {
      fontFamily: 'Georgia, serif', fontSize: '24px', fontStyle: 'italic',
      color: AMBER,
    }).setOrigin(0.5, 0.5).setDepth(1303).setScrollFactor(0).setAlpha(0);
    setTimeout(() => {
      scene.tweens.add({ targets: subtitle, alpha: 0.6, duration: 1000, ease: 'Sine.easeOut' });
    }, subtitleAt);

    // ── Bottom rule — mirror of top, fades in with subtitle ──────
    const botRule = drawRule(botRuleY);
    setTimeout(() => {
      scene.tweens.add({ targets: botRule, alpha: 1, duration: 1000, ease: 'Sine.easeOut' });
    }, subtitleAt);

    // ── Audio: theme_awakening 2s into the card, very quiet ──────
    setTimeout(() => {
      try {
        if (ambientAudio.startAwakeningAmbience) {
          ambientAudio.startAwakeningAmbience();
        }
        if (typeof masterGain !== 'undefined' && masterGain && ambientAudio.ctx) {
          masterGain.gain.linearRampToValueAtTime(0.08, ambientAudio.ctx.currentTime + 2);
        }
      } catch (e) {}
    }, 2000);

    // ── Hold the complete card 4s after subtitle finishes ───────
    const subtitleDoneAt = subtitleAt + 1000;
    const holdEndAt = subtitleDoneAt + 4000;
    setTimeout(() => {
      const all = [dust, topRule, botRule, subtitle, ...letterObjs];
      scene.tweens.add({ targets: all, alpha: 0, duration: 2000, ease: 'Sine.easeIn' });
      // Audio fade with the card
      try {
        if (typeof masterGain !== 'undefined' && masterGain && ambientAudio.ctx) {
          masterGain.gain.linearRampToValueAtTime(0, ambientAudio.ctx.currentTime + 2);
        }
      } catch (e) {}
      setTimeout(() => {
        // Return player to game world at the village exit
        const exit = cartToIso(CENTER - 0.5, MAP_SIZE - 1);
        scene.playerCartX = CENTER - 0.5;
        scene.playerCartY = MAP_SIZE - 1;
        if (scene.player) {
          scene.player.x = exit.x + scene.worldOffset.x;
          scene.player.y = exit.y + scene.worldOffset.y;
        }
        // Cleanup card layer
        bg.destroy(); dust.destroy(); topRule.destroy(); botRule.destroy();
        subtitle.destroy();
        letterObjs.forEach(t => t.destroy());
        // Restore master gain for normal play
        try {
          if (typeof masterGain !== 'undefined' && masterGain && ambientAudio.ctx) {
            masterGain.gain.linearRampToValueAtTime(1, ambientAudio.ctx.currentTime + 1.5);
          }
        } catch (e) {}
      }, 2100);
    }, holdEndAt);
  }

  // ── ATMOSPHERE ────────────────────────────────────────────────────
  drawAtmosphere() {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    const cx = w / 2, cy = h / 2;

    // Full-screen dusk sky gradient — bruised purple-blue at the very
    // top fading to warm ochre at the horizon. Covers the entire canvas
    // so there is never a black corner; the world feels like it
    // continues beyond the iso playfield.
    const sky = this.add.graphics();
    sky.setDepth(-10); sky.setScrollFactor(0);
    const skyBands = 40;
    for (let i = 0; i < skyBands; i++) {
      const t = i / (skyBands - 1);
      const bandH = Math.ceil(h / skyBands) + 1;
      // Top: deep bruised purple-blue.  Bottom: warm ochre horizon.
      const r = Math.round(0x18 + (0x6e - 0x18) * t);
      const g = Math.round(0x16 + (0x4a - 0x16) * t);
      const b = Math.round(0x2e + (0x22 - 0x2e) * t);
      sky.fillStyle((r << 16) | (g << 8) | b, 1);
      sky.fillRect(0, i * bandH, w, bandH);
    }

    // Sparse pixel stars in the upper third of the sky.
    const stars = this.add.graphics();
    stars.setDepth(-9); stars.setScrollFactor(0);
    for (let i = 0; i < 60; i++) {
      const sxs = Math.floor(Math.random() * w);
      const sys = Math.floor(Math.random() * (h * 0.45));
      const bright = Math.random();
      if (bright > 0.85) {
        stars.fillStyle(0xfff0d0, 0.95);
        stars.fillRect(sxs, sys, 2, 2);
      } else {
        stars.fillStyle(0xd8d0b0, 0.55 + Math.random() * 0.4);
        stars.fillRect(sxs, sys, 1, 1);
      }
    }

    // Soft warm radial firelight from the idol — radius bumped 40%,
    // brightness boosted so the idol pulls the eye immediately.
    const ix = (this.idolScreenX != null) ? this.idolScreenX : cx;
    const iy = (this.idolScreenY != null) ? this.idolScreenY : cy;
    const warm = this.add.graphics();
    warm.setDepth(998).setScrollFactor(0);
    const warmRings = [
      { col: 0xffcc66, a: 0.10,  rw: w * 0.42, rh: h * 0.42 },
      { col: 0xffaa44, a: 0.08,  rw: w * 0.63, rh: h * 0.59 },
      { col: 0xff9933, a: 0.05,  rw: w * 0.84, rh: h * 0.77 },
    ];
    warmRings.forEach(r => {
      warm.fillStyle(r.col, r.a);
      warm.fillEllipse(ix, iy, r.rw, r.rh);
    });

    // Light vignette — pushes the corners 20% darker without
    // touching the warm idol bloom.
    const fog = this.add.graphics();
    fog.setDepth(999); fog.setScrollFactor(0);
    const rings = 14;
    for (let i = rings; i >= 1; i--) {
      const t = i / rings;
      const rw = w * (0.5 + t * 0.7);
      const rh = h * (0.5 + t * 0.7);
      fog.fillStyle(0x0a0a14, (t * t * 0.6) / rings);
      fog.fillEllipse(ix, iy, rw, rh);
    }
  }

  // ── DEPTH SORTING ─────────────────────────────────────────────────
  sortObjects() {
    this.objectLayer.sort('y', (a, b) => {
      const ay = a._sortY !== undefined ? a._sortY : a.y;
      const by = b._sortY !== undefined ? b._sortY : b.y;
      return ay - by;
    });
  }

  // ── GAME LOOP ─────────────────────────────────────────────────────
  update(time, delta) {
    this.animTime = time;
    this.updateCreatures(time, delta);
    this.updateAwakeningHooks(delta);
    this.updateMarkerGlows(time);
    this.updateObservation(delta);
    this.updateRituals(time, delta);
    this.updateBackgroundVillagers(time, delta);
    this.updateMarkProximity();
    this.updateGameClock(delta);

    // Animate grass sway
    this.updateGrass(time);

    // Animate dust
    this.updateDust();

    // Baba idle animation — gentle sway
    if (this.babaSprite) {
      this.babaSprite.y = this.babaBaseY + Math.sin(time * 0.001) * 1;
      this.babaSprite._sortY = this.babaSprite.y;
    }

    // Zuzka idle — 2-frame breathing loop (~2.4s period). She is almost
    // completely still; frame 1 shifts weight 1px and brightens the jar.
    if (this.zuzkaSprite) {
      const targetFrame = (Math.floor(time / 1200) % 2);
      if (targetFrame !== this.zuzkaFrame) {
        this.zuzkaFrame = targetFrame;
        this.drawZuzkaFrame(targetFrame);
      }
      this.zuzkaSprite.y = this.zuzkaBaseY + Math.sin(time * 0.0008 + 1.5) * 0.6;
      this.zuzkaSprite._sortY = this.zuzkaSprite.y;
    }

    // ── Curtain sway in windows ─────────────────────────────────────
    if (!this._curtainGfx) {
      this._curtainGfx = this.add.graphics();
      this._curtainGfx.setDepth(994);
    }
    this._curtainGfx.clear();
    this.windowPositions.forEach((win, idx) => {
      const sway = Math.sin(time * 0.0012 + idx * 1.7) * 1.5;
      // Left curtain
      this._curtainGfx.lineStyle(1, PAL.deepRed, 0.3);
      this._curtainGfx.beginPath();
      this._curtainGfx.moveTo(win.x - win.w/2 + 1, win.y - win.h/2 + 1);
      this._curtainGfx.lineTo(win.x - win.w/2 + 1 + sway * 0.5, win.y + win.h/2 - 1);
      this._curtainGfx.strokePath();
      // Right curtain
      this._curtainGfx.beginPath();
      this._curtainGfx.moveTo(win.x + win.w/2 - 1, win.y - win.h/2 + 1);
      this._curtainGfx.lineTo(win.x + win.w/2 - 1 - sway * 0.5, win.y + win.h/2 - 1);
      this._curtainGfx.strokePath();
    });

    // ── Idol eyes — closed normally, open after 8s of player standing still nearby ──
    if (this.idolScreenX !== undefined) {
      const idolDx = this.playerCartX - (CENTER - 0.5);
      const idolDy = this.playerCartY - (CENTER - 0.5);
      const idolDist = Math.sqrt(idolDx * idolDx + idolDy * idolDy);
      const nearIdol = idolDist < 4;

      if (nearIdol && !this.isWalking) {
        this.playerIdleTime += delta;
      } else {
        this.playerIdleTime = 0;
      }

      // Eyes open after 8 seconds idle near idol
      const targetOpen = (this.playerIdleTime > 8000 && nearIdol) ? 1 : 0;
      this.idolEyesOpen += (targetOpen - this.idolEyesOpen) * 0.02; // slow transition

      if (this.idolEyesOpen > 0.05) {
        if (!this._idolEyeGfx) {
          this._idolEyeGfx = this.add.graphics();
          this._idolEyeGfx.setDepth(993);
        }
        this._idolEyeGfx.clear();
        const ex = this.idolScreenX;
        const ey = this.idolScreenY - 65;
        const openAmt = this.idolEyesOpen;
        // Eerie glowing eyes
        this._idolEyeGfx.fillStyle(PAL.eerieGlow, 0.7 * openAmt);
        this._idolEyeGfx.fillCircle(ex - 3, ey, 2.5 * openAmt);
        this._idolEyeGfx.fillCircle(ex + 3, ey, 2.5 * openAmt);
        // Bright center
        this._idolEyeGfx.fillStyle(PAL.shrineGlow, 0.9 * openAmt);
        this._idolEyeGfx.fillCircle(ex - 3, ey, 1.2 * openAmt);
        this._idolEyeGfx.fillCircle(ex + 3, ey, 1.2 * openAmt);
        // Glow halo
        this._idolEyeGfx.fillStyle(PAL.eerieGlow, 0.15 * openAmt);
        this._idolEyeGfx.fillCircle(ex, ey, 12 * openAmt);
      } else if (this._idolEyeGfx) {
        this._idolEyeGfx.clear();
      }
    }

    // ── Baba door bells — decay swing ───────────────────────────────
    if (this.babaBellSwing > 0.01) {
      this.babaBellSwing *= 0.96; // decay
      if (!this._bellGfx) {
        this._bellGfx = this.add.graphics();
        this._bellGfx.setDepth(994);
      }
      this._bellGfx.clear();
      // Baba's house is houses[5]
      const bh = houses[5];
      const bcx = bh.x + bh.w / 2, bcy = bh.y + bh.h / 2;
      const biso = cartToIso(bcx, bcy);
      const bsx = biso.x + this.worldOffset.x;
      const bsy = biso.y + this.worldOffset.y;
      const bbw = bh.w * TILE_W * 0.38;
      const doorX = bsx - 3 + bbw/8;
      const doorY = bsy - 14;
      const swing = Math.sin(time * 0.01) * this.babaBellSwing;
      // Two small copper bells
      for (const bx of [-2, 5]) {
        this._bellGfx.lineStyle(1, PAL.copper, 0.6);
        this._bellGfx.beginPath();
        this._bellGfx.moveTo(doorX + bx + 2, doorY - 1);
        this._bellGfx.lineTo(doorX + bx + 2 + swing, doorY + 4);
        this._bellGfx.strokePath();
        this._bellGfx.fillStyle(PAL.copperLight, 0.7);
        this._bellGfx.fillCircle(doorX + bx + 2 + swing, doorY + 5, 2);
      }
    } else if (this._bellGfx) {
      this._bellGfx.clear();
    }

    // Block all input during visions
    if (this.visionActive) {
      this.updateCamera();
      return;
    }

    if (this.dialogueActive) {
      // Choice selection via number keys (1, 2, 3)
      if (this.choiceActive) {
        this.choiceKeys.forEach((key, i) => {
          if (Phaser.Input.Keyboard.JustDown(key)) this.selectChoice(i);
        });
      } else if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
        this.advanceDialogue();
      }
      this.updateCamera();
      return;
    }

    this.handleMovement(delta);
    this.updatePlayerPosition();
    this.updateEzra(time, delta);
    this.updateMarta(time, delta);
    this.updateDziadek(time, delta);
    this.updateInnSmoke(time, delta);
    this.checkZuzkaAutoApproach();
    this.checkBrelTrigger();
    this.handleInteraction();
    this.updateCamera();
    this.sortObjects();
  }

  handleMovement(delta) {
    let dx = 0, dy = 0;
    if (this.cursors.up.isDown)    { dx -= 1; dy -= 1; }
    if (this.cursors.down.isDown)  { dx += 1; dy += 1; }
    if (this.cursors.left.isDown)  { dx -= 1; dy += 1; }
    if (this.cursors.right.isDown) { dx += 1; dy -= 1; }

    this.isWalking = (dx !== 0 || dy !== 0);

    if (!this.isWalking) {
      // Idle — reset bob smoothly
      this.walkBob *= 0.9;
      // Idle look-around: trigger after 5 seconds of stillness
      this.idleTimer = (this.idleTimer || 0) + delta;
      if (this.idleTimer > 5000 && !this.idleAnimActive) {
        this.startIdleLookAround();
        this.idleTimer = 0; // wait another 5s before next loop
      }
      this.drawPlayerFrame(this.walkBob, this.playerFacing);
      return;
    }
    // Movement cancels idle state
    this.idleTimer = 0;
    this.idleAnimActive = false;
    this.idleHeadOffset = 0;

    // Determine facing direction
    if (dx > 0 && dy < 0) this.playerFacing = 'ne';
    else if (dx > 0 && dy > 0) this.playerFacing = 'se';
    else if (dx < 0 && dy > 0) this.playerFacing = 'sw';
    else if (dx < 0 && dy < 0) this.playerFacing = 'nw';
    else if (dx > 0) this.playerFacing = 'se';
    else if (dx < 0) this.playerFacing = 'nw';
    else if (dy > 0) this.playerFacing = 'se';
    else if (dy < 0) this.playerFacing = 'nw';

    const len = Math.sqrt(dx * dx + dy * dy);
    dx /= len; dy /= len;
    const speed = this.moveSpeed * (delta / 16);
    const newX = this.playerCartX + dx * speed;
    const newY = this.playerCartY + dy * speed;
    const tileX = Math.floor(newX), tileY = Math.floor(newY);

    if (tileX >= 0 && tileX < MAP_SIZE && tileY >= 0 && tileY < MAP_SIZE) {
      if (map[tileY][tileX] !== 3) {
        this.playerCartX = newX; this.playerCartY = newY;
      } else {
        const sx2 = this.playerCartX + dx * speed;
        const sxT = Math.floor(sx2);
        if (sxT >= 0 && sxT < MAP_SIZE && map[Math.floor(this.playerCartY)][sxT] !== 3)
          this.playerCartX = sx2;
        const sy2 = this.playerCartY + dy * speed;
        const syT = Math.floor(sy2);
        if (syT >= 0 && syT < MAP_SIZE && map[syT][Math.floor(this.playerCartX)] !== 3)
          this.playerCartY = sy2;
      }
    }
    this.playerCartX = Phaser.Math.Clamp(this.playerCartX, 0.5, MAP_SIZE - 0.5);
    this.playerCartY = Phaser.Math.Clamp(this.playerCartY, 0.5, MAP_SIZE - 0.5);

    // Walk animation
    this.walkBob += delta * 0.005;
    this.drawPlayerFrame(this.walkBob, this.playerFacing);

    // Footstep dust (throttled)
    if (Math.random() < 0.3) this.spawnFootDust();
  }

  updatePlayerPosition() {
    const iso = cartToIso(this.playerCartX, this.playerCartY);
    this.playerSprite.x = iso.x + this.worldOffset.x + (this.playerFxOffsetX || 0);
    this.playerSprite.y = iso.y + this.worldOffset.y + (this.playerFxOffsetY || 0);
    this.playerSprite._sortY = this.playerSprite.y;
  }

  // ── NPC INTERACTION (state-aware) ──────────────────────────────────
  // Selects the correct dialogue branch based on gameState,
  // then fires a callback when the conversation ends to update state.
  handleInteraction() {
    // Check Baba proximity
    const bdx = this.playerCartX - BABA.cartX;
    const bdy = this.playerCartY - BABA.cartY;
    const babaDist = Math.sqrt(bdx * bdx + bdy * bdy);

    // Check Zuzka proximity
    const zdx = this.playerCartX - ZUZKA.cartX;
    const zdy = this.playerCartY - ZUZKA.cartY;
    const zuzkaDist = Math.sqrt(zdx * zdx + zdy * zdy);

    if (babaDist <= BABA.interactRadius) {
      const iso = cartToIso(BABA.cartX, BABA.cartY);
      this.interactPrompt.setText('[E] Talk to Baba Elżbieta');
      this.interactPrompt.setPosition(
        iso.x + this.worldOffset.x,
        iso.y + this.worldOffset.y - 48
      );
      this.interactPrompt.setVisible(true);

      if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
        this.interactPrompt.setVisible(false);
        const branch = this.getBabaDialogueBranch();
        this.babaBellSwing = 6; // trigger copper bell sway
        this.openDialogue('Baba Elżbieta', branch.lines, branch.onClose, 'ornate');
      }
    } else if (zuzkaDist <= ZUZKA.interactRadius) {
      // Fallback: player reached Zuzka before her auto-approach completed
      if (this._zuzkaApproaching || this._zuzkaApproachQueued) {
        this.cancelZuzkaApproach();
      }
      const iso = cartToIso(ZUZKA.cartX, ZUZKA.cartY);
      this.interactPrompt.setText('[E] Talk to Zuzka');
      this.interactPrompt.setPosition(
        iso.x + this.worldOffset.x,
        iso.y + this.worldOffset.y - 48
      );
      this.interactPrompt.setVisible(true);

      if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
        this.interactPrompt.setVisible(false);
        const branch = this.getZuzkaDialogueBranch();
        this.openDialogue('Zuzka', branch.lines, branch.onClose, 'simple');
      }
    } else if (this.tryEzraInteraction()) {
      // handled
    } else if (!this.handleMarkerInteraction()) {
      this.interactPrompt.setVisible(false);
    }
  }

  // ── ZUZKA: auto-approach the player on their first village entry ──
  checkZuzkaAutoApproach() {
    if (gameState.firstVillageEntry) return;
    if (this._zuzkaApproaching || this._zuzkaApproachQueued) return;
    if (!this.zuzkaSprite || this.dialogueActive) return;

    // Trigger threshold: player has crossed inward — within 8 tiles of
    // the idol but not yet inside Zuzka's interact radius.
    const px = this.playerCartX, py = this.playerCartY;
    const distIdol = Math.hypot(px - ZUZKA.cartX, py - ZUZKA.cartY);
    if (distIdol > 8 || distIdol < ZUZKA.interactRadius + 0.2) return;

    this._zuzkaApproachQueued = true;
    this.triggerZuzkaApproach();
  }

  triggerZuzkaApproach() {
    if (this._zuzkaApproaching) return;
    this._zuzkaApproaching = true;

    // Target: a point 2 tiles toward the idol from the player's current
    // position — i.e. she stops 2 tiles in front of where the player is now.
    const px = this.playerCartX, py = this.playerCartY;
    const vx = ZUZKA.cartX - px, vy = ZUZKA.cartY - py;
    const len = Math.max(0.0001, Math.hypot(vx, vy));
    const stopDist = 2.0;
    const tgtCart = {
      x: px + (vx / len) * stopDist,
      y: py + (vy / len) * stopDist,
    };
    const tgtIso = cartToIso(tgtCart.x, tgtCart.y);
    const tx = tgtIso.x + this.worldOffset.x;
    const ty = tgtIso.y + this.worldOffset.y;

    // Remember her base anchor so we can restore the idle bob afterwards.
    this._zuzkaApproachOrigin = { x: this.zuzkaSprite.x, y: this.zuzkaSprite.y };

    this._zuzkaApproachTween = this.tweens.add({
      targets: this.zuzkaSprite,
      x: tx,
      y: ty,
      duration: 2000,
      ease: 'Sine.easeInOut',
      onUpdate: () => {
        if (this.zuzkaSprite) {
          this.zuzkaSprite._sortY = this.zuzkaSprite.y;
          this.zuzkaBaseY = this.zuzkaSprite.y;
        }
      },
      onComplete: () => {
        if (!this._zuzkaApproaching) return;
        this.openDialogue('Zuzka', ZUZKA_DIALOGUE.firstEncounter, () => {
          gameState.zuzkaMetOnce = true; try { saveGame(); } catch (e) {}
          gameState.firstVillageEntry = true;
          this._zuzkaApproaching = false;
          // Send her quietly back to the idol base
          if (this.zuzkaSprite && this._zuzkaApproachOrigin) {
            this.tweens.add({
              targets: this.zuzkaSprite,
              x: this._zuzkaApproachOrigin.x,
              y: this._zuzkaApproachOrigin.y,
              duration: 1600,
              ease: 'Sine.easeInOut',
              onUpdate: () => {
                if (this.zuzkaSprite) {
                  this.zuzkaSprite._sortY = this.zuzkaSprite.y;
                  this.zuzkaBaseY = this.zuzkaSprite.y;
                }
              },
            });
          }
        }, 'simple');
      },
    });
  }

  // Called by handleInteraction when the player reaches Zuzka before her
  // approach completes. Cancels the tween and lets the normal E flow run.
  cancelZuzkaApproach() {
    if (!this._zuzkaApproaching && !this._zuzkaApproachQueued) return;
    if (this._zuzkaApproachTween) {
      this._zuzkaApproachTween.stop();
      this._zuzkaApproachTween = null;
    }
    this._zuzkaApproaching = false;
    this._zuzkaApproachQueued = false;
    // Snap her back to the idol base so the player's E press talks to her there
    if (this.zuzkaSprite && this._zuzkaApproachOrigin) {
      this.zuzkaSprite.x = this._zuzkaApproachOrigin.x;
      this.zuzkaSprite.y = this._zuzkaApproachOrigin.y;
      this.zuzkaSprite._sortY = this.zuzkaSprite.y;
      this.zuzkaBaseY = this.zuzkaSprite.y;
    }
  }

  tryEzraInteraction() {
    const dx = this.playerCartX - EZRA.cartX;
    const dy = this.playerCartY - EZRA.cartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > EZRA.interactRadius) return false;

    const iso = cartToIso(EZRA.cartX, EZRA.cartY);
    // If holding the codex fragment, offer the special "show" prompt
    const holdingCodex = gameState.inventory.includes('cure_codex_fragment_1');
    const promptLabel = (holdingCodex && !gameState.ezraState.codexShown)
      ? '[E] Show Ezra the Codex page'
      : '[E] Talk to Ezra';
    this.interactPrompt.setText(promptLabel);
    this.interactPrompt.setPosition(
      iso.x + this.worldOffset.x,
      iso.y + this.worldOffset.y - 44
    );
    this.interactPrompt.setVisible(true);

    if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
      this.interactPrompt.setVisible(false);
      const branch = this.getEzraDialogueBranch();
      this.openDialogue('Ezra', branch.lines, branch.onClose, 'simple');
    }
    return true;
  }

  getEzraDialogueBranch() {
    const ez = gameState.ezraState;
    const metOnce = ez.sceneShown !== null;
    // Scene 8 — only if Brel scene has played and not yet acknowledged
    if (this.officerScenePlayed && ez.sceneShown !== '8') {
      return {
        lines: EZRA_DIALOGUE.scene8_postBrel,
        onClose: () => { ez.sceneShown = '8'; },
      };
    }
    // Scene 7 — showing the Codex (one-shot)
    if (gameState.inventory.includes('cure_codex_fragment_1') && !ez.codexShown) {
      return {
        lines: EZRA_DIALOGUE.scene7_showCodex,
        onClose: () => {
          ez.codexShown = true;
          ez.sceneShown = '7';
          this.showCodexToEzra(); // +1 attention
        },
      };
    }
    // Scene 5 — after fragment received (returning visit, not showing)
    if (gameState.questComplete && gameState.inventory.includes('cure_codex_fragment_1')) {
      return { lines: EZRA_DIALOGUE.scene5, onClose: () => { ez.sceneShown = '5'; } };
    }
    // Scene 4 — all knots placed
    if (gameState.knotsPlaced >= 5) {
      return { lines: EZRA_DIALOGUE.scene4, onClose: () => { ez.sceneShown = '4'; } };
    }
    // Scene 3 — mid-quest, knots 2-3
    if (gameState.knotsPlaced >= 2 && gameState.knotsPlaced <= 3) {
      return { lines: EZRA_DIALOGUE.scene3, onClose: () => { ez.sceneShown = '3'; } };
    }
    // Scene 2 — quest started, no knots placed
    if (gameState.knotsGiven && gameState.knotsPlaced === 0) {
      return { lines: EZRA_DIALOGUE.scene2, onClose: () => { ez.sceneShown = '2'; } };
    }
    // Scene 1B — first meeting AND perimeter walked first
    if (!metOnce && gameState.ritualState.perimeter_walked) {
      return {
        lines: EZRA_DIALOGUE.scene1b,
        onClose: () => {
          ez.sceneShown = '1b';
          if (!ez.copperWireGiven) {
            ez.copperWireGiven = true;
            gameState.inventory.push('copper_wire');
            this.showItemNotification('Received: Copper Wire');
          }
        },
      };
    }
    // Scene 1 — first meeting
    if (!metOnce) {
      return {
        lines: EZRA_DIALOGUE.scene1,
        onClose: () => { ez.sceneShown = '1'; },
      };
    }
    // Default repeat — quiet
    return {
      lines: [
        ">Ezra nods at you without looking up.",
        "Mm. Take your time.",
      ],
      onClose: null,
    };
  }

  // ── DIALOGUE BRANCH SELECTOR ──────────────────────────────────────
  // Returns { lines: [...], onClose: function } based on gameState.
  getBabaDialogueBranch() {

    // ── Act 2+: repeat visits ───────────────────────────────────────
    if (gameState.act >= 2) {
      if (!gameState.hasBurntBraid) {
        return {
          lines: BABA_DIALOGUE.act2_firstReturn,
          onClose: () => {
            gameState.hasBurntBraid = true;
            gameState.inventory.push('burnt_braid');
            this.showItemNotification('Received: Burnt Braid Bracelet');
          },
        };
      }
      return {
        lines: BABA_DIALOGUE.act2_repeat,
        onClose: null,
      };
    }

    // ── Act 1: Quest complete — all 5 knots placed ──────────────────
    if (gameState.knotsPlaced >= 5 && !gameState.questComplete) {
      return {
        lines: BABA_DIALOGUE.questComplete,
        onClose: () => {
          gameState.questComplete = true;
          gameState.hasGlassCharm = true;
          gameState.inventory.push('cure_codex_fragment_1');
          gameState.inventory.push('glass_charm');
          try { sfx.play('codex_reveal'); } catch (e) {}
          gameState.codexFragmentCollected = true; try { saveGame(); } catch (e) {}
          this.showItemNotification('Received: Cure Codex Fragment · Glass Charm');
          // Advance to Act 2 after this conversation
          gameState.act = 2;
          // ── REGENCY: passive copper-wire bonus + lock in Brel mode ──
          if (gameState.inventory.includes('copper_wire')) {
            adjustAttention(-2, 'copper_wire_passive');
          }
          const a = gameState.regencyAttention;
          if (a <= -4)      gameState.brelMode = 'low';
          else if (a >= 4)  gameState.brelMode = 'high';
          else              gameState.brelMode = 'neutral';
          if (gameState.brelMode === 'low')      gameState.brelArrivalDelay = 90000;
          else if (gameState.brelMode === 'high') gameState.brelArrivalDelay = -11000;
          else                                        gameState.brelArrivalDelay = 0;
        },
      };
    }

    // ── Act 1: Quest complete already, but still in Act 1 ───────────
    if (gameState.questComplete) {
      return {
        lines: BABA_DIALOGUE.act2_repeat,
        onClose: null,
      };
    }

    // ── Act 1: First meeting — never spoken before ──────────────────
    if (!gameState.babaMetOnce) {
      return {
        lines: BABA_DIALOGUE.firstMeeting,
        onClose: () => {
          gameState.babaMetOnce = true; try { saveGame(); } catch (e) {}
          gameState.knotsGiven = true;
          gameState.inventory.push('thread_knots');
          this.showItemNotification('Received: Five Thread Knots');
          // ── Activate the crossroads quest ──
          gameState.questActive = true;
          if (typeof music !== 'undefined') music.startCrossroadsIfIdle();
          this.showThreadKnotHUD();
        },
      };
    }

    // ── Act 1: Mid-quest check-ins ──────────────────────────────────
    if (gameState.knotsPlaced <= 1) {
      return { lines: BABA_DIALOGUE.checkIn_early, onClose: null };
    }
    if (gameState.knotsPlaced <= 3) {
      return { lines: BABA_DIALOGUE.checkIn_mid, onClose: null };
    }
    // 4 knots placed
    return { lines: BABA_DIALOGUE.checkIn_almost, onClose: null };
  }

  // ── ZUZKA DIALOGUE BRANCH SELECTOR ────────────────────────────────
  // Returns { lines: [...], onClose: function } based on gameState.
  getZuzkaDialogueBranch() {

    // Farewell — after quest is complete and hasn't been done yet
    if (gameState.questComplete && !gameState.zuzkaFarewellDone) {
      return {
        lines: ZUZKA_DIALOGUE.farewell,
        _fireflySfx: (() => { try { setTimeout(() => sfx.play('firefly_jar'), 800); } catch (e) {} return true; })(),
        onClose: () => {
          gameState.zuzkaFarewellDone = true;
          gameState.hasFirefly = true;
          gameState.inventory.push('firefly');
          this.showItemNotification('Received: Sleeping Firefly');
        },
      };
    }

    // Post-farewell — quest done, no more unique dialogue
    if (gameState.zuzkaFarewellDone) {
      return {
        lines: ZUZKA_DIALOGUE.quest_done,
        onClose: null,
      };
    }

    // During quest — knots being placed
    if (gameState.knotsGiven && gameState.knotsPlaced >= 3) {
      return { lines: ZUZKA_DIALOGUE.quest_done, onClose: null };
    }
    if (gameState.knotsGiven && gameState.knotsPlaced >= 1) {
      return { lines: ZUZKA_DIALOGUE.quest_mid, onClose: null };
    }
    if (gameState.knotsGiven) {
      return { lines: ZUZKA_DIALOGUE.quest_early, onClose: null };
    }

    // Lingering before visiting Baba — met Zuzka but not Baba yet
    if (gameState.zuzkaMetOnce && !gameState.babaMetOnce) {
      return {
        lines: ZUZKA_DIALOGUE.beforeBaba,
        onClose: () => { gameState.zuzkaSecondTalk = true; },
      };
    }

    // First encounter — never spoken to Zuzka
    if (!gameState.zuzkaMetOnce) {
      return {
        lines: ZUZKA_DIALOGUE.firstEncounter,
        onClose: () => { gameState.zuzkaMetOnce = true; try { saveGame(); } catch (e) {} },
      };
    }

    // Default fallback
    return { lines: ZUZKA_DIALOGUE.beforeBaba, onClose: null };
  }

  // ── ITEM NOTIFICATION ─────────────────────────────────────────────
  // Shows a brief message at the top of the screen when items are given.
  showItemNotification(text) {
    const cam = this.cameras.main;
    const note = this.add.text(cam.width / 2, 110, text, {
      fontFamily: 'Georgia, serif',
      fontSize: '14px',
      color: '#ccaa55',
      stroke: '#0e0e14',
      strokeThickness: 3,
      align: 'center',
    }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(1003).setAlpha(0);

    // Fade in, hold, fade out
    this.tweens.add({
      targets: note,
      alpha: { from: 0, to: 1 },
      y: { from: 120, to: 105 },
      duration: 500,
      ease: 'Sine.easeOut',
      hold: 2500,
      yoyo: true,
      onComplete: () => note.destroy(),
    });
  }

  // ── OBSERVATION MECHANIC ──────────────────────────────────────────
  // Hold O for 1.5s while still: subtle zoom + golden vignette + a faint
  // breath sound. If standing within an observation zone, that zone's
  // detail line fades in bottom-left for 6s. Each zone fires once per
  // session. Releasing O or moving cancels immediately.
  setupObservationZones() {
    this.observationZones = [
      { id: 'idol',       x: CENTER - 0.5,    y: CENTER - 0.5, r: 3,
        text: "The idol's eyes are closed. You are almost certain they were open a moment ago." },
      { id: 'inn_window', x: 6,               y: 9,            r: 2,
        text: "One of the boards on the window is newer than the others. It was replaced from the inside." },
      { id: 'inn_door',   x: 7,               y: 9,            r: 1.5,
        text: "The offering bowl is empty. There are no animal tracks around it. Whatever takes the food doesn't touch the ground." },
      { id: 'baba_door',  x: BABA.cartX,      y: BABA.cartY,   r: 2,
        text: "The copper bells haven't moved. But they're warm — warmer than the air around them." },
      { id: 'dead_tree',  x: MAP_SIZE - 4,    y: 3,            r: 2,
        text: "The roots go deeper than they should for a dead tree. The earth around them is slightly disturbed — recently, and carefully." },
      { id: 'zuzka',      x: ZUZKA.cartX,     y: ZUZKA.cartY,  r: 2,
        text: "One firefly in the jar is slightly brighter than the others. It pulses in the same rhythm as the mark on your hand." },
      { id: 'marsh_edge', x: CENTER - 0.5,    y: MAP_SIZE - 3, r: 2,
        text: "The grass at the road's edge is flattened in a direction that leads away from the village. Not by wind — by someone moving quickly." },
      { id: 'ezra',          x: EZRA.cartX,       y: EZRA.cartY,     r: 1.6,
        text: "His hands never shake. He has been doing this for a very long time. The needle moves with the certainty of someone who has never once doubted that mending things is worthwhile." },
      { id: 'ezra_boots',    x: EZRA.cartX - 0.3, y: EZRA.cartY + 0.2, r: 1.2,
        text: "The boots have no owner's name. The sole is worn in a pattern you recognise — the same uneven gait as the figure in the third vision. The one who almost turned around.\n\nA small copper wire is wound around the left heel. Recently. The leather around it is still uncracked." },
      { id: 'ezra_workbench', x: EZRA.cartX - 1.2, y: EZRA.cartY,     r: 1.4,
        text: "A small drawer is slightly open. Inside: a folded piece of paper, very old, a single word in careful handwriting. The word is a name. You can't quite read it from here." },
      { id: 'ezra_stool_wire', x: EZRA.cartX,     y: EZRA.cartY + 0.4, r: 1.0,
        text: "The space where the copper wire sat in his apron pocket has a small impression — it's been there a long time. Eleven years. You can see where the wire's shape wore into the fabric.",
        requires: () => gameState.ezraState.copperWireGiven },
    ];
    // observed zones tracked on gameState.observedZones (array)
    this._obsHoldTime = 0;
    this._obsActive = false;
    this._obsPlayerLastX = 0;
    this._obsPlayerLastY = 0;

    const cam = this.cameras.main;
    // Golden vignette overlay (camera-locked, hidden by default)
    this._obsVignette = this.add.graphics();
    this._obsVignette.setScrollFactor(0).setDepth(1080).setAlpha(0);
    const W = cam.width, H = cam.height;
    // Soft warm edge — concentric semitransparent rings hugging the edges
    for (let i = 0; i < 14; i++) {
      const a = 0.025 + i * 0.012;
      const inset = i * 12;
      this._obsVignette.lineStyle(14, 0xc89a48, a);
      this._obsVignette.strokeRect(inset, inset, W - inset * 2, H - inset * 2);
    }

    // Detail text — bottom-left, italic, no frame
    this._obsText = this.add.text(28, cam.height - 60, '', {
      fontFamily: 'Georgia, serif', fontSize: '14px',
      color: '#d8c89a', fontStyle: 'italic',
      stroke: '#0a0810', strokeThickness: 2,
      wordWrap: { width: cam.width * 0.48 },
    }).setScrollFactor(0).setDepth(1081).setAlpha(0);
    this._obsTextHoldTimer = 0;
  }

  // ── FOLKLORE RITUAL SYSTEM ────────────────────────────────────────
  // Five optional rituals. None are explained, none block progress, none
  // produce a notification when completed — only the world's reaction.
  setupRituals() {
    // ── Ritual 1: Perimeter Walk ──
    // 8 boundary waypoints around the map. The player must pass within
    // 1.6 tiles of each at least once, in any order.
    const M = MAP_SIZE - 1;
    this._perimeterWaypoints = [
      { x: 1, y: 1, hit: false }, { x: M / 2, y: 1, hit: false }, { x: M - 1, y: 1, hit: false },
      { x: M - 1, y: M / 2, hit: false }, { x: M - 1, y: M - 1, hit: false },
      { x: M / 2, y: M - 1, hit: false }, { x: 1, y: M - 1, hit: false },
      { x: 1, y: M / 2, hit: false },
    ];

    // ── Ritual 2: Domovoi Offering ──
    // Door zone position (matches inn doorstep observation zone)
    this._domovoiZone = { x: 7, y: 9, r: 1.5 };
    this._domovoiSequence = []; // sequence of items left at the door

    // World items to find: bread (market) and salt (near a house door).
    // Stored as collectible spawns; player picks them up by walking onto.
    this._worldItems = [
      { id: 'bread', x: 11, y: 16, taken: false, color: 0xc8a468 },
      { id: 'salt',  x: 16, y: 8,  taken: false, color: 0xeeeae0 },
      // Memory Fragment under the south signpost — only visible after Domovoi Scene 2
      { id: 'memory_fragment',
        x: CENTER - 0.5, y: MAP_SIZE - 2.2,
        taken: false, color: 0xa8884a,
        requires: () => gameState.domovoiState.sceneShown === 2 || gameState.domovoiState.sceneShown >= 2,
        onPickup: () => {
          gameState.domovoiState.signpostFragmentFound = true;
          gameState.memoryFragments = gameState.memoryFragments || [];
          if (!gameState.memoryFragments.includes('signpost'))
            gameState.memoryFragments.push('signpost');
          this.showItemNotification('Picked up: Memory Fragment (signpost)');
          // Full-screen Regency memorandum
          this.showRegencyDocument(
            'INTERNAL MEMORANDUM\nOffice of Cultural Hygiene — Research Division\nRE: Project RIVKA — Status Update\nDate: [REDACTED]',
            'The research team has been located. Asset retrieval is underway. ' +
            'The primary researcher has dispersed the documentation — confirmed ' +
            '5 fragments, locations unknown. Priority: prevent assembly.\n\n' +
            'Note: The methodology is more viable than initial assessments ' +
            'suggested. Under no circumstances should this reach the general ' +
            'population. The implications for Regency healthcare infrastructure ' +
            'are significant.\n\n' +
            'Authorised for destruction after reading.\n' +
            'This copy was not destroyed.'
          );
        },
      },
    ];

    // ── Ritual 3: Noon Silence ──
    // Internal day clock — full cycle every 20 real minutes (1,200,000 ms)
    this._dayClockMs = 6 * 60 * 1000; // start at "morning" (~6h in)
    this._dayLengthMs = 20 * 60 * 1000;
    this._noonStartMs = 11.5 * 60 * 1000;
    this._noonEndMs   = 12.5 * 60 * 1000;
    this._noonStillTimer = 0;
    this._noonChimePlayed = false;

    // ── Ritual 4: Stillness of Nocnica ──
    this._nocnicaZones = [
      { x: CENTER - 0.5, y: MAP_SIZE - 2, r: 2.2 }, // southern marsh edge
      { x: MAP_SIZE - 2, y: CENTER - 0.5, r: 2.2 }, // eastern forest edge
    ];
    this._nocnicaTimer = 0;
    this._nocnicaTriggered = false;

    // ── Ritual 5: Wisp Choice ──
    this._wispsSpawned = false;
    this._wispWatchTimer = 0;
    this._wispsSplit = false;
    this._wispsSeen = false;

    // Track previous player position to detect movement deltas
    this._lastInputT = 0;
  }

  // Internal: time-of-day in hours [0, 24)
  getHourOfDay() {
    const t = (this._dayClockMs % this._dayLengthMs) / this._dayLengthMs;
    return t * 24;
  }
  isNoon() {
    const ms = this._dayClockMs % this._dayLengthMs;
    return ms >= this._noonStartMs && ms <= this._noonEndMs;
  }
  isAfterDusk() {
    const h = this.getHourOfDay();
    return h >= 19 || h < 5;
  }

  updateRituals(time, delta) {
    if (!this._perimeterWaypoints) return;

    // Advance the internal day clock
    this._dayClockMs = (this._dayClockMs + delta) % this._dayLengthMs;

    // Detect input/movement this frame
    const moving = this.cursors && (this.cursors.up.isDown || this.cursors.down.isDown
      || this.cursors.left.isDown || this.cursors.right.isDown);
    const anyKey = moving || (this.interactKey && this.interactKey.isDown)
      || (this.observeKey && this.observeKey.isDown);

    const px = this.playerCartX, py = this.playerCartY;

    // ── Shrine glow proximity SFX (once per approach) ──
    if (!this._shrineSfxState) this._shrineSfxState = shrines.map(() => false);
    for (let si = 0; si < shrines.length; si++) {
      const d = Math.hypot(px - shrines[si].x, py - shrines[si].y);
      if (d <= 2.2 && !this._shrineSfxState[si]) {
        this._shrineSfxState[si] = true;
        try { sfx.play('shrine_glow'); } catch (e) {}
      } else if (d > 4) {
        this._shrineSfxState[si] = false;
      }
    }

    // ── Footstep SFX — crossfade by tile type ──
    {
      const tx = Math.max(0, Math.min(MAP_SIZE - 1, Math.round(px)));
      const ty = Math.max(0, Math.min(MAP_SIZE - 1, Math.round(py)));
      const tile = (map[ty] && map[ty][tx]) || 0;
      const onRoad = (tile === 1 || tile === 2 || tile === 5);
      const canWalk = moving && !this.dialogueActive && !this.visionActive && !this._paused;
      if (canWalk) {
        if (onRoad) {
          try { sfx.loop('footsteps_dirt', 1, 250); sfx.stopLoop('footsteps_grass', 250); } catch (e) {}
        } else {
          try { sfx.loop('footsteps_grass', 1, 250); sfx.stopLoop('footsteps_dirt', 250); } catch (e) {}
        }
      } else {
        try { sfx.stopLoop('footsteps_dirt', 200); sfx.stopLoop('footsteps_grass', 200); } catch (e) {}
      }
    }

    // ── Ritual 1: Perimeter waypoints ──
    if (!gameState.ritualState.perimeter_walked) {
      let allHit = true;
      for (const w of this._perimeterWaypoints) {
        if (!w.hit) {
          if (Math.hypot(px - w.x, py - w.y) <= 1.8) w.hit = true;
        }
        if (!w.hit) allHit = false;
      }
      if (allHit) {
        gameState.ritualState.perimeter_walked = true;
        try { sfx.play('perimeter_complete'); } catch (e) {}
        if (!gameState.regencyFired.perimeter_walked) {
          gameState.regencyFired.perimeter_walked = true;
          adjustAttention(-1, 'perimeter_walked');
        }
      }
    }

    // ── Crossroads linger (visible mark, no NPCs nearby) ──
    if (!gameState.regencyFired.crossroads_linger) {
      const dCenter = Math.hypot(px - (CENTER - 0.5), py - (CENTER - 0.5));
      const dBaba = Math.hypot(px - BABA.cartX, py - BABA.cartY);
      const dZuzka = (typeof ZUZKA !== 'undefined')
        ? Math.hypot(px - ZUZKA.cartX, py - ZUZKA.cartY) : 999;
      const npcNear = dBaba < 5 || dZuzka < 5;
      if (dCenter < 1.8 && !anyKey && !npcNear) {
        this._crossroadsLingerMs = (this._crossroadsLingerMs || 0) + delta;
        if (this._crossroadsLingerMs >= 30000) {
          gameState.regencyFired.crossroads_linger = true;
          adjustAttention(+1, 'crossroads_linger');
        }
      } else {
        this._crossroadsLingerMs = 0;
      }
    }

    // ── World item pickups (bread + salt + memory fragment) ──
    for (const it of this._worldItems) {
      if (it.taken) continue;
      if (it.requires && !it.requires()) continue;
      if (Math.hypot(px - it.x, py - it.y) <= 0.7) {
        it.taken = true;
        gameState.inventory.push(it.id);
        if (it.onPickup) it.onPickup();
        else this.showItemNotification('Picked up: ' + it.id);
      }
    }
    // Draw world item sparkles (lazy graphics)
    if (!this._worldItemGfx) {
      this._worldItemGfx = this.add.graphics();
      this._worldItemGfx.setDepth(480);
    }
    this._worldItemGfx.clear();
    for (const it of this._worldItems) {
      if (it.taken) continue;
      if (it.requires && !it.requires()) continue;
      const iso = cartToIso(it.x, it.y);
      const sx = iso.x + this.worldOffset.x;
      const sy = iso.y + this.worldOffset.y;
      this._worldItemGfx.fillStyle(0x000000, 0.35);
      this._worldItemGfx.fillEllipse(sx, sy + 3, 8, 2);
      this._worldItemGfx.fillStyle(it.color, 1);
      this._worldItemGfx.fillRect(sx - 3, sy - 2, 6, 4);
      this._worldItemGfx.fillStyle(0xffffff, 0.4);
      this._worldItemGfx.fillRect(sx - 2, sy - 2, 4, 1);
    }

    // ── Ritual 2: Domovoi offering interaction ──
    if (Math.hypot(px - this._domovoiZone.x, py - this._domovoiZone.y) <= this._domovoiZone.r
        && !this.dialogueActive && !this.visionActive
        && !this._domovoiSelectorOpen && !this._domovoiSpeaking) {
      const offerable = ['bread', 'salt', 'glass_charm', 'firefly', 'memory_fragment'];
      const heldOfferable = gameState.inventory.find(i => offerable.includes(i));
      // Post-fragment trigger: standing at the doorstep with the signpost fragment
      if (gameState.domovoiState.signpostFragmentFound &&
          gameState.domovoiState.sceneShown !== 3 && !this.officerScenePlayed) {
        const iso = cartToIso(this._domovoiZone.x, this._domovoiZone.y);
        this.interactPrompt.setText('[E] Approach the chimney');
        this.interactPrompt.setPosition(iso.x + this.worldOffset.x, iso.y + this.worldOffset.y - 36);
        this.interactPrompt.setVisible(true);
        if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
          this.playDomovoiScene(3);
        }
      } else if (this.officerScenePlayed && gameState.domovoiState.sceneShown !== 4) {
        // Scene 4 — after Brel arrives
        const iso = cartToIso(this._domovoiZone.x, this._domovoiZone.y);
        this.interactPrompt.setText('[E] Wait by the chimney');
        this.interactPrompt.setPosition(iso.x + this.worldOffset.x, iso.y + this.worldOffset.y - 36);
        this.interactPrompt.setVisible(true);
        if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
          // 5-second cold wait then Scene 4
          this._domovoiSpeaking = true;
          setTimeout(() => this.playDomovoiScene(4), 5000);
        }
      } else if (heldOfferable) {
        const iso = cartToIso(this._domovoiZone.x, this._domovoiZone.y);
        this.interactPrompt.setText('[E] Leave an offering');
        this.interactPrompt.setPosition(iso.x + this.worldOffset.x, iso.y + this.worldOffset.y - 36);
        this.interactPrompt.setVisible(true);
        if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
          this.openDomovoiOfferingSelector();
        }
      }
    }

    // ── Ritual 3: Noon silence ──
    if (this.isNoon()) {
      if (!this._noonChimePlayed) {
        this._noonChimePlayed = true;
        this.applyNoonLight(true);
        this.playNoonChime();
      }
      if (!anyKey) {
        this._noonStillTimer += delta;
        if (this._noonStillTimer >= 60000 && !gameState.ritualState.noon_silence_kept) {
          gameState.ritualState.noon_silence_kept = true;
        }
      } else {
        if (this._noonChimePlayed && !gameState.regencyFired.noon_silence_failed) {
          gameState.regencyFired.noon_silence_failed = true;
          adjustAttention(+1, 'noon_silence_failed');
        }
        this._noonStillTimer = 0;
      }
    } else {
      if (this._noonChimePlayed) {
        this._noonChimePlayed = false;
        this.applyNoonLight(false);
      }
      this._noonStillTimer = 0;
    }

    // ── Ritual 4: Stillness of Nocnica (peripheral encounter) ──
    // After dusk, near the marsh or forest edge, if the player stands
    // perfectly still she begins to appear at the EDGE of the screen
    // — never centered, never approached. Looking away from her zone
    // (turning toward her) erases her. Holding still for ~8s lets her
    // fully manifest and bestow a quiet night-blessing.
    if (!gameState.ritualState.nocnica_found && this.isAfterDusk
        && this.isAfterDusk()) {
      let nearestZone = null;
      let nearestD = 99;
      for (const z of this._nocnicaZones) {
        const d = Math.hypot(px - z.x, py - z.y);
        if (d < nearestD) { nearestD = d; nearestZone = z; }
      }
      const inZone = nearestZone && nearestD <= nearestZone.r;
      if (inZone && !anyKey) {
        this._nocnicaTimer += delta;
        // Phase 1: 1.5s of stillness — peripheral hint appears
        if (this._nocnicaTimer >= 1500 && !this._nocnicaPeripheralActive) {
          this.spawnNocnicaPeripheral(nearestZone);
        }
        // Phase 2: 8s of stillness — full manifestation + blessing
        if (this._nocnicaTimer >= 8000 && !this._nocnicaTriggered) {
          this._nocnicaTriggered = true;
          gameState.ritualState.nocnica_found = true;
          if (!gameState.regencyFired.nocnica_found) {
            gameState.regencyFired.nocnica_found = true;
            adjustAttention(-3, 'nocnica_found');
          }
          this.hideNocnicaPeripheral();
          this.triggerNocnicaAppearance();
        }
      } else {
        if (this._nocnicaTimer > 0 && this._nocnicaPeripheralActive) {
          this.hideNocnicaPeripheral();
        }
        this._nocnicaTimer = 0;
      }
      // Keep her tracking the screen edge while present
      if (this._nocnicaPeripheralActive) {
        this.updateNocnicaPeripheral(delta);
      }
    }

    // ── Ritual 5: Wisp choice ──
    // Spawn wisps on first dusk visit to the marsh road, lazily.
    if (!this._wispsSpawned && this.isAfterDusk()
        && Math.hypot(px - (CENTER - 0.5), py - (MAP_SIZE - 4)) < 4) {
      this._wispsSpawned = true;
      this.spawnWisps();
    }
    if (this._wispsSpawned && !this._wispsSplit) {
      // Player must be looking at them (within 5 tiles) to "watch"
      const wd = Math.hypot(px - (CENTER - 0.5), py - (MAP_SIZE - 4));
      if (wd < 5) {
        this._wispWatchTimer += delta;
        if (this._wispWatchTimer >= 10000) {
          this._wispsSplit = true;
          this.splitWisps();
        }
      }
    }

    // ── FIX 3 — Comfort wisp vision ─────────────────────────────────
    // Once the player has chosen comfort, standing within 2 tiles of the
    // hidden grove shrine for 10s triggers a wordless 15s warm vision.
    if (gameState.ritualState.wisp_choice === 'comfort' && !this._comfortVisionPlayed) {
      const grove = { x: 18, y: 18 }; // hidden grove shrine = right wisp anchor
      const gd = Math.hypot(px - grove.x, py - grove.y);
      if (gd <= 2) {
        this._comfortVisionDwell = (this._comfortVisionDwell || 0) + delta;
        if (this._comfortVisionDwell >= 10000) {
          this._comfortVisionPlayed = true;
          this.playComfortVision();
        }
      } else {
        this._comfortVisionDwell = 0;
      }
    }
  }

  // ── COMFORT WISP VISION ─────────────────────────────────────────────
  // Wordless warm 15s sequence: amber vignette, golden petals, distant
  // crowd ambience. Closes with theme_awakening at 35% for 20s.
  playComfortVision() {
    const cam = this.cameras.main;
    const W = cam.width, H = cam.height;

    // Lock state + tag the choice (already 'comfort', but be explicit)
    gameState.ritualState.wisp_choice = 'comfort';
    // Regency Attention: 0 (no adjustAttention call)

    // ── Warm amber vignette (radial-ish, 35% at edges) ──────────────
    const vignette = this.add.graphics().setScrollFactor(0).setDepth(2000).setAlpha(0);
    // Build a soft amber frame: darker rings near the edge
    const amber = 0xffc878;
    const ring = (inset, alpha) => {
      vignette.lineStyle(60 - inset, amber, alpha);
      vignette.strokeRect(inset, inset, W - inset * 2, H - inset * 2);
    };
    ring(0,  0.35);
    ring(20, 0.22);
    ring(40, 0.12);
    this.tweens.add({ targets: vignette, alpha: 1, duration: 2000, ease: 'Sine.easeOut' });

    // ── Slight global warm wash on the world camera ─────────────────
    const warmWash = this.add.rectangle(0, 0, W, H, 0xffd9a0, 0)
      .setOrigin(0, 0).setScrollFactor(0).setDepth(1999);
    this.tweens.add({ targets: warmWash, alpha: 0.10, duration: 2000 });

    // ── Golden petal / mote particles (8–12) ────────────────────────
    const petals = [];
    const petalCount = 10;
    for (let i = 0; i < petalCount; i++) {
      const px0 = Math.random() * W;
      const py0 = Math.random() * H;
      const p = this.add.graphics().setScrollFactor(0).setDepth(2001).setAlpha(0);
      // tiny golden mote with halo
      p.fillStyle(0xfff0b0, 0.35); p.fillCircle(0, 0, 4);
      p.fillStyle(0xffe070, 0.85); p.fillCircle(0, 0, 1.6);
      p.x = px0; p.y = py0;
      p._vx = 0.20 + Math.random() * 0.25; // slow rightward drift
      p._vy = 0.10 + Math.random() * 0.15; // slow downward drift
      petals.push(p);
      this.tweens.add({ targets: p, alpha: 0.95, duration: 1600, delay: i * 80 });
    }

    // Drive particle drift via a timer event
    let driftTime = 0;
    const driftEvt = this.time.addEvent({
      delay: 30, loop: true, callback: () => {
        driftTime += 30;
        for (const p of petals) {
          p.x += p._vx;
          p.y += p._vy + Math.sin((driftTime + p.x) * 0.004) * 0.15;
          if (p.x > W + 10) p.x = -10;
          if (p.y > H + 10) p.y = -10;
        }
      }
    });

    // ── Distant warm crowd ambience (Web Audio, very quiet) ─────────
    let crowdNodes = null;
    try {
      const ctx = (window.ambientAudio && window.ambientAudio.ctx) ||
                  new (window.AudioContext || window.webkitAudioContext)();
      const master = ctx.createGain(); master.gain.value = 0;
      master.connect(ctx.destination);
      // Pink-ish noise = distant chatter bed
      const bufLen = ctx.sampleRate * 2;
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      let lastV = 0;
      for (let i = 0; i < bufLen; i++) {
        const w = (Math.random() * 2 - 1) * 0.5;
        lastV = (lastV + w * 0.04) * 0.985;
        data[i] = lastV;
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buf; noise.loop = true;
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 700;
      noise.connect(lp); lp.connect(master);
      // Hurdy-gurdy-ish drone: detuned sines
      const droneA = ctx.createOscillator(); droneA.type = 'sine'; droneA.frequency.value = 196;
      const droneB = ctx.createOscillator(); droneB.type = 'sine'; droneB.frequency.value = 294;
      const droneG = ctx.createGain(); droneG.gain.value = 0.018;
      droneA.connect(droneG); droneB.connect(droneG); droneG.connect(master);
      noise.start(); droneA.start(); droneB.start();
      master.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 2);
      master.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 10);
      master.gain.linearRampToValueAtTime(0.0,  ctx.currentTime + 15);
      crowdNodes = { noise, droneA, droneB, ctx };
    } catch (e) { /* audio failed silently */ }

    // ── Wisp dim+fade over 3s, starting at 12s ──────────────────────
    this.time.delayedCall(12000, () => {
      if (this._wispGfx) {
        this.tweens.add({
          targets: this._wispGfx, alpha: 0,
          duration: 3000, ease: 'Sine.easeOut',
        });
      }
    });

    // ── At 10s: begin softening warmth ──────────────────────────────
    this.time.delayedCall(10000, () => {
      this.tweens.add({ targets: vignette, alpha: 0, duration: 5000 });
      this.tweens.add({ targets: warmWash, alpha: 0, duration: 5000 });
      for (const p of petals) {
        p._vx *= 0.4; p._vy *= 0.4;
        this.tweens.add({ targets: p, alpha: 0, duration: 5000 });
      }
    });

    // ── At 15s: cleanup + start awakening theme tail ────────────────
    this.time.delayedCall(15000, () => {
      driftEvt.remove();
      vignette.destroy(); warmWash.destroy();
      petals.forEach(p => p.destroy());
      try {
        if (crowdNodes) {
          crowdNodes.noise.stop();
          crowdNodes.droneA.stop();
          crowdNodes.droneB.stop();
        }
      } catch (e) {}
      // theme_awakening at 35% for 20s, then fade
      if (typeof music !== 'undefined' && music.playAwakening) {
        music.playAwakening(0.35, 4000);
        // Fade out after 20s
        this.time.delayedCall(20000, () => {
          if (music.sounds && music.sounds.theme_awakening) {
            music._tweenTo && music._tweenTo('theme_awakening', 0, 4000);
          }
        });
      }
    });
  }

  // ── Domovoi: place an item from the inventory at the doorstep ─────
  placeDomovoiOffering(itemId) {
    gameState.ritualState.domovoi_offering_attempted = true;
    const idx = gameState.inventory.indexOf(itemId);
    if (idx >= 0) gameState.inventory.splice(idx, 1);
    this._domovoiSequence.push(itemId);
    this.interactPrompt.setVisible(false);

    const personals = ['glass_charm', 'firefly', 'memory_fragment'];
    const wrongFirstAttempt = () => {
      // Return the item
      gameState.inventory.push(itemId);
      if (!gameState.regencyFired.domovoi_first_wrong) {
        gameState.regencyFired.domovoi_first_wrong = true;
        adjustAttention(+1, 'domovoi_first_wrong');
      }
      this.playDomovoiScene(1);
      this._domovoiSequence = [];
    };

    if (this._domovoiSequence.length === 1) {
      if (itemId !== 'bread') { wrongFirstAttempt(); return; }
      // Bread accepted — wait for salt next
    } else if (this._domovoiSequence.length === 2) {
      if (itemId !== 'salt') {
        // Return all
        gameState.inventory.push(this._domovoiSequence[0]);
        wrongFirstAttempt(); return;
      }
    } else if (this._domovoiSequence.length >= 3) {
      const [a, b, c] = this._domovoiSequence;
      if (a === 'bread' && b === 'salt' && personals.includes(c)) {
        gameState.ritualState.domovoi_offering_correct = true;
        if (!gameState.regencyFired.domovoi_correct) {
          gameState.regencyFired.domovoi_correct = true;
          adjustAttention(-2, 'domovoi_correct');
        }
        this.showItemNotification('A door creaks open from the inside.');
        this.playDomovoiScene(2);
      } else {
        // Personal item not valid — return it
        gameState.inventory.push(itemId);
        this.speakDomovoi([
          '"That isn\'t real. I said something real. Not something convenient. Something you\'d miss."',
        ]);
        // Reset to [bread, salt]
        this._domovoiSequence = ['bread', 'salt'];
      }
    }
  }

  // ── DOMOVOI: inventory selector ──────────────────────────────
  // Opens a small centered list of offerable items in inventory.
  // Player picks one with up/down arrows + Enter (or 1..5 keys).
  openDomovoiOfferingSelector() {
    if (this._domovoiSelectorOpen) return;
    const offerable = ['bread', 'salt', 'glass_charm', 'firefly', 'memory_fragment'];
    const items = gameState.inventory.filter(i => offerable.includes(i));
    if (items.length === 0) return;
    this._domovoiSelectorOpen = true;
    this.interactPrompt.setVisible(false);
    const cam = this.cameras.main;
    const w = cam.width, h = cam.height;
    const panelW = 280, panelH = 40 + items.length * 22;
    const px = (w - panelW) / 2, py = (h - panelH) / 2;
    const labels = {
      bread: 'Bread (a small loaf)',
      salt:  'Salt (a cloth bag)',
      glass_charm:    'Glass Charm — Baba\'s gift',
      firefly:        'Firefly Jar — Zuzka\'s gift',
      memory_fragment:'Memory Fragment',
    };
    const bg = this.add.graphics().setScrollFactor(0).setDepth(2000);
    bg.fillStyle(0x000000, 0.75); bg.fillRect(0, 0, w, h);
    bg.fillStyle(0x1c1812, 1); bg.fillRect(px, py, panelW, panelH);
    bg.lineStyle(1, 0x6a4828, 1); bg.strokeRect(px, py, panelW, panelH);
    const title = this.add.text(px + panelW / 2, py + 14, 'Leave at the doorstep…', {
      fontFamily: 'Georgia, serif', fontSize: '13px', color: '#c8a868',
    }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(2001);
    const itemTexts = items.map((id, i) => {
      return this.add.text(px + 16, py + 36 + i * 22, '  ' + (i + 1) + '. ' + (labels[id] || id), {
        fontFamily: 'Georgia, serif', fontSize: '13px', color: '#e0d4a8',
      }).setScrollFactor(0).setDepth(2001);
    });
    let sel = 0;
    const redraw = () => {
      itemTexts.forEach((t, i) => {
        t.setText((i === sel ? '▸ ' : '  ') + (i + 1) + '. ' + (labels[items[i]] || items[i]));
        t.setColor(i === sel ? '#ffd080' : '#e0d4a8');
      });
    };
    redraw();
    const keyHandler = (ev) => {
      if (ev.key === 'ArrowDown') { sel = (sel + 1) % items.length; redraw(); }
      else if (ev.key === 'ArrowUp') { sel = (sel - 1 + items.length) % items.length; redraw(); }
      else if (ev.key === 'Enter' || ev.key === ' ' || ev.key.toLowerCase() === 'e') {
        cleanup(); this.placeDomovoiOffering(items[sel]);
      } else if (ev.key === 'Escape') {
        cleanup();
      } else if (/^[1-9]$/.test(ev.key)) {
        const k = parseInt(ev.key, 10) - 1;
        if (k < items.length) { cleanup(); this.placeDomovoiOffering(items[k]); }
      }
    };
    const cleanup = () => {
      this.input.keyboard.off('keydown', keyHandler);
      bg.destroy(); title.destroy(); itemTexts.forEach(t => t.destroy());
      this._domovoiSelectorOpen = false;
    };
    this.input.keyboard.on('keydown', keyHandler);
  }

  // ── DOMOVOI: chimney-voice line delivery ─────────────────────
  // Centered italic text, no dialogue box. Each line: fade in 1s,
  // hold 4s, fade out, with a faint chimney crackle SFX underneath.
  speakDomovoi(lines, onDone) {
    if (!lines || !lines.length) { if (onDone) onDone(); return; }
    this._domovoiSpeaking = true;
    try { sfx.loop('domovoi_crackle', 1, 400); } catch (e) {}
    const scene = this;
    const cam = this.cameras.main;
    let i = 0;
    const playLine = () => {
      if (i >= lines.length) {
        this._domovoiSpeaking = false;
        try { sfx.stopLoop('domovoi_crackle', 600); } catch (e) {}
        if (onDone) onDone();
        return;
      }
      const lineText = lines[i++];
      // Empty string = pause beat
      if (!lineText) { setTimeout(playLine, 1500); return; }
      const t = scene.add.text(cam.width / 2, cam.height / 2, lineText, {
        fontFamily: 'Georgia, serif', fontSize: '18px', fontStyle: 'italic',
        color: '#d8c098', stroke: '#0a0a10', strokeThickness: 2,
        align: 'center', wordWrap: { width: cam.width * 0.7 }, lineSpacing: 6,
      }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(1300).setAlpha(0);
      // Chimney crackle SFX
      scene.playChimneyCrackle();
      scene.tweens.add({ targets: t, alpha: 1, duration: 1000, ease: 'Sine.easeOut' });
      setTimeout(() => {
        scene.tweens.add({
          targets: t, alpha: 0, duration: 800,
          onComplete: () => { t.destroy(); playLine(); },
        });
      }, 5000);
    };
    playLine();
  }

  playChimneyCrackle() {
    if (!ambientAudio.ctx) return;
    const ctx = ambientAudio.ctx;
    const now = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.6, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.4 * Math.exp(-i / (d.length * 0.7));
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass';
    f.frequency.value = 240; f.Q.value = 6;
    const g = ctx.createGain(); g.gain.value = 0.04;
    src.connect(f); f.connect(g); g.connect(ctx.destination);
    src.start(now);
  }

  playNoonChime() {
    if (!ambientAudio.ctx) return;
    const ctx = ambientAudio.ctx;
    const now = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.025, now + 0.15);
    g.gain.linearRampToValueAtTime(0, now + 2.5);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + 2.6);
  }
