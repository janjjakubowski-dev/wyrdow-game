    this.objectLayer.add(container);
    this.dziadekSprite = container;
    this.dziadekGfx = g;
    this.dziadekBreathPhase = 0;
    container.setVisible(false);
    if (tree) tree.setVisible(false);
    this.dziadekTreeGfx = tree;

    this.drawDziadekFrame(0);
  }

  drawDziadekFrame(breath) {
    const g = this.dziadekGfx;
    g.clear();
    // Shadow
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(0, 4, 16, 5);
    // Hunched legs in patched trousers
    g.fillStyle(0x2a2418, 1);
    g.fillRect(-4, -2, 3, 8);
    g.fillRect(1, -2, 3, 8);
    // Boot tips poking out
    g.fillStyle(0x14100a, 1);
    g.fillRect(-4, 5, 3, 2);
    g.fillRect(1, 5, 3, 2);
    // Long woollen coat — ash grey, near the floor
    g.fillStyle(0x4a4438, 1);
    g.fillRect(-7, -16, 14, 16);
    // Coat hem darker
    g.fillStyle(0x2e2820, 1);
    g.fillRect(-7, -1, 14, 1);
    // Belt
    g.fillStyle(0x6a4828, 1);
    g.fillRect(-7, -8, 14, 1);
    // Hunched shoulders — top of coat narrower
    g.fillStyle(0x4a4438, 1);
    g.fillRect(-6, -19, 12, 4);
    // Arms — one holding lantern out, one tucked
    g.fillStyle(0x4a4438, 1);
    g.fillRect(-7, -16, 2, 10);
    g.fillRect(5,  -16 + breath, 2, 8);
    // Hands
    g.fillStyle(0xb89878, 1);
    g.fillRect(-7, -7, 2, 2);
    g.fillRect(5,  -9 + breath, 2, 2);
    // Lantern hanging from his right hand
    const ly = -6 + breath;
    g.fillStyle(0x6a4828, 1);
    g.fillRect(7, ly,     5, 1);   // top loop
    g.fillStyle(0x3a2818, 1);
    g.fillRect(7, ly + 1, 5, 6);   // frame
    g.fillStyle(0xffd890, 0.95);
    g.fillRect(8, ly + 2, 3, 4);   // candle glow
    // Soft outward halo
    g.fillStyle(0xffd890, 0.18);
    g.fillCircle(9, ly + 4, 6);
    g.fillStyle(0xffd890, 0.08);
    g.fillCircle(9, ly + 4, 12);
    // Head — slightly bowed
    g.fillStyle(0xb89878, 1);
    g.fillCircle(0, -22, 4.5);
    // Long white hair / beard wreathing the face
    g.fillStyle(0xe8e2d0, 1);
    g.fillRect(-5, -25, 10, 3);
    g.fillRect(-5, -22, 1, 6);
    g.fillRect(4,  -22, 1, 6);
    g.fillRect(-3, -19, 6, 4);   // beard
    // Eyes — almost closed, two thin lines
    g.fillStyle(0x2a1810, 1);
    g.fillRect(-3, -22, 2, 1);
    g.fillRect(1, -22, 2, 1);
    // A tear-like glint under the right eye
    g.fillStyle(0xc8d8e8, 0.5);
    g.fillRect(2, -21, 1, 1);
  }

  updateDziadek(time, delta) {
    if (!this.dziadekSprite) return;
    // Reveal once the player has chosen the "truth" wisp branch
    const ds = gameState.dziadekState;
    if (!ds.revealed && gameState.ritualState
        && gameState.ritualState.wisp_choice === 'truth') {
      ds.revealed = true;
      this.dziadekSprite.setVisible(true);
      this.dziadekSprite.setAlpha(0);
      if (this.dziadekTreeGfx) {
        this.dziadekTreeGfx.setVisible(true);
        this.dziadekTreeGfx.setAlpha(0);
        this.tweens.add({ targets: this.dziadekTreeGfx, alpha: 1, duration: 1800 });
      }
      this.tweens.add({ targets: this.dziadekSprite, alpha: 1, duration: 1800 });
    }
    if (!ds.revealed) return;

    // Slow lantern-arm breath
    this.dziadekBreathPhase += delta * 0.0018;
    const breath = Math.floor((Math.sin(this.dziadekBreathPhase) * 0.5 + 0.5) * 2);
    if (this._dziadekLastBreath !== breath) {
      this._dziadekLastBreath = breath;
      this.drawDziadekFrame(breath);
    }

    // Proximity prompt + interaction
    const px = this.playerCartX, py = this.playerCartY;
    const d = Math.hypot(px - DZIADEK.cartX, py - DZIADEK.cartY);
    if (d <= DZIADEK.interactRadius && !this.dialogueActive && !this.visionActive
        && !this._domovoiSelectorOpen && !this._domovoiSpeaking
        && !this._martaSpeaking && !this._dziadekSpeaking) {
      const iso = cartToIso(DZIADEK.cartX, DZIADEK.cartY);
      const sx = iso.x + this.worldOffset.x;
      const sy = iso.y + this.worldOffset.y - 44;
      this.interactPrompt.setText('[E] Speak with the old man');
      this.interactPrompt.setPosition(sx - this.interactPrompt.width / 2, sy);
      this.interactPrompt.setVisible(true);
      if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
        this.interactPrompt.setVisible(false);
        this.beginDziadekInteraction();
      }
    }
  }

  beginDziadekInteraction() {
    const ds = gameState.dziadekState;
    const lines = [];
    if (ds.sceneShown === 0) {
      ds.sceneShown = 1;
      lines.push(
        "(He doesn't look up. The lantern doesn't flicker.)",
        "So the lights brought you the long way. Good. The short way is for forgetting.",
        "I'm Józef. Once I taught children to read in this village. Then the Regency taught them to forget what they had read.",
        "I have one page left of a book that doesn't exist. It is half-burnt and entirely true.",
        "Come back when your hand stops trembling. I won't be hard to find — I am the only thing here that hasn't moved in nine years."
      );
    } else if (ds.sceneShown === 1 && !ds.pageGiven) {
      ds.sceneShown = 2;
      ds.pageGiven = true;
      gameState.inventory.push('codex_page_burnt');
      lines.push(
        "Steadier. Good.",
        "Take this. Don't read it where there are walls — walls in Wyrdów have been taught to remember faces.",
        "(He pulls a folded square of brittle paper from his coat. The edge is charcoal.)",
        "It names a thing the Regency renamed. The old name still works. The new name does not.",
        "If the Wellness Officer asks you what you carry, tell him: a recipe for tea. He will write it down and forget it within the hour."
      );
      this.showItemNotification('Picked up: Burnt Codex Page');
      if (!gameState.regencyFired.codex_page_received) {
        gameState.regencyFired.codex_page_received = true;
        if (typeof adjustAttention === 'function') adjustAttention(-2, 'codex_page_received');
      }
    } else {
      ds.sceneShown = 3;
      lines.push(
        "(The lantern dips, just slightly. He is smiling — or the wind is.)",
        "Go on. The path back is easier than the path here. It always is.",
        "And — child — when the bell rings at noon, stand still. Let it find you."
      );
    }
    this.speakDziadek(lines);
  }

  speakDziadek(lines) {
    if (this._dziadekSpeaking) return;
    this._dziadekSpeaking = true;
    const cam = this.cameras.main;
    const cx = cam.width / 2;
    const cy = cam.height * 0.78;
    let i = 0;
    const next = () => {
      if (i >= lines.length) { this._dziadekSpeaking = false; return; }
      const line = lines[i++];
      if (!line) { setTimeout(next, 1500); return; }
      const txt = this.add.text(cx, cy, line, {
        fontFamily: 'Georgia, serif',
        fontStyle: 'italic',
        fontSize: '18px',
        color: '#f0d8a0',
        align: 'center',
        wordWrap: { width: cam.width * 0.7 },
      }).setOrigin(0.5).setScrollFactor(0).setDepth(950).setAlpha(0);
      // Soft lantern-warm undertone
      if (ambientAudio.ctx) {
        const ctx = ambientAudio.ctx;
        const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = 147;
        const gn = ctx.createGain(); gn.gain.value = 0;
        o.connect(gn); gn.connect(ctx.destination);
        const t = ctx.currentTime;
        gn.gain.linearRampToValueAtTime(0.035, t + 0.5);
        gn.gain.linearRampToValueAtTime(0,    t + 3.0);
        o.start(t); o.stop(t + 3.2);
      }
      this.tweens.add({
        targets: txt, alpha: 1, duration: 900,
        onComplete: () => {
          setTimeout(() => {
            this.tweens.add({
              targets: txt, alpha: 0, duration: 700,
              onComplete: () => { txt.destroy(); next(); }
            });
          }, 4000);
        }
      });
    };
    next();
  }

  // ── PLAYER (Enhanced) ─────────────────────────────────────────────
  createPlayer() {
    // Begin at the first tile of the north-western road (a brown dirt tile)
    this.playerCartX = 0.5;
    this.playerCartY = CENTER - 0.5;
    const container = this.add.container(0, 0);

    // We'll redraw the player each frame for animation
    this.playerGfx = this.add.graphics();
    container.add(this.playerGfx);
    this.playerSprite = container;
    this.objectLayer.add(this.playerSprite);

    this.drawPlayerFrame(0, 'se');

    // Idle / reaction animation state
    this.idleTimer = 0;
    this.idleHeadOffset = 0;     // -2..2 horizontal eye offset
    this.idleAnimActive = false;
    this.playerFxOffsetX = 0;
    this.playerFxOffsetY = 0;
  }

  // ── PLAYER REACTION ANIMATIONS ──────────────────────────────────
  // Slow 4-frame look-around: left → forward → right → forward.
  startIdleLookAround() {
    if (this.idleAnimActive) return;
    this.idleAnimActive = true;
    const frames = [-2, 0, 2, 0];
    let i = 0;
    const step = () => {
      if (!this.idleAnimActive) return;
      this.idleHeadOffset = frames[i];
      i++;
      if (i >= frames.length) {
        this.idleAnimActive = false;
        this.idleHeadOffset = 0;
        return;
      }
      setTimeout(step, 1000);
    };
    step();
  }

  // 2-frame stumble — 3px down then back up over 0.3s
  triggerPlayerStumble() {
    if (!this.playerSprite) return;
    this.tweens.add({
      targets: this, playerFxOffsetY: 3, duration: 150, ease: 'Sine.easeIn',
      yoyo: true,
    });
  }

  // Horizontal shake — 3 left, 3 right, 2 left, center over 0.5s
  triggerPlayerShake() {
    if (!this.playerSprite) return;
    const seq = [
      { x: -3, d: 100 },
      { x:  3, d: 130 },
      { x: -2, d: 130 },
      { x:  0, d: 140 },
    ];
    let i = 0;
    const next = () => {
      if (i >= seq.length) return;
      const s = seq[i++];
      this.tweens.add({
        targets: this, playerFxOffsetX: s.x, duration: s.d, ease: 'Sine.easeInOut',
        onComplete: next,
      });
    };
    next();
  }

  // ── PLAYER SPRITE — folk-influenced wanderer (~24×48 px) ──────
  // Direction mapping (iso): se=south(front), nw=north(back),
  // ne=east(right profile), sw=west(left profile).
  // Walk cycle: 4 frames driven by `bob`. Idle: 2-frame breathing.
  drawPlayerFrame(bob, facing) {
    const g = this.playerGfx;
    g.clear();

    // ── Strict palette ──
    const C = {
      linen:    0xe8dfc0,
      vest:     0x3d2e1e,
      vestHi:   0x4d3a26,  // worn highlight
      vestLo:   0x2a1f14,
      red:      0x8b2020,
      gold:     0xa07830,
      trouser:  0x3d4a2e,
      trouserLo:0x2a3320,
      boot:     0x2a1a0e,
      bootHi:   0x40281a,
      blue:     0x4a6b8a,
      skin:     0xc4845a,
      skinHi:   0xd89a72,
      skinLo:   0x8a5a3a,
      hair:     0x1a0e08,
      bone:     0xc8b888,
      copper:   0xa86838,
      mark:     0xffb347,
      pouch:    0x1c1410,
    };

    // Direction
    const isSouth = facing === 'se';
    const isNorth = facing === 'nw';
    const isEast  = facing === 'ne';
    const isWest  = facing === 'sw';
    const profile = isEast || isWest;
    const flip = isWest ? -1 : 1; // mirror west using negative scale on x

    // Walk frame: 0..3
    const walking = !!this.isWalking;
    const frame = walking ? Math.floor(bob * 6) % 4 : 0;
    // legSwing: -2,0,+2,0 over the cycle
    const legSeq = [-2, 0, 2, 0];
    const legSwing = walking ? legSeq[frame] : 0;
    // Arm swing — left arm swings more than right (right protects the mark)
    const armL = walking ? legSeq[frame] : 0;
    const armR = walking ? legSeq[(frame + 2) % 4] * 0.5 : 0;

    // Idle breathing (2-frame, 3s cycle): tiny chest rise
    let breath = 0;
    if (!walking && this.animTime != null) {
      breath = Math.sin(this.animTime * (2 * Math.PI / 3000)) > 0 ? 0 : -1;
    }

    // Helper for crisp 1px rect
    const px = (x, y, w, h, color, alpha = 1) => {
      g.fillStyle(color, alpha);
      g.fillRect(Math.round(x * flip - (flip < 0 ? w : 0)), Math.round(y), w, h);
    };

    // ── SHADOW ─────────────────────────────────────────────────
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(0, 6, 18, 6);

    // ── BOOTS (knee-high, dark brown) ──────────────────────────
    // Left and right boot — apply opposite vertical phase for walk
    const lbY = -2 + Math.max(0, legSwing);  // left foot
    const rbY = -2 - Math.min(0, legSwing);  // right foot
    // Boot shafts (knee-high)
    px(-5, lbY - 12, 4, 14, C.boot);
    px( 1, rbY - 12, 4, 14, C.boot);
    // Boot toe caps
    px(-5, lbY + 1, 4, 2, C.bootHi);
    px( 1, rbY + 1, 4, 2, C.bootHi);
    // Sole
    px(-6, lbY + 3, 5, 1, 0x000000);
    px( 0, rbY + 3, 5, 1, 0x000000);
    // Worn scuff at toe
    px(-2, lbY + 2, 1, 1, 0x1a0a04);
    px( 4, rbY + 2, 1, 1, 0x1a0a04);
    // Blue thread charm — wound twice around the LEFT boot ankle
    // (a single blue pixel line, barely visible but there)
    px(-5, lbY - 3, 4, 1, C.blue);
    px(-5, lbY - 1, 4, 1, C.blue);

    // ── TROUSERS (moss green, tucked into boots) ───────────────
    // Visible portion above boots up to belt at y ~ -14
    const trouserTop = -14;
    const trouserBot = -3;
    px(-5, trouserTop, 4, trouserBot - trouserTop, C.trouser);
    px( 1, trouserTop, 4, trouserBot - trouserTop, C.trouser);
    // Inner shadow
    px(-2, trouserTop, 1, trouserBot - trouserTop, C.trouserLo);
    px( 1, trouserTop, 1, trouserBot - trouserTop, C.trouserLo);

    // ── BELT (thin leather + simple buckle) ────────────────────
    px(-6, -15, 12, 2, 0x1a0e06);
    // Buckle
    px(-1, -15, 2, 2, C.copper);
    px(-1, -15, 1, 1, 0xd89048);

    // ── VEST / JERKIN (charcoal-brown, the carrier of folk detail)
    // Body region: y -28 (top of shoulder) to -14 (top of belt)
    // Width: -7 to +7
    const vestTop = -28 + breath;
    const vestBot = -14;
    const vestL = -7, vestR = 7;
    // Fill body
    for (let y = vestTop; y < vestBot; y++) {
      px(vestL, y, (vestR - vestL), 1, C.vest);
    }
    // Worn highlight at shoulders
    px(-7, vestTop, 3, 1, C.vestHi);
    px( 4, vestTop, 3, 1, C.vestHi);
    // Worn elbow patches (sides)
    px(-7, -22, 1, 3, C.vestHi, 0.7);
    px( 6, -22, 1, 3, C.vestHi, 0.7);
    // Center seam (front/back)
    px(0, vestTop, 1, vestBot - vestTop, C.vestLo);
    // Mended patch on the LEFT shoulder (slightly different fabric)
    if (!isNorth) {
      px(-6, vestTop + 1, 3, 2, 0x4a3a2a);
      px(-5, vestTop + 1, 1, 1, 0x5a4a36);
    } else {
      // From behind, show patch on opposite side
      px(3, vestTop + 1, 3, 2, 0x4a3a2a);
    }

    // ── EMBROIDERED BORDER ─────────────────────────────────────
    // Wycinanki-inspired diamond + cross motifs in red & gold.
    // South: full front border down both edges + collar trim.
    // East/West: leading-edge stripe.
    // North: back collar trim only.
    const drawMotif = (x, y) => {
      // 3-pixel diamond with gold center
      px(x,     y,     1, 1, C.red);
      px(x - 1, y + 1, 3, 1, C.red);
      px(x,     y + 1, 1, 1, C.gold);
      px(x,     y + 2, 1, 1, C.red);
    };
    if (isSouth) {
      // Twin vertical borders down the front edges
      px(-6, vestTop + 1, 1, vestBot - vestTop - 1, C.red);
      px( 5, vestTop + 1, 1, vestBot - vestTop - 1, C.red);
      // Repeating motifs along each border
      [-21, -18].forEach(y => { drawMotif(-6, y); drawMotif(5, y); });
      // Collar trim — single pixel line across the top
      px(-3, vestTop, 6, 1, C.red);
      px( 0, vestTop, 1, 1, C.gold);
    } else if (isNorth) {
      // Back collar trim
      px(-3, vestTop, 6, 1, C.red);
      px( 0, vestTop, 1, 1, C.gold);
      // Faint side hints
      px(-6, vestTop + 1, 1, 4, C.red, 0.7);
      px( 5, vestTop + 1, 1, 4, C.red, 0.7);
    } else {
      // Profile — leading-edge stripe (the side facing the camera-front)
      // (East/West face same way visually due to flip)
      px(-6, vestTop + 1, 1, vestBot - vestTop - 1, C.red);
      drawMotif(-6, -21);
      drawMotif(-6, -18);
      px(-3, vestTop, 4, 1, C.red);
    }

    // ── BUTTONS / TOGGLES (bone or copper) ─────────────────────
    if (isSouth) {
      px(-1, -24, 1, 1, C.bone);
      px(-1, -20, 1, 1, C.copper);
    }

    // ── LINEN SHIRT — visible at collar and cuffs only ─────────
    // Open collar with one missing button
    px(-2, vestTop, 4, 1, C.linen);
    px(-2, vestTop + 1, 1, 1, C.linen);
    if (isSouth) {
      // Tiny gap where the missing button would sit
      px(0, vestTop + 1, 1, 1, C.linen);
    }
    // Rolled cuffs at mid-forearm — drawn with the arms below

    // ── ARMS ───────────────────────────────────────────────────
    // Arm shafts (vest sleeves) end at mid-forearm where the
    // linen cuff is rolled.
    // Left arm
    const lArmX = -10, rArmX = 7;
    const lArmTop = -26 + armL * 0;        // shoulder anchor
    const rArmTop = -26 + armR * 0;
    // Vest sleeve
    px(lArmX, lArmTop, 3, 8 + armL, C.vest);
    px(rArmX, rArmTop, 3, 8 + armR, C.vest);
    // Sleeve shadow
    px(lArmX, lArmTop, 1, 8 + armL, C.vestLo);
    px(rArmX + 2, rArmTop, 1, 8 + armR, C.vestLo);
    // Rolled linen cuff
    px(lArmX, lArmTop + 8 + armL, 3, 1, C.linen);
    px(rArmX, rArmTop + 8 + armR, 3, 1, C.linen);
    // Forearm (skin)
    px(lArmX, lArmTop + 9 + armL, 3, 3, C.skin);
    px(rArmX, rArmTop + 9 + armR, 3, 3, C.skin);
    // Forearm shading
    px(lArmX, lArmTop + 11 + armL, 3, 1, C.skinLo);
    px(rArmX, rArmTop + 11 + armR, 3, 1, C.skinLo);
    // Hands
    const lHandY = lArmTop + 12 + armL;
    const rHandY = rArmTop + 12 + armR + 1; // right hand sits slightly lower
    px(lArmX, lHandY, 3, 2, C.skin);
    px(rArmX, rHandY, 3, 2, C.skin);

    // ── BELT POUCH on the right side ───────────────────────────
    if (!isNorth) {
      px(4, -13, 3, 4, C.pouch);
      px(4, -13, 1, 1, 0x2c241a);
      px(5, -10, 1, 1, 0x2c241a);
    }

    // ── HEAD ───────────────────────────────────────────────────
    const headY = -32 + breath;
    // Skin — slightly squarer than circle for pixel feel
    g.fillStyle(C.skin, 1);
    g.fillRect(-4, headY, 8, 7);
    g.fillRect(-3, headY - 1, 6, 1);
    g.fillRect(-3, headY + 7, 6, 1);
    // Cheek shading
    px(-4, headY + 4, 1, 2, C.skinLo);
    px( 3, headY + 4, 1, 2, C.skinLo);
    // Highlight
    px(-2, headY + 1, 1, 1, C.skinHi);

    // Eyes / face features
    if (isSouth) {
      const eyeOff = (this.idleHeadOffset || 0);
      px(-2 + eyeOff, headY + 3, 1, 1, 0x1a1006);
      px( 1 + eyeOff, headY + 3, 1, 1, 0x1a1006);
      // Mouth — small line
      px(-1, headY + 5, 2, 1, 0x5a3018);
    } else if (isNorth) {
      // No face — back of head
    } else {
      // Profile: one eye visible
      px(1, headY + 3, 1, 1, 0x1a1006);
      px(1, headY + 5, 1, 1, 0x5a3018);
    }

    // ── HAIR — dark, slightly disheveled, longer than neat ─────
    // Top mass
    const hairTopY = headY - 2 + (breath < 0 ? -1 : 0); // 1px shift on top strand
    px(-4, hairTopY, 8, 2, C.hair);
    px(-5, headY - 1, 1, 3, C.hair);
    px( 4, headY - 1, 1, 3, C.hair);
    // Side strands fall slightly below ear
    if (!isNorth) {
      px(-5, headY + 2, 1, 3, C.hair);
      px( 4, headY + 2, 1, 3, C.hair);
    } else {
      // Back of head — fuller hair coverage
      px(-4, headY + 1, 8, 4, C.hair);
    }
    // Stray strand (the one that shifts in idle)
    px(-2, hairTopY - 1, 2, 1, C.hair);

    // ── MARK GLOW on the right hand ────────────────────────────
    // Persistent subtle amber aura, pulses near significant places.
    const gl = this.handGlowLevel || 0;
    // Persistent base after awakening (gl >= 0)
    const baseAlpha = 0.35 + gl * 0.06;
    // Slow pulse using animTime so it works while idle
    const t = (this.animTime || 0) * 0.001;
    const pulse = Math.sin(t * 1.6) * 0.5 + 0.5; // 0..1
    // Proximity boost
    const boost = (this._markProximityBoost || 0); // 0..1
    const alpha = Math.min(1, baseAlpha + pulse * 0.12 + boost * 0.25);
    // Soft 4-5px aura around right hand
    const ghx = (rArmX + 1);
    const ghy = rHandY;
    g.fillStyle(C.mark, alpha * 0.35);
    g.fillCircle(ghx * flip, ghy + 1, 6 + boost * 2);
    g.fillStyle(C.mark, alpha * 0.6);
    g.fillCircle(ghx * flip, ghy + 1, 3.5);
    g.fillStyle(0xfff0c0, alpha * 0.9);
    g.fillRect(ghx * flip, ghy, 1, 1);
  }

  // ── GAME CLOCK ──────────────────────────────────────────────────
  // Advances gameState.gameHour in real time and crossfades a sky
  // tint overlay between time windows. Drives Marta/Ibbur/Wisps gates.
  updateGameClock(delta) {
    // Lazy-create the tint overlay (full-screen, multiplicative-feeling)
    if (!this.skyTint) {
      const cam = this.cameras.main;
      this.skyTint = this.add.graphics().setScrollFactor(0).setDepth(-8);
      this.skyTint.fillStyle(0x000000, 0);
      this.skyTint.fillRect(0, 0, cam.width, cam.height);
      this._skyTintCol = 0x000000;
      this._skyTintAlpha = 0;
      this._skyW = cam.width; this._skyH = cam.height;
    }
    // Advance the clock
    const prev = gameState.gameHour;
    gameState.gameHour += (delta / GAME_HOUR_MS);
    if (gameState.gameHour >= 24) {
      gameState.gameHour -= 24;
      gameState._noonBellRung = false; // reset for new day
    }
    // Refresh the gates (cheap — just two boolean checks)
    gameState.wispsVisible = isTimeWindow('dusk') || isTimeWindow('night') || isTimeWindow('latenight');
    gameState.iburActive  = isTimeWindow('dawn') || isTimeWindow('dusk');

    // Noon bell — fires once when crossing 12:00
    if (!gameState._noonBellRung && prev < 12 && gameState.gameHour >= 12) {
      gameState._noonBellRung = true;
      if (this.playLowBellTone) this.playLowBellTone();
    }

    // ── Sky tint per window — picked by hour, crossfaded smoothly ─
    // Each window's target color + alpha (overlay sits in front of base sky)
    const target = this.getSkyTintForHour(gameState.gameHour);
    // Smoothly approach the target each frame
    const k = Math.min(1, delta / 800);
    this._skyTintAlpha += (target.a - this._skyTintAlpha) * k;
    // Lerp color channels
    const cur = this._skyTintCol;
    const cr = (cur >> 16) & 0xff, cg = (cur >> 8) & 0xff, cb = cur & 0xff;
    const tr = (target.col >> 16) & 0xff, tg = (target.col >> 8) & 0xff, tb = target.col & 0xff;
    const nr = Math.round(cr + (tr - cr) * k);
    const ng = Math.round(cg + (tg - cg) * k);
    const nb = Math.round(cb + (tb - cb) * k);
    this._skyTintCol = (nr << 16) | (ng << 8) | nb;
    this.skyTint.clear();
    this.skyTint.fillStyle(this._skyTintCol, this._skyTintAlpha);
    this.skyTint.fillRect(0, 0, this._skyW, this._skyH);
  }

  getSkyTintForHour(hour) {
    // Returns { col, a } overlay for the given hour. Hard-coded per window.
    if (hour >= 6 && hour < 7)        return { col: 0xe88a4a, a: 0.20 }; // dawn — pink-ochre
    if (hour >= 7 && hour < 12)       return { col: 0x5060_70 & 0xffffff, a: 0.10 }; // morning — muted blue-grey
    if (hour >= 12 && hour < 13)      return { col: 0xfff0c8, a: 0.18 }; // noon — flat bright
    if (hour >= 13 && hour < 19)      return { col: 0xc88040, a: 0.15 }; // afternoon — amber-gold
    if (hour >= 19 && hour < 20)      return { col: 0x6a3a70, a: 0.30 }; // dusk — bruised purple-gold
    if (hour >= 20 && hour < 24)      return { col: 0x0a0e22, a: 0.55 }; // night — deep blue-black
    return { col: 0x080820, a: 0.60 };                                   // latenight — darker
  }

  // Update mark glow proximity boost based on distance to idol/markers.
  updateMarkProximity() {
    if (!this.player) return;
    let near = 0;
    // Distance to idol (CENTER, CENTER+0.5)
    const dx = this.playerCartX - (CENTER - 0.5);
    const dy = this.playerCartY - (CENTER + 0.5);
    const dIdol = Math.sqrt(dx * dx + dy * dy);
    if (dIdol < 4) near = Math.max(near, 1 - dIdol / 4);
    // Distance to any unplaced marker
    if (this.markers) {
      for (const m of this.markers) {
        if (m.placed) continue;
        const mdx = this.playerCartX - m.cartX;
        const mdy = this.playerCartY - m.cartY;
        const d = Math.sqrt(mdx * mdx + mdy * mdy);
        if (d < 3) near = Math.max(near, 1 - d / 3);
      }
    }
    this._markProximityBoost = near;
  }

  // ── DIALOGUE SYSTEM (Enhanced with typewriter effect) ──────────────
  // ── DIALOGUE SYSTEM (with choices & per-NPC styling) ────────────────
  // Supports: typewriter text, ">" stage directions, { type:'choice' }
  // branching, and two visual modes — Baba (ornate) vs Zuzka (simple).
  createDialogueUI() {
    const cam = this.cameras.main;

    // Panel background
    this.dialogueBg = this.add.graphics();
    this.dialogueBg.setScrollFactor(0).setDepth(1001).setVisible(false);

    // Folk-art border (used for Baba; hidden for Zuzka)
    this.dialogueBorder = this.add.graphics();
    this.dialogueBorder.setScrollFactor(0).setDepth(1001).setVisible(false);

    // NPC name label
    this.dialogueName = this.add.text(50, 0, '', {
      fontFamily: 'Georgia, serif', fontSize: '14px', fontStyle: 'bold',
      color: '#ccaa66', stroke: '#0e0e14', strokeThickness: 3,
    }).setScrollFactor(0).setDepth(1002).setVisible(false);

    // Main dialogue text — body now 14px (was 16, ~85%) with 1.6× line height
    this.dialogueText = this.add.text(50, 0, '', {
      fontFamily: 'Georgia, serif', fontSize: '14px',
      color: '#ddccaa', stroke: '#0e0e14', strokeThickness: 2,
      wordWrap: { width: cam.width - 104 }, lineSpacing: 9,
    }).setScrollFactor(0).setDepth(1002).setVisible(false);

    // [E] Continue / [E] Close prompt — italic, cream, slightly smaller
    // than body, anchored bottom-right of the dialogue box
    this.dialogueContinue = this.add.text(0, 0, '', {
      fontFamily: 'Georgia, serif', fontSize: '12px',
      fontStyle: 'italic', color: '#ddccaa',
      stroke: '#0e0e14', strokeThickness: 2,
    }).setOrigin(1, 1).setScrollFactor(0).setDepth(1002).setVisible(false);

    // Choice option texts (up to 3)
    this.choiceTexts = [];
    for (let i = 0; i < 3; i++) {
      const ct = this.add.text(0, 0, '', {
        fontFamily: 'Georgia, serif', fontSize: '13px',
        color: '#99aa88', stroke: '#0e0e14', strokeThickness: 2,
        wordWrap: { width: cam.width - 160 },
      }).setScrollFactor(0).setDepth(1002).setVisible(false);
      this.choiceTexts.push(ct);
    }

    // State
    this.dialogueActive = false;
    this.dialogueLines = [];
    this.dialogueIndex = 0;
    this.dialogueOnClose = null;
    this.dialogueSpeaker = '';      // current NPC name (for styling)
    this.dialogueStyle = 'ornate';  // 'ornate' (Baba) or 'simple' (Zuzka)
    this.typewriterTarget = '';
    this.typewriterPos = 0;
    this.typewriterDone = false;
    this.choiceActive = false;      // is a choice prompt currently shown?
    this.currentChoices = null;     // the choice object if active
  }

  // Open a new conversation. style: 'ornate' or 'simple'.
  openDialogue(name, lines, onClose, style) {
    if (this.dialogueActive) return;
    this.dialogueActive = true;
    try { sfx.play('dialogue_open'); } catch (e) {}
    // Baba's leitmotif rises with her dialogue
    if (typeof music !== 'undefined' && /Baba/.test(name || '')) {
      try { sfx.play('door_baba'); } catch (e) {}
      music.startBaba();
    }
    this.dialogueLines = lines;
    this.dialogueIndex = 0;
    this.dialogueOnClose = onClose || null;
    this.dialogueSpeaker = name;
    this.dialogueStyle = style || 'ornate';
    this.choiceActive = false;
    this.currentChoices = null;
    this.showDialogueLine();
  }

  // Render one line (or a choice prompt) at the current index.
  showDialogueLine() {
    const cam = this.cameras.main;
    const entry = this.dialogueLines[this.dialogueIndex];

    // ── CHOICE PROMPT ─────────────────────────────────────────────
    if (entry && typeof entry === 'object' && entry.type === 'choice') {
      this.showChoicePrompt(entry);
      return;
    }

    // ── REGULAR LINE ──────────────────────────────────────────────
    this.choiceActive = false;
    this.hideChoices();

    // Box height +20% (was 95/110 → now 114/132)
    const panelH = this.dialogueStyle === 'simple' ? 114 : 132;
    const panelY = cam.height - panelH - 14;

    // Panel background
    this.dialogueBg.clear();
    this.dialogueBg.fillStyle(0x0e0e18, this.dialogueStyle === 'simple' ? 0.88 : 0.92);
    this.dialogueBg.fillRoundedRect(24, panelY, cam.width - 48, panelH, 4);
    this.dialogueBg.setVisible(true);

    // Border — ornate for Baba, plain line for Zuzka
    this.dialogueBorder.clear();
    const bx = 24, by = panelY, bw = cam.width - 48, bh = panelH;
    if (this.dialogueStyle === 'ornate') {
      this.dialogueBorder.lineStyle(1, PAL.copper, 0.6);
      this.dialogueBorder.beginPath();
      this.dialogueBorder.moveTo(bx + 8, by); this.dialogueBorder.lineTo(bx + bw - 8, by);
      this.dialogueBorder.strokePath();
      this.dialogueBorder.beginPath();
      this.dialogueBorder.moveTo(bx + 8, by + bh); this.dialogueBorder.lineTo(bx + bw - 8, by + bh);
      this.dialogueBorder.strokePath();
      for (let dx = bx + 30; dx < bx + bw - 20; dx += 40) {
        this.dialogueBorder.fillStyle(PAL.copper, 0.4);
        this.dialogueBorder.fillTriangle(dx, by - 3, dx + 4, by + 1, dx - 4, by + 1);
        this.dialogueBorder.fillTriangle(dx, by + 5, dx + 4, by + 1, dx - 4, by + 1);
      }
      for (const [cx, cy] of [[bx+6,by+3],[bx+bw-6,by+3],[bx+6,by+bh-3],[bx+bw-6,by+bh-3]]) {
        this.dialogueBorder.fillStyle(PAL.copper, 0.5);
        this.dialogueBorder.fillCircle(cx, cy, 2);
      }
    } else {
      // Simple — just a thin top line
      this.dialogueBorder.lineStyle(1, PAL.stoneDark, 0.4);
      this.dialogueBorder.beginPath();
      this.dialogueBorder.moveTo(bx + 12, by); this.dialogueBorder.lineTo(bx + bw - 12, by);
      this.dialogueBorder.strokePath();
    }
    this.dialogueBorder.setVisible(true);

    // NPC name — Zuzka: simpler font, no bold
    const nameStyle = this.dialogueStyle === 'simple'
      ? { fontFamily: 'monospace', fontSize: '12px', fontStyle: 'normal', color: '#8899aa' }
      : { fontFamily: 'Georgia, serif', fontSize: '14px', fontStyle: 'bold', color: '#ccaa66' };
    Object.entries(nameStyle).forEach(([k, v]) => {
      if (k === 'fontFamily') this.dialogueName.setFontFamily(v);
      else if (k === 'fontSize') this.dialogueName.setFontSize(v);
      else if (k === 'fontStyle') this.dialogueName.setFontStyle(v);
      else if (k === 'color') this.dialogueName.setColor(v);
    });
    this.dialogueName.setText(this.dialogueSpeaker);
    // Name sits in the 16px top padding band, x = box (24) + 28 = 52
    this.dialogueName.setPosition(52, panelY + 8);

    // Body text — uniform 14px (~85% of original 16px)
    this.dialogueText.setFontSize('14px');

    // Stage direction vs spoken line
    const rawLine = entry;
    const isStageDirection = typeof rawLine === 'string' && rawLine.startsWith('>');

    if (isStageDirection) {
      this.typewriterTarget = rawLine.substring(1);
      this.dialogueText.setColor('#887766');
      this.dialogueText.setFontStyle('italic');
      this.dialogueName.setVisible(false);
    } else {
      this.typewriterTarget = '"' + rawLine + '"';
      this.dialogueText.setColor(this.dialogueStyle === 'simple' ? '#bbccbb' : '#ddccaa');
      this.dialogueText.setFontStyle('normal');
      this.dialogueName.setVisible(true);
    }

    // Strict text area: 28L / 28R / 16T (+ name band) / 40B padding.
    // box left = 24 → text x = 24 + 28 = 52. wrap width = cam.width - 48 - 56 = cam.width - 104.
    const textX = 52;
    const textY = panelY + 38; // 16 top pad + name(~22) ≈ 38
    this.dialogueText.setWordWrapWidth(cam.width - 104);
    this.dialogueText.setPosition(textX, textY);
    this.dialogueText.setVisible(true);

    // ── PAGINATION ────────────────────────────────────────────────
    // Wrap the full target, then chunk into pages that fit the box.
    const lineHeight = 14 + 9; // fontSize + lineSpacing
    const availH = panelH - 38 - 40; // panelH - top(name+pad) - bottom pad
    const maxLines = Math.max(1, Math.floor(availH / lineHeight));
    const wrapped = this.dialogueText.getWrappedText(this.typewriterTarget);
    this.dialoguePages = [];
    for (let i = 0; i < wrapped.length; i += maxLines) {
      this.dialoguePages.push(wrapped.slice(i, i + maxLines).join('\n'));
    }
    if (this.dialoguePages.length === 0) this.dialoguePages = [''];
    this.dialoguePageIndex = 0;
    this.typewriterTarget = this.dialoguePages[0];

    this.typewriterPos = 0;
    this.typewriterDone = false;
    this.dialogueText.setText('');

    this.dialogueContinue.setVisible(false);

    if (this.typewriterTimer) this.typewriterTimer.remove();
    this.typewriterTimer = this.time.addEvent({
      delay: 30, callback: this.tickTypewriter, callbackScope: this, loop: true,
    });
  }

  // ── CHOICE PROMPT ─────────────────────────────────────────────────
  // Shows 2–3 options the player picks with number keys.
  showChoicePrompt(choiceEntry) {
    this.choiceActive = true;
    this.currentChoices = choiceEntry;

    const cam = this.cameras.main;
    const numOpts = choiceEntry.options.length;
    const panelH = 80 + numOpts * 24;
    const panelY = cam.height - panelH - 14;

    // Panel
    this.dialogueBg.clear();
    this.dialogueBg.fillStyle(0x0e0e18, 0.92);
    this.dialogueBg.fillRoundedRect(24, panelY, cam.width - 48, panelH, 4);
    this.dialogueBg.setVisible(true);

    // Simple border
    this.dialogueBorder.clear();
    this.dialogueBorder.lineStyle(1, PAL.stoneDark, 0.4);
    this.dialogueBorder.beginPath();
    this.dialogueBorder.moveTo(36, panelY); this.dialogueBorder.lineTo(cam.width - 36, panelY);
    this.dialogueBorder.strokePath();
    this.dialogueBorder.setVisible(true);

    // Hide regular text
    this.dialogueText.setVisible(false);
    this.dialogueContinue.setVisible(false);
    this.dialogueName.setVisible(false);

    // Show choice header
    if (!this.choiceHeader) {
      this.choiceHeader = this.add.text(0, 0, '', {
        fontFamily: 'monospace', fontSize: '11px', color: '#777766',
        stroke: '#0e0e14', strokeThickness: 2,
      }).setScrollFactor(0).setDepth(1002);
    }
    this.choiceHeader.setText('Choose a response:');
    this.choiceHeader.setPosition(50, panelY + 10);
    this.choiceHeader.setVisible(true);

    // Show options
    choiceEntry.options.forEach((opt, i) => {
      if (this.choiceTexts[i]) {
        this.choiceTexts[i].setText(`[${i + 1}]  "${opt.label}"`);
        this.choiceTexts[i].setPosition(60, panelY + 34 + i * 24);
        this.choiceTexts[i].setVisible(true);
      }
    });
    // Hide unused slots
    for (let i = numOpts; i < this.choiceTexts.length; i++) {
      this.choiceTexts[i].setVisible(false);
    }

    // Stop typewriter
    if (this.typewriterTimer) this.typewriterTimer.remove();
    this.typewriterDone = true;
  }

  // Player selected a choice (0-indexed)
  selectChoice(index) {
    if (!this.choiceActive || !this.currentChoices) return;
    const opts = this.currentChoices.options;
    if (index < 0 || index >= opts.length) return;

    const chosen = opts[index];
    try { sfx.play('choice_select'); } catch (e) {}
    this.choiceActive = false;
    this.hideChoices();

    // Splice the response lines into dialogueLines right after this choice
    const insertAt = this.dialogueIndex + 1;
    this.dialogueLines.splice(insertAt, 0, ...chosen.response);

    // Advance past the choice object to the first response line
    this.dialogueIndex++;
    this.showDialogueLine();
  }

  hideChoices() {
    this.choiceTexts.forEach(ct => ct.setVisible(false));
    if (this.choiceHeader) this.choiceHeader.setVisible(false);
    this.currentChoices = null;
  }

  // Typewriter tick — one character at a time
  tickTypewriter() {
    if (this.typewriterDone) return;
    this.typewriterPos++;
    this.dialogueText.setText(this.typewriterTarget.substring(0, this.typewriterPos));

    if (this.typewriterPos >= this.typewriterTarget.length) {
      this.typewriterDone = true;
      if (this.typewriterTimer) this.typewriterTimer.remove();
      this._showContinuePrompt();
    }
  }

  // Show the [E] prompt anchored bottom-right of the dialogue box.
  _showContinuePrompt() {
    const cam = this.cameras.main;
    const panelH = this.dialogueStyle === 'simple' ? 114 : 132;
    const panelY = cam.height - panelH - 14;
    const morePages = this.dialoguePageIndex < (this.dialoguePages?.length || 1) - 1;
    const isLastLine = this.dialogueIndex >= this.dialogueLines.length - 1;
    const label = morePages ? '[E] Continue...' : (isLastLine ? '[E] Close' : '[E] Continue...');
    this.dialogueContinue.setText(label);
    // bottom-right anchor: 24 (box right inset) + 20 (right pad - origin)
    this.dialogueContinue.setPosition(cam.width - 28, panelY + panelH - 14);
    this.dialogueContinue.setVisible(true);
  }

  advanceDialogue() {
    if (!this.dialogueActive) return;

    // If a choice is showing, don't advance with E — need number keys
    if (this.choiceActive) return;
    try { sfx.play('dialogue_advance'); } catch (e) {}

    // If typewriter still going, skip to end of current page
    if (!this.typewriterDone) {
      this.typewriterPos = this.typewriterTarget.length;
      this.dialogueText.setText(this.typewriterTarget);
      this.typewriterDone = true;
      if (this.typewriterTimer) this.typewriterTimer.remove();
      this._showContinuePrompt();
      return;
    }

    // If more pages of the current line remain, advance the page
    if (this.dialoguePages && this.dialoguePageIndex < this.dialoguePages.length - 1) {
      this.dialoguePageIndex++;
      this.typewriterTarget = this.dialoguePages[this.dialoguePageIndex];
      this.typewriterPos = 0;
      this.typewriterDone = false;
      this.dialogueText.setText('');
      this.dialogueContinue.setVisible(false);
      if (this.typewriterTimer) this.typewriterTimer.remove();
      this.typewriterTimer = this.time.addEvent({
        delay: 30, callback: this.tickTypewriter, callbackScope: this, loop: true,
      });
      return;
    }

    this.dialogueIndex++;
    if (this.dialogueIndex >= this.dialogueLines.length) {
      this.closeDialogue();
    } else {
      this.showDialogueLine();
    }
  }

  // ── PAUSE MENU (Esc) ─────────────────────────────────────────────
  // Overlay with Resume / Return to Menu / Close Game.
  togglePauseMenu() {
    if (this.dialogueActive) return; // Esc shouldn't fight dialogue
    if (this._pauseLayer) { this._closePauseMenu(); return; }
    const cam = this.cameras.main;
    const W = cam.width, H = cam.height;
    const layer = this.add.container(0, 0).setScrollFactor(0).setDepth(3000);
    const dim = this.add.rectangle(0, 0, W, H, 0x000000, 0.6).setOrigin(0, 0);
    // Taller panel to fit three comfortably-spaced options
    const pw = 360, ph = 260;
    const px = (W - pw) / 2, py = (H - ph) / 2;
    const panel = this.add.graphics();
    panel.fillStyle(0x1a1410, 0.96); panel.fillRoundedRect(px, py, pw, ph, 6);
    panel.lineStyle(1, 0xc8922a, 0.6); panel.strokeRoundedRect(px, py, pw, ph, 6);
    const title = this.add.text(W / 2, py + 30, 'Paused', {
      fontFamily: 'Georgia, serif', fontSize: '22px', color: '#c8922a',
    }).setOrigin(0.5);
    // Three options, 42px spacing
    const makeOpt = (label, y, onClick) => {
      const t = this.add.text(W / 2, y, label, {
        fontFamily: 'Georgia, serif', fontSize: '18px', color: '#e8dfc0',
        stroke: '#1a0e08', strokeThickness: 2,
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      t.on('pointerover', () => t.setColor('#c8922a'));
      t.on('pointerout',  () => t.setColor('#e8dfc0'));
      t.on('pointerdown', onClick);
      return t;
    };
    const resume    = makeOpt('Resume',         py + 86,  () => this._closePauseMenu());
    const ret       = makeOpt('Return to Menu', py + 128, () => this._returnToMenu());
    const closeGame = makeOpt('Close Game',     py + 170, () => this._closeGame());
    const hint = this.add.text(W / 2, py + ph - 22, 'Esc to resume', {
      fontFamily: 'Georgia, serif', fontSize: '12px', fontStyle: 'italic', color: '#a89878',
    }).setOrigin(0.5);
    // Slot for the "press Alt+F4…" fallback message after Close Game
    this._pauseCloseMsg = this.add.text(W / 2, py + 200, '', {
      fontFamily: 'Georgia, serif', fontSize: '12px', fontStyle: 'italic',
      color: '#c8b878', wordWrap: { width: pw - 40 }, align: 'center',
    }).setOrigin(0.5);
    layer.add([dim, panel, title, resume, ret, closeGame, hint, this._pauseCloseMsg]);
    this._pauseLayer = layer;
    this.physics && this.physics.world && this.physics.world.pause && this.physics.world.pause();
  }

  // Try to close the browser window/tab. Most modern browsers block
  // window.close() unless the tab was opened via script, so we show
  // the platform-appropriate shortcut as a fallback.
  _closeGame() {
    try { saveGame(); } catch (e) {}
    try { window.close(); } catch (e) {}
    // If the window is still open after a tick, the browser blocked it.
    setTimeout(() => {
      if (!this._pauseCloseMsg) return;
      const isMac = /Mac|iPhone|iPad|iPod/.test(navigator.platform || '');
      const msg = isMac
        ? 'Press Cmd+Q (Mac) to close, or close this tab.'
        : 'Press Alt+F4 (Windows) to close, or close this tab.';
      this._pauseCloseMsg.setText(msg);
    }, 120);
  }
  _closePauseMenu() {
    if (!this._pauseLayer) return;
    this._pauseLayer.destroy(); this._pauseLayer = null;
    this.physics && this.physics.world && this.physics.world.resume && this.physics.world.resume();
  }
  _returnToMenu() {
    try { saveGame(); } catch (e) {}
    if (typeof music !== 'undefined') {
      try { music.stopAmbient(800); music.fadeOutAwakening(800); } catch (e) {}
    }
    this.cameras.main.fadeOut(1200, 0, 0, 0);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this._closePauseMenu();
      this.scene.start('MainMenuScene');
    });
  }

  closeDialogue() {
    this.dialogueActive = false;
    this.choiceActive = false;
    if (typeof music !== 'undefined' && /Baba/.test(this.dialogueSpeaker || '')) {
      music.stopBaba();
    }
    this.dialogueBg.setVisible(false);
    this.dialogueBorder.setVisible(false);
    this.dialogueName.setVisible(false);
    this.dialogueText.setVisible(false);
    this.dialogueContinue.setVisible(false);
    this.hideChoices();
    if (this.typewriterTimer) this.typewriterTimer.remove();

    if (this.dialogueOnClose) {
      this.dialogueOnClose();
      this.dialogueOnClose = null;
    }

    this.dialogueLines = [];
    this.dialogueIndex = 0;
  }

  // ── THREAD KNOT MARKERS ──────────────────────────────────────────
  // Draws small copper-wrapped stones at each marker location.
  // Unplaced markers pulse faintly; placed ones glow steady with a knot visible.
  drawMarkers() {
    MARKERS.forEach((m, idx) => {
      const iso = cartToIso(m.x, m.y);
      const px = iso.x + this.worldOffset.x;
      const py = iso.y + this.worldOffset.y;
      const g = this.add.graphics();

      // Base stone
      g.fillStyle(PAL.stoneDark, 0.7);
      g.fillEllipse(px, py + 2, 14, 7);
      g.fillStyle(PAL.stone, 0.6);
      g.fillEllipse(px, py, 10, 5);

      // Copper wire wrapping
      g.lineStyle(1, PAL.copper, 0.5);
      g.strokeEllipse(px, py + 1, 12, 6);

      // Small rune mark
      g.lineStyle(1, PAL.rune, 0.3);
      g.beginPath(); g.moveTo(px - 2, py - 2); g.lineTo(px, py - 5); g.lineTo(px + 2, py - 2); g.strokePath();

      g._sortY = py;
      g._markerIdx = idx;
      g._mx = px;
      g._my = py;
      this.markerGraphics.push(g);
      this.objectLayer.add(g);
    });
  }

  // Redraw a marker after a knot is placed on it
  redrawMarkerPlaced(idx) {
    const mg = this.markerGraphics[idx];
    if (!mg) return;
    const px = mg._mx, py = mg._my;
    mg.clear();

    // Glowing base stone
    mg.fillStyle(PAL.stoneDark, 0.7);
    mg.fillEllipse(px, py + 2, 14, 7);
    mg.fillStyle(PAL.stoneLight, 0.7);
    mg.fillEllipse(px, py, 10, 5);

    // Copper wire — brighter
    mg.lineStyle(1, PAL.copperLight, 0.7);
    mg.strokeEllipse(px, py + 1, 12, 6);

    // Thread knot visible on top
    mg.fillStyle(0x4466aa, 0.7);
    mg.fillCircle(px, py - 2, 3);
    mg.lineStyle(1, 0x5577bb, 0.5);
    mg.beginPath(); mg.moveTo(px - 3, py - 2); mg.lineTo(px, py - 6); mg.lineTo(px + 3, py - 2); mg.strokePath();

    // Rune now glows
    mg.lineStyle(1, PAL.rune, 0.7);
    mg.beginPath(); mg.moveTo(px - 2, py - 2); mg.lineTo(px, py - 5); mg.lineTo(px + 2, py - 2); mg.strokePath();

    // Add a permanent light pool
    this.lightPools.push({ x: px, y: py, radius: 22, intensity: 0.05, color: PAL.shrineGlow });

    // Smoothly transition the marker glow color from blue to warm amber
    this.transitionMarkerGlowToAmber(this.markerGraphics[arguments[0]] || mg);
  }

  // ── BLUE → AMBER GLOW TRANSITION ──────────────────────────────────
  transitionMarkerGlowToAmber(markerG) {
    if (!markerG) return;
    markerG._completed = true;
    markerG._glowProgress = 0;
    this.tweens.add({
      targets: markerG,
      _glowProgress: 1,
      duration: 500,
      ease: 'Sine.easeInOut',
    });
  }

  // ── KNOT TYING ANIMATION (1.5s, 4 frames) ─────────────────────────
  playKnotTyingAnimation(markerIdx, onComplete) {
    const m = MARKERS[markerIdx];
    const iso = cartToIso(m.x, m.y);
    const px = iso.x + this.worldOffset.x;
    const py = iso.y + this.worldOffset.y;
    const g = this.add.graphics();
    g.setDepth(996);
    let frame = 0;
    const frameMs = 375; // 4 × 375ms = 1500ms
    const draw = () => {
      g.clear();
      // Bright blue intensification under the knot
      g.fillStyle(0x88aaff, 0.45);
      g.fillCircle(px, py - 1, 16);
      g.fillStyle(0xa8c0ff, 0.55);
      g.fillCircle(px, py - 1, 9);
      // 4 frames of thread wrapping
      g.lineStyle(1.4, 0x6e88c8, 1);
      if (frame === 0) {
        // Frame 1 — single loose thread strand
        g.beginPath(); g.moveTo(px - 6, py - 4); g.lineTo(px + 6, py - 1); g.strokePath();
      } else if (frame === 1) {
        // Frame 2 — first wrap
        g.strokeCircle(px, py - 2, 4);
        g.beginPath(); g.moveTo(px + 4, py - 2); g.lineTo(px + 8, py + 1); g.strokePath();
      } else if (frame === 2) {
        // Frame 3 — second wrap, knot forming
        g.strokeCircle(px, py - 2, 4);
        g.strokeCircle(px, py - 2, 5.5);
        g.fillStyle(0x4466aa, 1);
        g.fillCircle(px, py - 2, 2);
      } else {
        // Frame 4 — knot tied tight
        g.fillStyle(0x4466aa, 1);
        g.fillCircle(px, py - 2, 3);
        g.lineStyle(1, 0x88aaff, 0.9);
        g.beginPath(); g.moveTo(px - 3, py - 2); g.lineTo(px, py - 6); g.lineTo(px + 3, py - 2); g.strokePath();
        // Tail strands
        g.lineStyle(1, 0x6e88c8, 0.95);
        g.beginPath(); g.moveTo(px - 2, py + 1); g.lineTo(px - 5, py + 4); g.strokePath();
        g.beginPath(); g.moveTo(px + 2, py + 1); g.lineTo(px + 5, py + 4); g.strokePath();
      }
    };
    draw();
    const interval = setInterval(() => {
      frame++;
      if (frame >= 4) {
        clearInterval(interval);
        setTimeout(() => {
          g.destroy();
          if (onComplete) onComplete();
        }, 100);
      } else {
        draw();
      }
    }, frameMs);
  }

  // ── KNOT PLACEMENT ──────────────────────────────────────────────
  // Called from handleInteraction when player presses E near an unplaced marker
  handleMarkerInteraction() {
    if (!gameState.knotsGiven || this.visionActive || this.dialogueActive) return false;

    for (let i = 0; i < MARKERS.length; i++) {
      if (MARKERS[i].placed) continue;
      const dx = this.playerCartX - MARKERS[i].x;
      const dy = this.playerCartY - MARKERS[i].y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist <= 2.0) {
        const iso = cartToIso(MARKERS[i].x, MARKERS[i].y);
        this.interactPrompt.setText('[E] Place thread knot');
        this.interactPrompt.setPosition(
          iso.x + this.worldOffset.x,
          iso.y + this.worldOffset.y - 28
        );
        this.interactPrompt.setVisible(true);

        if (Phaser.Input.Keyboard.JustDown(this.interactKey)) {
          this.interactPrompt.setVisible(false);
          MARKERS[i].placed = true;
          gameState.knotsPlaced++;
          try { sfx.play('thread_knot'); } catch (e) {}
          try { saveGame(); } catch (e) {}
          gameState.markersFound.push(MARKERS[i].id);
          if (typeof music !== 'undefined') music.onKnotPlaced(gameState.knotsPlaced);
          this.removeThreadKnotFromHUD();
          // 1.5s thread-tying animation, then vision
          this.playKnotTyingAnimation(i, () => {
            this.redrawMarkerPlaced(i);
            this.spawnShimmerRipple(MARKERS[i].x, MARKERS[i].y);
            this.triggerVision(i);
          });
        }
        return true; // consumed the interaction
      }
    }
    return false;
  }

  // ══════════════════════════════════════════════════════════════════
  //  VISION SYSTEM — five sequences triggered by thread knot placement
  // ══════════════════════════════════════════════════════════════════

  // ── TRIGGER VISION ──────────────────────────────────────────────
  triggerVision(index) {
    // Player stumble — 2-frame down/up over 0.3s before transition
    this.triggerPlayerStumble();
    try { sfx.play('vision_whoosh'); } catch (e) {}
    this.visionActive = true;
    const v = this.getVisionData(index);
    const cam = this.cameras.main;
    const w = cam.width, h = cam.height;

    // Create overlay graphics
    const overlay = this.add.graphics();
    overlay.setDepth(1100); overlay.setScrollFactor(0);

    // Create text container
    const textBox = this.add.graphics();
    textBox.setDepth(1101); textBox.setScrollFactor(0);

    const visionText = this.add.text(w / 2, h / 2, '', {
      fontFamily: 'Georgia, serif',
      fontSize: '15px',
      color: '#e8dcc8',
      stroke: '#0e0e14',
      strokeThickness: 2,
      wordWrap: { width: w * 0.65 },
      align: 'center',
      lineSpacing: 6,
    }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(1102).setAlpha(0);

    const closingText = this.add.text(w / 2, h - 60, '', {
      fontFamily: 'Georgia, serif',
      fontSize: '13px',
      fontStyle: 'italic',
      color: '#aa9977',
      stroke: '#0e0e14',
      strokeThickness: 2,
      wordWrap: { width: w * 0.6 },
      align: 'center',
      lineSpacing: 4,
    }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(1102).setAlpha(0);

    // ── TRANSITION IN ─────────────────────────────────────────────
    if (v.transition === 'white') {
      overlay.fillStyle(0xffffff, 0.65);
      overlay.fillRect(0, 0, w, h);
      overlay.setAlpha(0);
      this.tweens.add({ targets: overlay, alpha: 1, duration: 1500, ease: 'Sine.easeIn' });
    } else if (v.transition === 'dim') {
      overlay.fillStyle(0x0e0e14, 0.6);
      overlay.fillRect(0, 0, w, h);
      overlay.setAlpha(0);
      this.tweens.add({ targets: overlay, alpha: 1, duration: 1200, ease: 'Sine.easeIn' });
    } else if (v.transition === 'shake') {
      overlay.fillStyle(0x0e0e14, 0.5);
      overlay.fillRect(0, 0, w, h);
      overlay.setAlpha(0);
      this.tweens.add({ targets: overlay, alpha: 1, duration: 800 });
      // Camera shake — lurching, urgent
      this.cameras.main.shake(3000, 0.008, false);
    }
    // 'none' — no overlay

    // ── PLAY VISION AUDIO ─────────────────────────────────────────
    this.playVisionAudio(v.audio, v.duration);
    if (typeof music !== 'undefined') music.playVision(index);

    // ── NO DIALOGUE BOX — text appears centered italic on screen ──
    // (textBox graphic kept allocated for clean fade-out cleanup)
    visionText.setFontStyle('italic');

    // ── SCHEDULE TEXT LINES ───────────────────────────────────────
    const scene = this;
    v.lines.forEach(line => {
      setTimeout(() => {
        if (!scene.visionActive) return;
        const isStage = line.text.startsWith('[');
        const isVoice = line.voice;
        visionText.setFontStyle('italic');
        visionText.setColor(isStage ? '#9a8a72' : (isVoice ? '#f0e0b8' : '#e8dcc8'));
        visionText.setFontSize(isStage ? '17px' : (isVoice ? '22px' : '20px'));
        visionText.setText(line.text);
        visionText.setAlpha(0);
        scene.tweens.add({ targets: visionText, alpha: 1, duration: 800 });
      }, line.delay + 1000);
    });

    // ── CLOSING TEXT ──────────────────────────────────────────────
    setTimeout(() => {
      if (!scene.visionActive) return;
      closingText.setText(v.closing);
      scene.tweens.add({ targets: closingText, alpha: 1, duration: 800 });
    }, v.duration - 3500);

    // ── OPTIONAL SECOND CLOSING LINE (Vision 5) ──
    if (v.closing2) {
      setTimeout(() => {
        if (!scene.visionActive) return;
        closingText.setText(v.closing + '\n\n' + v.closing2);
      }, v.duration - 1500);
    }

    // ── HAND PULSE (vision-specific moments) ─────────────────────
    if (index === 0) {
      // Vision 1: hard pulse like a second heartbeat skipping
      setTimeout(() => { scene.cameras.main.shake(200, 0.003); }, 15500);
    } else if (index === 4) {
      // Vision 5: hand glow temporarily goes dark, then returns steady
      setTimeout(() => {
        const savedGlow = scene.handGlowLevel;
        scene.handGlowLevel = -1; // dark
        // Maximum-intensity shake on the player at peak
        scene.triggerPlayerShake();
        setTimeout(() => { scene.handGlowLevel = savedGlow + 1; }, 3500);
      }, 18000);
    }

    // ── TRANSITION OUT & CLEANUP ──────────────────────────────────
    // Note: Phaser tween onComplete is unreliable, so we use setTimeout for cleanup
    setTimeout(() => {
      // Fade everything out
      scene.tweens.add({ targets: [overlay, textBox, visionText, closingText], alpha: 0, duration: 1500, ease: 'Sine.easeOut' });
      // Clean up after fade completes (setTimeout instead of onComplete)
      setTimeout(() => {
        overlay.destroy();
        textBox.destroy();
        visionText.destroy();
        closingText.destroy();
        scene.visionActive = false;
        if (typeof music !== 'undefined') music.stopVision();

        // Increase hand glow
        if (index !== 4) scene.handGlowLevel = index + 1; // vision 5 handles its own

        // After Vision 4 — brief leg-ache wobble (2s)
        if (index === 3) {
          scene.cameras.main.shake(2000, 0.0035, false);
        }

        // After all 5 visions — straighten roads, then Południca
        if (gameState.knotsPlaced >= 5) {
          setTimeout(() => {
            scene.straightenRoads();
            setTimeout(() => {
              gameState.questComplete = true;
              try { sfx.play('quest_complete'); } catch (e) {}
              scene.triggerPoludnica();
            }, 2200);
          }, 1500);
        }
      }, 1600);
    }, v.duration);
  }

  // ── ROADS STRAIGHTEN ANIMATION ────────────────────────────────────
  // After all 5 knots are placed, the road tiles visibly shift 3–4 px
  // into perfect alignment over ~2s. Subtle but noticeable.
  straightenRoads() {
    // Tween the entire ground layer with a tiny offset wave, then settle.
    if (!this.groundLayer) return;
    const startX = this.groundLayer.x;
    const startY = this.groundLayer.y;
    // Brief shimmer flash across the village
    const cam = this.cameras.main;
    const flash = this.add.graphics();
    flash.setScrollFactor(0).setDepth(900);
    flash.fillStyle(0xfff0c0, 0.18);
    flash.fillRect(0, 0, cam.width, cam.height);
    flash.setAlpha(0);
    this.tweens.add({
      targets: flash, alpha: 1, duration: 600, yoyo: true,
      onComplete: () => flash.destroy(),
    });
    // Subtle ground "click into place" — small offset, then back
    this.tweens.add({
      targets: this.groundLayer,
      x: startX + 3, y: startY - 2,
      duration: 900, ease: 'Sine.easeOut',
      yoyo: true,
      onComplete: () => {
        this.groundLayer.x = startX;
        this.groundLayer.y = startY;
      },
    });
    // Soft chime
    if (ambientAudio.ctx) {
      const ctx = ambientAudio.ctx;
      const now = ctx.currentTime;
      [440, 660, 880].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0, now + i * 0.15);
        g.gain.linearRampToValueAtTime(0.04, now + i * 0.15 + 0.05);
        g.gain.linearRampToValueAtTime(0, now + i * 0.15 + 1.2);
        o.connect(g); g.connect(ctx.destination);
        o.start(now + i * 0.15); o.stop(now + i * 0.15 + 1.3);
      });
    }
  }

  // ── VISION AUDIO ENGINE ─────────────────────────────────────────
  // Each vision has a unique synthesized soundscape using Web Audio API
  playVisionAudio(type, duration) {
    if (!ambientAudio.ctx) return;
    const ctx = ambientAudio.ctx;
    const now = ctx.currentTime;
    const fadeOut = duration / 1000;

    if (type === 'writing') {
      // Quill scratching (filtered noise bursts) + quiet resonant hum
      const hum = ctx.createOscillator();
      const humGain = ctx.createGain();
      hum.type = 'sine'; hum.frequency.value = 220;
      humGain.gain.setValueAtTime(0, now);
      humGain.gain.linearRampToValueAtTime(0.03, now + 1);
      humGain.gain.linearRampToValueAtTime(0, now + fadeOut);
      hum.connect(humGain); humGain.connect(ctx.destination);
      hum.start(now); hum.stop(now + fadeOut);
      // Scratching
      for (let i = 0; i < 12; i++) {
        const t = now + 1 + Math.random() * (fadeOut - 3);
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const filt = ctx.createBiquadFilter(); filt.type = 'highpass'; filt.frequency.value = 2000 + Math.random() * 3000;
        const g = ctx.createGain(); g.gain.value = 0.015 + Math.random() * 0.01;
        src.connect(filt); filt.connect(g); g.connect(ctx.destination);
        src.start(t);
      }
    } else if (type === 'counting') {
      // Eerie child-tone (high sine pulses) + door creak (low filtered sweep)
      for (let i = 0; i < 6; i++) {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 600 + i * 80;
        g.gain.setValueAtTime(0, now + i * 0.8);
        g.gain.linearRampToValueAtTime(0.02, now + i * 0.8 + 0.1);
        g.gain.linearRampToValueAtTime(0, now + i * 0.8 + 0.5);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(now + i * 0.8); osc.stop(now + i * 0.8 + 0.6);
      }
      // Door creak at 5s
      const creak = ctx.createOscillator();
      const creakG = ctx.createGain();
      creak.type = 'sawtooth'; creak.frequency.value = 60;
      creak.frequency.linearRampToValueAtTime(120, now + 6.5);
      creakG.gain.setValueAtTime(0, now + 5); creakG.gain.linearRampToValueAtTime(0.02, now + 5.5);
      creakG.gain.linearRampToValueAtTime(0, now + 7);
      const creakF = ctx.createBiquadFilter(); creakF.type = 'bandpass'; creakF.frequency.value = 200;
      creak.connect(creakF); creakF.connect(creakG); creakG.connect(ctx.destination);
      creak.start(now + 5); creak.stop(now + 7);
    } else if (type === 'lab') {
      // Clinical fluorescent hum + glass clink
      const hum = ctx.createOscillator();
      const humG = ctx.createGain();
      hum.type = 'sawtooth'; hum.frequency.value = 100;
      humG.gain.setValueAtTime(0, now);
      humG.gain.linearRampToValueAtTime(0.015, now + 1.5);
      humG.gain.linearRampToValueAtTime(0, now + fadeOut);
      const humF = ctx.createBiquadFilter(); humF.type = 'bandpass'; humF.frequency.value = 120; humF.Q.value = 8;
      hum.connect(humF); humF.connect(humG); humG.connect(ctx.destination);
      hum.start(now); hum.stop(now + fadeOut);
      // Glass clinks
      for (let i = 0; i < 4; i++) {
        const t = now + 3 + Math.random() * 8;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = 2000 + Math.random() * 2000;
        g.gain.setValueAtTime(0.03, t); g.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.2);
      }
    } else if (type === 'running') {
      // Heavy footsteps (low thuds) + wind + breathing
      for (let i = 0; i < Math.floor(fadeOut * 2.5); i++) {
        const t = now + 0.5 + i * 0.4;
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * Math.exp(-j / (d.length * 0.3));
        const src = ctx.createBufferSource(); src.buffer = buf;
        const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 200;
        const g = ctx.createGain(); g.gain.value = 0.04;
        src.connect(f); f.connect(g); g.connect(ctx.destination);
        if (t < now + fadeOut - 1) src.start(t);
      }
      // Wind
      const windBuf = ctx.createBuffer(1, ctx.sampleRate * fadeOut, ctx.sampleRate);
      const wd = windBuf.getChannelData(0);
      for (let j = 0; j < wd.length; j++) wd[j] = (Math.random() * 2 - 1);
      const windSrc = ctx.createBufferSource(); windSrc.buffer = windBuf;
      const wf = ctx.createBiquadFilter(); wf.type = 'lowpass'; wf.frequency.value = 400;
      const wg = ctx.createGain(); wg.gain.setValueAtTime(0, now);
      wg.gain.linearRampToValueAtTime(0.025, now + 2);
      wg.gain.linearRampToValueAtTime(0, now + fadeOut);
      windSrc.connect(wf); wf.connect(wg); wg.connect(ctx.destination);
      windSrc.start(now);
    } else if (type === 'singing') {
      // Layered voices (multiple sine harmonics) fading out one by one
      const voices = [];
      const baseFreqs = [220, 277, 330, 392, 440, 523, 330, 262];
      baseFreqs.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        // Each voice fades out at different time
        const voiceEnd = now + 4 + i * 1.5;
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.018, now + 1.5);
        g.gain.setValueAtTime(0.018, Math.min(voiceEnd - 1, now + fadeOut - 2));
        g.gain.linearRampToValueAtTime(0, Math.min(voiceEnd, now + fadeOut - 1));
        osc.connect(g); g.connect(ctx.destination);
        osc.start(now); osc.stop(Math.min(voiceEnd + 0.5, now + fadeOut));
        voices.push(osc);
      });
    }
  }

  // ══════════════════════════════════════════════════════════════════
  //  POŁUDNICA — The Noonwraith Appearance (after all 5 visions)
  // ══════════════════════════════════════════════════════════════════
  triggerPoludnica() {
    const cam = this.cameras.main;
    const w = cam.width, h = cam.height;
    // Południca's theme — single play, ducks all music to ~10%.
    // When it ends, awakening theme Play 2 follows automatically.
    if (typeof music !== 'undefined') {
      music.playPoludnica(() => music.playAwakening(0.50));
    }

    // ── Phase 1: Golden noon light floods the scene ─────────────
    const noonOverlay = this.add.graphics();
    noonOverlay.setDepth(1100); noonOverlay.setScrollFactor(0);
    noonOverlay.fillStyle(0xddcc88, 0.35);
    noonOverlay.fillRect(0, 0, w, h);
    noonOverlay.setAlpha(0);
    this.tweens.add({ targets: noonOverlay, alpha: 1, duration: 2000 });

    // ── Phase 2: All ambient sound stops ────────────────────────
    // (We lower the master gain if audio is running)
    let masterGain = null;
    if (ambientAudio.ctx) {
      masterGain = ambientAudio.ctx.createGain();
      masterGain.gain.setValueAtTime(1, ambientAudio.ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0, ambientAudio.ctx.currentTime + 2);
    }

    // ── Phase 3: Południca appears at the idol (3s in) ──────────
    const scene = this;
    setTimeout(() => {
      const iso = cartToIso(CENTER - 0.5, CENTER - 0.5);
      const px = iso.x + this.worldOffset.x;
      const py = iso.y + this.worldOffset.y;

      // Draw the noonwraith — tall, pale, white linen
      const polud = this.add.graphics();
      polud.setDepth(1050);

      // Tall pale figure
      // Flowing white linen dress
      polud.fillStyle(0xeeeedd, 0.7);
      polud.fillRect(px - 8, py - 70, 16, 55);
      // Dress flows wider at bottom
      polud.fillTriangle(px - 8, py - 15, px + 8, py - 15, px - 14, py - 5);
      polud.fillTriangle(px - 8, py - 15, px + 8, py - 15, px + 14, py - 5);
      // Head — pale, featureless
      polud.fillStyle(0xeeeedd, 0.8);
      polud.fillCircle(px, py - 76, 8);
      // Hair — pale wheat, long
      polud.fillStyle(0xccbb88, 0.5);
      polud.fillRect(px - 7, py - 82, 14, 10);
      polud.lineStyle(1, 0xccbb88, 0.3);
      polud.beginPath(); polud.moveTo(px - 6, py - 72); polud.lineTo(px - 8, py - 50); polud.strokePath();
      polud.beginPath(); polud.moveTo(px + 6, py - 72); polud.lineTo(px + 8, py - 50); polud.strokePath();
      // Eyes — just two faint dots
      polud.fillStyle(0xddddcc, 0.9);
      polud.fillCircle(px - 3, py - 77, 1);
      polud.fillCircle(px + 3, py - 77, 1);
      // Linen moves without wind
      polud.lineStyle(1, 0xddddcc, 0.3);
      polud.beginPath(); polud.moveTo(px - 12, py - 8); polud.lineTo(px - 16, py - 2); polud.strokePath();
      polud.beginPath(); polud.moveTo(px + 12, py - 8); polud.lineTo(px + 16, py - 2); polud.strokePath();

      // Strong noon glow around her
      const polGlow = this.add.graphics();
      polGlow.setDepth(1049);
      polGlow.fillStyle(0xddcc88, 0.15);
      polGlow.fillCircle(px, py - 40, 50);
      polGlow.fillStyle(0xffeedd, 0.08);
      polGlow.fillCircle(px, py - 40, 80);

      polud.setAlpha(0);
      polGlow.setAlpha(0);

      // Fade in
      this.tweens.add({ targets: [polud, polGlow], alpha: 1, duration: 2000 });

      // ── Phase 4: She nods once (at 6s) ──────────────────────
      setTimeout(() => {
        // Subtle nod — move head down then up
        scene.tweens.add({
          targets: polud,
          y: polud.y + 4,
          duration: 600,
          ease: 'Sine.easeInOut',
          yoyo: true,
        });
      }, 3000);

      // ── Phase 5: She dissolves (at 8s) ──────────────────────
      setTimeout(() => {
        scene.tweens.add({
          targets: [polud, polGlow],
          alpha: 0,
          duration: 3000,
          ease: 'Sine.easeIn',
          onComplete: () => { polud.destroy(); polGlow.destroy(); }
        });
      }, 5000);

      // ── Phase 6: Village sounds return (at 10s) & bells chime ─
      setTimeout(() => {
        // Fade noon overlay out
        scene.tweens.add({
          targets: noonOverlay,
          alpha: 0,
          duration: 3000,
          onComplete: () => noonOverlay.destroy(),
        });

        // Restore ambient audio
        if (masterGain && ambientAudio.ctx) {
          masterGain.gain.linearRampToValueAtTime(1, ambientAudio.ctx.currentTime + 3);
        }

        // Baba's copper bells chime on their own
        scene.babaBellSwing = 8;

        // Play a brief bell-like chime sound
        if (ambientAudio.ctx) {
          const ctx = ambientAudio.ctx;
          const now = ctx.currentTime;
          for (let i = 0; i < 3; i++) {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 800 + i * 200;
            g.gain.setValueAtTime(0.04, now + i * 0.3);
            g.gain.linearRampToValueAtTime(0, now + i * 0.3 + 1.5);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(now + i * 0.3); osc.stop(now + i * 0.3 + 2);
          }
        }
      }, 7000);
    }, 3000);

    // ── Phase 7 removed: Brel no longer auto-fires here.
    // The new closing scene is triggered by checkBrelTrigger() once the
    // player picks up the Codex AND moves within 3 tiles of the southern
    // exit road. See triggerWellnessOfficer() for the orchestrated scene.
  }

  // ══════════════════════════════════════════════════════════════════
  //  PROXIMITY TRIGGER — fires the closing scene once the player picks
  //  up the Codex AND moves within 3 tiles of the southern exit road.
  // ══════════════════════════════════════════════════════════════════
  checkBrelTrigger() {
    if (gameState.brelSceneFired) return;
    if (!gameState.codexFragmentCollected) return;
    if (this.dialogueActive) return;
    const exit = { x: CENTER - 0.5, y: MAP_SIZE - 1 };
    const d = Math.hypot(this.playerCartX - exit.x, this.playerCartY - exit.y);
    if (d > 3) return;
    gameState.brelSceneFired = true;
    this.triggerWellnessOfficer();
  }

  // ══════════════════════════════════════════════════════════════════
  //  WELLNESS OFFICER CLOSING SCENE — orchestrated, mode-aware
  // ══════════════════════════════════════════════════════════════════
  triggerWellnessOfficer() {
    if (this.officerScenePlayed) return;
    this.officerScenePlayed = true;
    const scene = this;
    const mode = gameState.brelMode || 'neutral';
    this._brelMode = mode;
    this._brelDoorsKnocked = 0;

    // Audio duck — village ambient drops to ~20% over 5s
    if (typeof masterGain !== 'undefined' && masterGain && ambientAudio.ctx) {
      try {
        masterGain.gain.linearRampToValueAtTime(0.2, ambientAudio.ctx.currentTime + 5);
      } catch (e) {}
    }
    // Cold piano drone underneath at low volume — Brel's "theme"
    this.startBrelTheme();

    // ── STEP 1 — Zuzka's closing beat ──
    this.playZuzkaClosingBeat(() => {
      // Per-mode delay before Brel arrives
      const enterDelay = mode === 'high' ? 20000 : (mode === 'low' ? 90000 : 45000);
      setTimeout(() => scene.brelEnter(), enterDelay);
    });
  }

  // ── STEP 1: Zuzka closing animation ───────────────────────────────
  playZuzkaClosingBeat(onComplete) {
    const z = this.zuzkaSprite;
    if (!z) { onComplete && onComplete(); return; }
    const scene = this;
    // 1) Slow head-turn toward entry road (NW): tiny x nudge as a stand-in
    this.tweens.add({
      targets: z, x: z.x - 2, duration: 900, ease: 'Sine.easeInOut',
      onComplete: () => {
        // 2) Look at the player — hold 2s (no movement, just a pause)
        setTimeout(() => {
          // 3) Look down at the jar + screw the lid (small dip)
          scene.tweens.add({
            targets: z, y: z.y + 2, duration: 500, yoyo: true, ease: 'Sine.easeInOut',
            onComplete: () => {
              // 4) Walk to Baba's house at 60% speed, no looking back
              const tgt = cartToIso(BABA.cartX - 0.5, BABA.cartY + 0.5);
              const tx = tgt.x + scene.worldOffset.x;
              const ty = tgt.y + scene.worldOffset.y;
              const dist = Math.hypot(tx - z.x, ty - z.y);
              const dur = Math.max(2400, dist * 18); // ~60% of normal
              scene.tweens.add({
                targets: z, x: tx, y: ty, duration: dur, ease: 'Linear',
                onUpdate: () => { z._sortY = z.y; scene.zuzkaBaseY = z.y; },
                onComplete: () => {
                  // She slips inside — fade out
                  scene.tweens.add({
                    targets: z, alpha: 0, duration: 800,
                    onComplete: () => { z.setVisible(false); onComplete && onComplete(); },
                  });
                },
              });
            },
          });
        }, 2000);
      },
    });
  }

  // ── STEP 2: Brel enters from the northern road, walks to crossroads ──
  brelEnter() {
    const scene = this;
    const mode = this._brelMode || gameState.brelMode || 'neutral';
    // Northern entry road
    const startCart = { x: CENTER - 0.5, y: 0 };
    const iso = cartToIso(startCart.x, startCart.y);
    const ox = iso.x + this.worldOffset.x;
    const oy = iso.y + this.worldOffset.y;
    const officer = this.add.container(ox, oy);
    const g = this.add.graphics();

    // Regency aesthetic — cold, clean, metallic. Grey/steel uniform.
    // Shadow
    g.fillStyle(0x000000, 0.2);
    g.fillEllipse(0, 3, 12, 5);

    // Legs — long grey trousers
    g.fillStyle(0x2a3038, 1);
    g.fillRect(-4, -2, 3, 10);
    g.fillRect(1, -2, 3, 10);
    // Polished boots
    g.fillStyle(0x0a0a0e, 1);
    g.fillRect(-4, 6, 4, 3);
    g.fillRect(1, 6, 4, 3);

    // Long grey coat — stiff, immaculate
    g.fillStyle(0x3a4048, 1);
    g.fillRect(-6, -16, 13, 16);
    // Coat lapels
    g.fillStyle(0x2a3038, 1);
    g.fillTriangle(-6, -16, -1, -16, -3, -10);
    g.fillTriangle(6, -16, 1, -16, 3, -10);
    // Row of polished buttons — brass
    g.fillStyle(0xb8a060, 1);
    g.fillCircle(0, -13, 0.8);
    g.fillCircle(0, -10, 0.8);
    g.fillCircle(0, -7, 0.8);
    g.fillCircle(0, -4, 0.8);

    // Arms — holding clipboard
    g.fillStyle(0x3a4048, 1);
    g.fillRect(-7, -14, 2, 10);
    g.fillRect(5, -14, 2, 10);
    // Hands (pale, precise)
    g.fillStyle(0xd8c8b0, 1);
    g.fillRect(-7, -5, 2, 2);
    g.fillRect(5, -5, 2, 2);

    // Clipboard — held at waist, very white paper
    g.fillStyle(0x1a1a20, 1); // board
    g.fillRect(-5, -7, 10, 7);
    g.fillStyle(0xf4f0e8, 1); // paper (unnaturally white against dusk)
    g.fillRect(-4, -6, 8, 5);
    // Thin lines on paper
    g.lineStyle(1, 0x888888, 0.6);
    g.beginPath(); g.moveTo(-3, -5); g.lineTo(3, -5); g.strokePath();
    g.beginPath(); g.moveTo(-3, -4); g.lineTo(3, -4); g.strokePath();
    g.beginPath(); g.moveTo(-3, -3); g.lineTo(3, -3); g.strokePath();

    // Neck — high stiff collar
    g.fillStyle(0x1a1e24, 1);
    g.fillRect(-3, -19, 6, 4);

    // Head — pale, gaunt
    g.fillStyle(0xd8c8b0, 1);
    g.fillCircle(0, -23, 5);

    // Peaked cap — grey with brass badge
    g.fillStyle(0x2a3038, 1);
    g.fillRect(-6, -29, 12, 4);
    g.fillRect(-5, -30, 10, 2);
    // Cap brim
    g.fillStyle(0x0a0a0e, 1);
    g.fillRect(-7, -26, 14, 1);
    // Brass badge
    g.fillStyle(0xb8a060, 1);
    g.fillCircle(0, -28, 1.5);
    g.fillStyle(0x8a7040, 1);
    g.fillCircle(0, -28, 0.8);

    // Eyes — two pale dots, unblinking
    g.fillStyle(0x223340, 1);
    g.fillCircle(-1.8, -23, 0.9);
    g.fillCircle(1.8, -23, 0.9);
    // No gleam — dull

    // Thin mouth — small polite line
    g.lineStyle(1, 0x6a5a4a, 0.8);
    g.beginPath(); g.moveTo(-1.5, -20); g.lineTo(1.5, -20); g.strokePath();

    officer.add(g);
    officer._sortY = oy;
    officer.setAlpha(0);
    this.objectLayer.add(officer);
    this.officerSprite = officer;

    // ── Fade him in as if stepping from a road that wasn't there ────
    this.tweens.add({ targets: officer, alpha: 1, duration: 1800, ease: 'Sine.easeOut' });

    // ── Walk him forward toward the idol ────────────────────────────
    const endCart = { x: CENTER - 0.5, y: CENTER + 2.5 };
    const endIso = cartToIso(endCart.x, endCart.y);
    const endX = endIso.x + this.worldOffset.x;
    const endY = endIso.y + this.worldOffset.y;

    setTimeout(() => {
      scene.tweens.add({
        targets: officer,
        x: endX,
        y: endY,
        duration: 4500,
        ease: 'Linear',
        onUpdate: () => { officer._sortY = officer.y; },
      });
    }, 1200);

    // ── Play a cold arrival sound — flat metallic tone ──────────────
    if (ambientAudio.ctx) {
      const ctx = ambientAudio.ctx;
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const og = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(110, now + 4);
      og.gain.setValueAtTime(0, now);
      og.gain.linearRampToValueAtTime(0.03, now + 1);
      og.gain.linearRampToValueAtTime(0, now + 5);
      osc.connect(og); og.connect(ctx.destination);
      osc.start(now); osc.stop(now + 5);
    }

    // ── After walk-in, chain into the inspection sequence ──────────
    setTimeout(() => scene.brelInspect(), 6200);
  }

  // ── STEP 3: Brel inspects three points around the crossroads ────
  brelInspect() {
    const scene = this;
    const officer = this.officerSprite;
    if (!officer) return;
    const mode = this._brelMode || 'neutral';
    const perLoc = mode === 'low' ? 1000 : (mode === 'high' ? 4000 : 2500);

    const points = [
      { x: CENTER - 0.5, y: CENTER + 1.5 },        // idol
      { x: CENTER + 2.5, y: CENTER - 1.5 },        // nearest shrine
      { x: BABA.cartX + 0.5, y: BABA.cartY + 1 },  // doorframe
    ];
    let i = 0;
    const next = () => {
      if (!scene.officerSprite) return;
      if (i >= points.length) {
        // HIGH: extra inn pause
        if (mode === 'high') {
          const inn = cartToIso(7, 9);
          scene.tweens.add({
            targets: officer, x: inn.x + scene.worldOffset.x, y: inn.y + scene.worldOffset.y,
            duration: 3500, ease: 'Linear',
            onUpdate: () => { officer._sortY = officer.y; },
            onComplete: () => setTimeout(() => scene.brelPinNotice(), 4000),
          });
        } else {
          setTimeout(() => scene.brelPinNotice(), 600);
        }
        return;
      }
      const p = points[i++];
      const t = cartToIso(p.x, p.y);
      scene.tweens.add({
        targets: officer, x: t.x + scene.worldOffset.x, y: t.y + scene.worldOffset.y,
        duration: 2200, ease: 'Linear',
        onUpdate: () => { officer._sortY = officer.y; },
        onComplete: () => {
          // Clipboard write — small nod / tiny y bob
          scene.tweens.add({
            targets: officer, y: officer.y - 1, duration: 150, yoyo: true, repeat: 2,
          });
          setTimeout(next, perLoc);
        },
      });
    };
    next();
  }

  // ── STEP 4: Brel pins a notice to the idol base ─────────────────
  brelPinNotice() {
    const scene = this;
    const officer = this.officerSprite;
    if (!officer) return;
    const mode = this._brelMode || 'neutral';

    // Walk to idol base
    const idol = cartToIso(CENTER - 0.5, CENTER + 1.5);
    scene.tweens.add({
      targets: officer, x: idol.x + scene.worldOffset.x, y: idol.y + scene.worldOffset.y,
      duration: 2200, ease: 'Linear',
      onUpdate: () => { officer._sortY = officer.y; },
      onComplete: () => {
        // Pin the on-world notice
        const noticeIso = cartToIso(CENTER - 0.5, CENTER + 1.8);
        const nx = noticeIso.x + scene.worldOffset.x;
        const ny = noticeIso.y + scene.worldOffset.y - 6;
        const notice = scene.add.graphics();
        notice.fillStyle(0xf4f0e8, 1);
        notice.fillRect(-7, -9, 14, 12);
        notice.lineStyle(0.5, 0x2a3038, 1);
        notice.strokeRect(-7, -9, 14, 12);
        notice.fillStyle(0x8a2a2a, 1);
        notice.fillRect(-7, -9, 14, 1);
        const noticeContainer = scene.add.container(nx, ny, [notice]);
        noticeContainer._sortY = ny;
        scene.objectLayer.add(noticeContainer);
        scene.brelNoticeSprite = noticeContainer;
        noticeContainer.setAlpha(0);
        scene.tweens.add({ targets: noticeContainer, alpha: 1, duration: 600 });

        // Show cold-text notice headline above the idol
        const bodies = {
          low:    'ROUTINE ASSESSMENT — area nominal.\nNo further action required.',
          neutral:'WELLNESS ASSESSMENT NOTICE\nReport within 7 days. Voluntary.',
          high:   'PRIORITY ASSESSMENT — Legacy Myth activity.\nReport immediately. Non-attendance noted.',
        };
        scene.showColdCenteredText(bodies[mode] || bodies.neutral, 5000, () => {
          if (mode === 'high') {
